<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jeff's Junk — Office Board</title>
<style>
  :root{
    /* Jeff White Group brand green + Apple-glass surfaces (24/7 dark TV board) */
    --bg:#071310;
    --text:#eefaf2; --muted:#9fc4af; --dim:#628270;
    --green:#22c55e; --green-d:#15803d; --amber:#f59e0b; --red:#ef4444; --blue:#3b82f6;
    /* glass tokens */
    --glass:rgba(14,40,26,.42);            /* frosted panel body */
    --glass-soft:rgba(255,255,255,.05);
    --gline:rgba(190,255,214,.16);         /* hairline edge */
    --gtop:rgba(255,255,255,.30);          /* specular top edge */
    --gshadow:0 14px 34px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.14);
    /* overscan-safe outer margin so TVs that overscan don't clip the edges */
    --pad: 2.4vw;
  }
  *{box-sizing:border-box; -webkit-font-smoothing:antialiased}
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    /* deep-green aurora the glass panels can catch light from (static — easy on TV players) */
    background:
      radial-gradient(90vw 70vh at 12% -10%, rgba(34,197,94,.22), transparent 60%),
      radial-gradient(80vw 60vh at 108% 16%, rgba(16,185,129,.15), transparent 56%),
      radial-gradient(75vw 75vh at 50% 118%, rgba(59,130,246,.10), transparent 62%),
      linear-gradient(180deg,#0b2114 0%, var(--bg) 68%);
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    overflow:hidden; cursor:none; user-select:none;
  }

  /* ── Pastel Drift ambient scene (design handoff) — drifts behind everything ──
     Exact tokens/keyframes from the handoff; cqw/cqh swapped for vw/vh per its
     integration notes (identical on a 16:9 TV). A dark-green scrim sits between
     the light pastel scene and the dark glass UI so text stays crisp. */
  #scene{position:fixed; inset:0; z-index:0; overflow:hidden;
    background:linear-gradient(158deg,#eef2e8 0%,#e2e8da 52%,#d6ddcb 100%)}
  #scene .dotgrid{position:absolute; inset:0; opacity:.55;
    background-image:radial-gradient(rgba(96,114,94,.13) 1px,transparent 1.4px);
    background-size:3.2vw 3.2vw}
  #scene .moon{position:absolute; right:9vw; top:10vh; width:20vw; height:20vw; border-radius:50%;
    background:radial-gradient(circle at 42% 38%,#f8f5ec,#e7e6d6); opacity:.9;
    animation:pdHaze 9s ease-in-out infinite}
  #scene .ringc{position:absolute; left:-12vw; bottom:-20vh; width:44vw; height:44vw; border-radius:50%;
    border:.3vw solid rgba(110,130,108,.28); animation:pdSpin 100s linear infinite}
  #scene .spr{position:absolute}
  #scene .spr img{width:100%; height:auto; display:block}
  #scene .truck{left:6vw; top:34vh; width:32vw; animation:pdBob 9s ease-in-out infinite}
  #scene .truck .inner{animation:pdSway 11s ease-in-out infinite;
    filter:saturate(.9) drop-shadow(0 2vh 2.4vh rgba(60,74,58,.16))}
  #scene .bin20{right:5vw; bottom:12vh; width:27vw; animation:pdGlide 12s ease-in-out infinite}
  #scene .bin20 .inner{animation:pdSway 9s ease-in-out infinite;
    filter:saturate(.9) drop-shadow(0 1.8vh 2vh rgba(60,74,58,.16))}
  #scene .bin14{right:16vw; top:16vh; width:17vw; opacity:.9; animation:pdGlideB 14s ease-in-out infinite}
  #scene .bin14 .inner{animation:pdSway 12s ease-in-out infinite;
    filter:saturate(.88) drop-shadow(0 1.4vh 1.6vh rgba(60,74,58,.12))}
  #scrim{position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(7,19,16,.68) 0%, rgba(7,19,16,.60) 100%)}
  @keyframes pdBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.6vh)}}
  @keyframes pdSway{0%,100%{transform:rotate(-2.2deg)}50%{transform:rotate(2.2deg)}}
  @keyframes pdGlide{0%,100%{transform:translate(0,0)}50%{transform:translate(2.6vw,-1.7vh)}}
  @keyframes pdGlideB{0%,100%{transform:translate(0,0)}50%{transform:translate(-2.2vw,1.5vh)}}
  @keyframes pdHaze{0%,100%{opacity:.7}50%{opacity:.96}}
  @keyframes pdSpin{to{transform:rotate(360deg)}}

  /* one shared frosted-glass recipe */
  .glass, #topbar, .job, .kpi, #dots, #gate .gcard{
    background:linear-gradient(160deg, rgba(255,255,255,.085), rgba(255,255,255,.028) 45%, rgba(255,255,255,.012));
    background-color:var(--glass);
    border:1px solid var(--gline); border-top-color:var(--gtop);
    box-shadow:var(--gshadow);
    backdrop-filter:blur(18px) saturate(150%);
    -webkit-backdrop-filter:blur(18px) saturate(150%);
  }
  /* players that can't blur still get a believable glass (denser tint carries the look) */
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .glass, #topbar, .job, .kpi, #dots, #gate .gcard{ background-color:rgba(14,40,26,.78); }
  }

  /* ── Access gate / status ── */
  #gate{
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6vw; z-index:100;
  }
  #gate .gcard{display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center;
    border-radius:26px; padding:5vh 4vw}
  #gate .logo{font-size:clamp(22px,3vw,40px); font-weight:900; letter-spacing:1px; color:var(--green);
    text-shadow:0 0 26px rgba(34,197,94,.45)}
  #gate .msg{font-size:clamp(15px,1.8vw,24px); color:var(--muted); max-width:22em; line-height:1.5}
  #gate .spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--gline);border-top-color:var(--green);animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ── shell ── */
  #shell{position:fixed; inset:0; z-index:1; display:none; flex-direction:column; padding:var(--pad); gap:1.5vh}
  #topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border-radius:20px; padding:1.2vh 1.4vw; flex:0 0 auto;
  }
  #brand{display:flex; align-items:baseline; gap:.6em; font-weight:900; letter-spacing:.5px}
  #brand .jj{color:var(--green); font-size:clamp(20px,2.3vw,36px); text-shadow:0 0 22px rgba(34,197,94,.4)}
  #brand .sub{color:var(--muted); font-weight:700; font-size:clamp(12px,1.3vw,20px); letter-spacing:2px; text-transform:uppercase}
  #tright{display:flex; align-items:center; gap:1.6vw}
  /* weather (hidden until it loads) */
  #wx{display:none; align-items:center; gap:.55em; padding-right:1.6vw; border-right:1px solid var(--gline)}
  #wx.on{display:flex}
  #wx .i{font-size:clamp(22px,2.4vw,40px); line-height:1}
  #wx .t{font-size:clamp(22px,2.6vw,42px); font-weight:800; font-variant-numeric:tabular-nums}
  #wx .hl{font-size:clamp(11px,1.2vw,18px); color:var(--muted); font-weight:700; line-height:1.25; white-space:nowrap}
  #clock{text-align:right; line-height:1.05}
  #clock .t{font-size:clamp(22px,2.6vw,42px); font-weight:800; font-variant-numeric:tabular-nums}
  #clock .d{font-size:clamp(11px,1.2vw,18px); color:var(--muted); font-weight:600; letter-spacing:.5px}

  #stage{position:relative; flex:1 1 auto; min-height:0}
  .panel{
    position:absolute; inset:0; display:flex; flex-direction:column; min-height:0;
    opacity:0; visibility:hidden; transform:translateY(10px);
    transition:opacity .5s ease, transform .5s ease, visibility .5s;
  }
  .panel.on{opacity:1; visibility:visible; transform:none}
  .p-head{display:flex; align-items:baseline; gap:.7em; flex:0 0 auto; margin-bottom:1.4vh}
  .p-head h2{margin:0; font-size:clamp(22px,3vw,46px); font-weight:900; letter-spacing:.4px}
  .p-head .accent{width:.34em;height:1em;background:linear-gradient(180deg,#4ade80,var(--green-d));border-radius:4px;display:inline-block;transform:translateY(.12em);box-shadow:0 0 16px rgba(34,197,94,.55)}
  .p-head .meta{margin-left:auto; color:var(--muted); font-size:clamp(13px,1.5vw,24px); font-weight:700}
  .p-body{flex:1 1 auto; min-height:0; overflow:hidden}

  /* ── empty state ── */
  .empty{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4em; color:var(--muted)}
  .empty .big{font-size:clamp(28px,4vw,64px); font-weight:900; color:var(--text)}
  .empty .small{font-size:clamp(14px,1.6vw,26px)}

  /* ── KPIs ── */
  #kpiGrid{height:100%; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(2,1fr); gap:1.6vh 1.4vw}
  .kpi{border-radius:24px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:.1em; padding:1vh}
  .kpi .num{font-size:clamp(44px,8vw,150px); font-weight:900; line-height:1; font-variant-numeric:tabular-nums; color:var(--kc,var(--text));
    text-shadow:0 0 34px color-mix(in srgb, var(--kc,var(--green)) 45%, transparent)}
  .kpi .lbl{font-size:clamp(13px,1.6vw,28px); font-weight:700; color:var(--muted); letter-spacing:.5px; text-align:center}
  .kpi .sub{font-size:clamp(11px,1.15vw,20px); font-weight:800; letter-spacing:.3px; text-align:center; margin-top:.2em}

  /* ── schedule grid ── */
  #schedWrap{height:100%; display:flex; flex-direction:column}
  .sched-row{display:grid; gap:.5vw; align-items:stretch; flex:1 1 0; min-height:0}
  .sched-row.head{flex:0 0 auto}
  .sched-row .rname{display:flex; align-items:center; font-weight:800; font-size:clamp(13px,1.4vw,24px); padding-left:.3em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sched-row.head .rname{color:var(--muted)}
  .sched-row .col{display:flex; align-items:center; justify-content:center; font-weight:800;
    font-size:clamp(11px,1.2vw,20px); color:var(--muted); border-bottom:2px solid var(--gline)}
  .sched-row.head .col{padding-bottom:.4vh}
  .sched-row.head .col.today{color:var(--green); text-shadow:0 0 14px rgba(34,197,94,.5)}
  .cell{display:flex; align-items:center; justify-content:center; border-radius:10px; border:1px solid var(--gline);
    background-color:rgba(255,255,255,.045); font-size:clamp(10px,1.05vw,17px); font-weight:800; text-align:center; padding:.15em .2em;
    overflow:hidden; line-height:1.05;
    /* glossy top edge that rides on ANY fill colour (task cells set background-color inline) */
    background-image:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 55%)}
  .cell.today{outline:2px solid color-mix(in srgb,var(--green) 60%, transparent); outline-offset:-2px}
  .cell.off{color:var(--dim); background-color:transparent; background-image:none; border-style:dashed; border-color:rgba(190,255,214,.10)}
  /* junk-side booking on an empty scheduler day (read-only ghost, same rules as the dashboard) */
  .cell.jx{color:#9ecbff; background-color:rgba(59,130,246,.13); background-image:none; border:1.5px dashed rgba(96,165,250,.55)}
  .zebra{background:rgba(255,255,255,.02)}

  /* ── bin work board ── */
  /* TVs can't scroll: groups flow into two columns on busy days, and
     renderBins() shrinks the whole board to fit 1080p if it's still tall. */
  #binsWrap{width:100%}
  #binsWrap.two-col{column-count:2; column-gap:1.2vw}
  .bb-group{border-radius:16px; border:1px solid var(--gline); padding:.8vh 1vw; background:rgba(255,255,255,.03); break-inside:avoid; margin-bottom:1.2vh}
  .bb-group.warn{border-color:rgba(239,68,68,.55); background:rgba(239,68,68,.08)}
  .bb-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:.4vh; border-bottom:1px solid var(--gline); padding-bottom:.4vh}
  .bb-name{font-size:clamp(15px,1.7vw,28px); font-weight:900; letter-spacing:.4px}
  .bb-group.warn .bb-name{color:#fca5a5}
  .bb-count{font-size:clamp(12px,1.3vw,22px); font-weight:800; color:var(--muted); font-variant-numeric:tabular-nums}
  .bb-row{display:flex; align-items:center; gap:.9vw; padding:.5vh .2vw}
  .bb-row + .bb-row{border-top:1px solid rgba(255,255,255,.05)}
  /* Field priority: bin size, city, drop/pick, customer, street last */
  .bb-size{flex:0 0 auto; min-width:3.1em; font-size:clamp(16px,1.9vw,32px); font-weight:900; color:#fde047; font-variant-numeric:tabular-nums; letter-spacing:.3px; text-align:left}
  .bb-city{flex:0 0 auto; max-width:9em; font-size:clamp(14px,1.6vw,27px); font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-kind{flex:0 0 auto; font-size:clamp(10px,1.05vw,16px); font-weight:800; text-transform:uppercase; letter-spacing:.5px; padding:.24em .65em; border-radius:999px; white-space:nowrap}
  .k-drop{color:#7dd3fc; background:rgba(14,165,233,.16); border:1px solid rgba(14,165,233,.45)}
  .k-pick{color:#f9a8d4; background:rgba(236,72,153,.16); border:1px solid rgba(236,72,153,.45)}
  .bb-who{flex:0 1 auto; min-width:0; font-size:clamp(12px,1.3vw,21px); font-weight:700; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-extra{flex:0 0 auto; font-size:clamp(11px,1.15vw,18px); font-weight:700; color:var(--muted); white-space:nowrap}
  .bb-loc{flex:1 1 auto; min-width:0; font-size:clamp(10px,1.05vw,16px); color:var(--dim,var(--muted)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:right}
  .bb-state{flex:0 0 auto; font-size:clamp(11px,1.1vw,17px); font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:.22em .6em; border-radius:999px; color:#fbbf24; border:1px solid rgba(251,191,36,.45); background:rgba(251,191,36,.12)}
  .bb-row.done .bb-state{color:var(--green); border-color:color-mix(in srgb,var(--green) 45%, transparent); background:color-mix(in srgb,var(--green) 14%, transparent)}
  .bb-row.done .bb-size,.bb-row.done .bb-city,.bb-row.done .bb-who,.bb-row.done .bb-loc,.bb-row.done .bb-extra{text-decoration:line-through; opacity:.55}

  /* ── dots + status ── */
  #dots{flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:.8em;
    align-self:center; border-radius:999px; padding:.9vh 1.8em}
  #dots .dot{width:.7em;height:.7em;border-radius:50%;background:rgba(255,255,255,.18); transition:background .3s, transform .3s}
  #dots .dot.on{background:var(--green); transform:scale(1.3); box-shadow:0 0 12px rgba(34,197,94,.8)}
  #netdot{position:fixed; bottom:calc(var(--pad) + .1em); right:var(--pad); width:.6em;height:.6em;border-radius:50%;
    background:var(--green); opacity:.55; transition:background .3s}
  #netdot.bad{background:var(--amber); opacity:1}
</style>
</head>
<body>
  <!-- Pastel Drift ambient background (design handoff) + scrim; UI layers sit above -->
  <div id="scene" aria-hidden="true">
    <div class="dotgrid"></div>
    <div class="moon"></div>
    <div class="ringc"></div>
    <div class="spr truck"><div class="inner"><img src="assets/tv-truck.png" alt=""></div></div>
    <div class="spr bin20"><div class="inner"><img src="assets/tv-bin-20.png" alt=""></div></div>
    <div class="spr bin14"><div class="inner"><img src="assets/tv-bin-14.png" alt=""></div></div>
    <div id="scrim"></div>
  </div>

  <div id="gate">
    <div class="gcard">
      <div class="logo">JEFF'S JUNK</div>
      <div class="spin" id="gateSpin"></div>
      <div class="msg" id="gateMsg">Connecting the office board…</div>
    </div>
  </div>

  <div id="shell">
    <div id="topbar">
      <div id="brand"><span class="jj">JEFF'S JUNK</span><span class="sub">Office Board</span></div>
      <div id="tright">
        <div id="wx"><span class="i" id="wxI"></span><span class="t" id="wxT"></span><span class="hl" id="wxHL"></span></div>
        <div id="clock"><div class="t" id="clockT">–</div><div class="d" id="clockD">–</div></div>
      </div>
    </div>
    <div id="stage">
      <!-- Panel: Crew Schedule -->
      <section class="panel" data-panel="schedule">
        <div class="p-head"><span class="accent"></span><h2>Crew Schedule</h2><span class="meta" id="schedMeta"></span></div>
        <div class="p-body"><div id="schedWrap"></div></div>
      </section>
      <!-- Panel 3: Operations at a glance -->
      <section class="panel" data-panel="kpis">
        <div class="p-head"><span class="accent"></span><h2>Operations</h2><span class="meta" id="kpiMeta"></span></div>
        <div class="p-body"><div id="kpiGrid"></div></div>
      </section>
      <!-- Panel 4: Bin Work Today — bins only, grouped by driver -->
      <section class="panel" data-panel="bins">
        <div class="p-head"><span class="accent"></span><h2>Bin Work Today</h2><span class="meta" id="binsMeta"></span></div>
        <div class="p-body"><div id="binsWrap"></div></div>
      </section>
    </div>
    <div id="dots"></div>
  </div>
  <div id="netdot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function(){
    "use strict";

    // ── config ──────────────────────────────────────────────────────────────
    var SUPABASE_URL = 'https://okoqzbdyfjfgcdgmcamq.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3F6YmR5ZmpmZ2NkZ21jYW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDYyNzEsImV4cCI6MjA4ODIyMjI3MX0.SQQD5HN2h179Lsqb-gxqnuTZcIXUyxrtmBP6VLOO57w';
    var DISPLAY_EMAIL = 'officetv@jeffsjunk.ca';   // ONLY this account may view the board
    var ROTATE_MS  = 20000;   // time each panel is shown
    var REFRESH_MS = 900000;  // how often data is refetched (15 min — keeps Supabase egress low; panels still rotate every 20s so the board stays lively)
    var PANELS = ['bins','schedule','kpis'];
    var WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    // Dedicated session store so this page can NEVER pick up a staff member's
    // dashboard session in the same browser — it only ever runs as the display user.
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth:{ storageKey:'jj-office-tv-auth', persistSession:true, autoRefreshToken:true, detectSessionInUrl:false }
    });

    // ── date helpers (all local time) ────────────────────────────────────────
    function pad2(n){ return String(n).padStart(2,'0'); }
    function ymd(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
    function todayStr(){ return ymd(new Date()); }
    function mondayStr(){
      var d = new Date(); var g = d.getDay();            // 0=Sun..6=Sat
      d.setDate(d.getDate() + (g===0 ? -6 : 1-g));       // back to Monday
      return ymd(d);
    }
    function todayWeekday(){ return WEEKDAYS[(new Date().getDay()+6)%7]; }
    function fmt12(t){                                    // "7:00" -> "7a", "19:00" -> "7p"
      if(!t) return '';
      var p = String(t).split(':'); var h = parseInt(p[0],10); if(isNaN(h)) return t;
      var ap = h>=12 ? 'p':'a'; var hh = h%12; if(hh===0) hh=12;
      var m = p[1] && p[1]!=='00' ? ':'+p[1] : '';
      return hh+m+ap;
    }

    // ── DOM helpers ──────────────────────────────────────────────────────────
    function el(id){ return document.getElementById(id); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function parseLocal(s){ var p=String(s).split('-'); return new Date(+p[0], (+p[1])-1, +p[2]); } // avoid UTC shift
    // pick black/white text for a given chip colour so labels stay readable on the dark board
    function readableText(hex){
      var h=String(hex||'').replace('#',''); if(h.length===3) h=h.split('').map(function(c){return c+c;}).join('');
      var n=parseInt(h,16); if(isNaN(n)) return '#fff';
      var r=(n>>16)&255, g=(n>>8)&255, b=n&255;
      return (0.299*r+0.587*g+0.114*b)/255 > 0.6 ? '#0a0f1a' : '#ffffff';
    }

    // ── state ────────────────────────────────────────────────────────────────
    var DATA = { jobs:[], crew:{}, emps:[], sched:{}, tasks:{}, inv:[], cats:{}, kpi:{}, junk:{} };
    var panelIdx = 0, rotTimer = null;

    function jobTime(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_time || j.time || '';
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_time || j.time || '';
      return j.time || j.junk_time || j.fb_time || '';
    }
    function timeMins(t){ if(!t) return 99999; var p=String(t).split(':'); return parseInt(p[0],10)*60+(parseInt(p[1],10)||0); }
    // the day a job actually happens on (junk/landscaping reschedule via junk_date, furniture via fb_date)
    function effDay(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_date || j.date;
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_date || j.date;
      return j.date;
    }
    // today's board entries — bins split into their drop-off / pick-up legs on the LEG day
    function buildTodayEntries(rows, today){
      var out=[];
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        function mk(label, time, crewIds){
          out.push({ service:label, time:time||'', name:j.name, business_name:j.business_name,
                     address:j.address, city:j.city, crewIds:(crewIds||[]).filter(Boolean) });
        }
        if(j.service==='Bin Rental'){
          if(j.bin_dropoff===today) mk('Bin Drop-off', j.bin_dropoff_time, [j.dropoff_crew_id]);
          if(j.bin_pickup===today)  mk('Bin Pick-up',  j.bin_pickup_time,  [j.pickup_crew_id]);
        } else if(effDay(j)===today){
          mk(j.service, jobTime(j), [].concat(j.assigned_crew_ids||[]));
        }
      });
      return out.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
    }
    // Today's bin legs grouped by driver. Done/not-done comes from DB state
    // only (manual pickup + geofence notifications) — the TV never calls
    // Geotab. A drop leg counts as done on a real zone visit or once the bin
    // is picked up; login's inventory auto-drop alone doesn't count.
    function buildBinBoard(rows, today, notifRows){
      var geo = {dropped:{}, pickedup:{}};
      (notifRows||[]).forEach(function(n){ if(geo[n.status]) geo[n.status][n.job_id]=1; });
      var groups = {}, keys = [];
      function push(crewId, leg){
        var key = crewId || '';
        if(!groups[key]){ groups[key] = {crewId:key, legs:[]}; keys.push(key); }
        groups[key].legs.push(leg);
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled' || j.service!=='Bin Rental') return;
        var picked = j.bin_instatus==='pickedup' || geo.pickedup[j.job_id];
        if(j.bin_dropoff===today)
          push(j.dropoff_crew_id, {kind:'drop', time:j.bin_dropoff_time||'', j:j, done: !!(picked || geo.dropped[j.job_id])});
        if(j.bin_pickup===today)
          push(j.pickup_crew_id, {kind:'pick', time:j.bin_pickup_time||'', j:j, done: !!picked});
      });
      var list = keys.map(function(k){ return groups[k]; });
      list.forEach(function(g){
        g.name = g.crewId ? (DATA.crew[g.crewId]||'Unknown') : 'Unassigned';
        g.legs.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
        g.done = g.legs.filter(function(l){ return l.done; }).length;
      });
      list.sort(function(a,b){
        if(!a.crewId && b.crewId) return -1;
        if(!b.crewId && a.crewId) return 1;
        return a.name.localeCompare(b.name);
      });
      return list;
    }

    // junk-side work per person per weekday (for schedule ghosts) — same one-way rules as the dashboard
    function buildJunkWeek(rows, monday, satEnd){
      var occ = {};
      function dayName(ds){ return WEEKDAYS[(parseLocal(ds).getDay()+6)%7]; }
      function add(cid, ds, label){
        var nm = cid && DATA.crew[cid];
        if(!nm || !ds || ds<monday || ds>satEnd) return;
        var k = nm.toLowerCase(), dn = dayName(ds);
        occ[k]=occ[k]||{}; occ[k][dn]=occ[k][dn]||{};
        occ[k][dn][label]=(occ[k][dn][label]||0)+1;
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        if(j.service==='Bin Rental'){
          add(j.dropoff_crew_id, j.bin_dropoff, 'Bins');
          add(j.pickup_crew_id,  j.bin_pickup,  'Bins');
        } else {
          var lbl = j.service==='Junk Removal' ? 'Junk'
                  : j.service==='Junk Quote' ? 'Quote'
                  : j.service==='Landscaping' ? 'Landscaping'
                  : String(j.service||'').indexOf('Furniture')===0 ? 'Furniture' : 'Junk';
          var ds = effDay(j);
          (j.assigned_crew_ids||[]).forEach(function(cid){ add(cid, ds, lbl); });
        }
      });
      return occ;
    }

    // ── data load ────────────────────────────────────────────────────────────
    async function loadAll(){
      var today = todayStr(), monday = mondayStr();
      // parseLocal, not new Date(str) — bare 'YYYY-MM-DD' parses as UTC midnight, which
      // in Toronto lands on the PREVIOUS local day and made tomorrow === today.
      var wkEnd = ymd(new Date(parseLocal(monday).getTime()+7*864e5));
      var tomorrow = ymd(new Date(parseLocal(today).getTime()+864e5));
      var satEnd = ymd(new Date(parseLocal(monday).getTime()+5*864e5));   // schedule board shows Mon–Sat
      // Local-midnight bounds for timestamptz columns — a bare 'YYYY-MM-DD' string is
      // read as UTC midnight (8 PM ET the day before), which puts evening events on
      // the wrong day.
      var dayStartIso = parseLocal(today).toISOString();
      var dayEndIso   = new Date(parseLocal(today).getTime()+864e5).toISOString();
      // month windows for the month-vs-last-year + new-clients tiles (count-only
      // queries). BOTH sides are cut at the same day-of-month (first N days vs
      // first N days) so mid-month numbers compare fairly — jobs.date is the
      // SCHEDULED day, so an uncut current month would include pre-booked future
      // jobs and inflate the comparison.
      var y = +today.slice(0,4), mo = +today.slice(5,7);
      function monthStartStr(yy,mm){ return yy+'-'+String(mm).padStart(2,'0')+'-01'; }
      var moStart = monthStartStr(y, mo);
      var lyStart = monthStartStr(y-1, mo);
      var d0 = parseLocal(today);
      var lyCut = ymd(new Date(d0.getFullYear()-1, d0.getMonth(), d0.getDate()+1));

      var res = await Promise.all([
        db.from('jobs').select('job_id,service,status,name,business_name,address,city,date,time,junk_date,junk_time,fb_date,fb_time,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_dropoff_time,bin_pickup,bin_pickup_time,bin_instatus,bin_size,bin_bid')
          .or('date.eq.'+today+',junk_date.eq.'+today+',fb_date.eq.'+today+',bin_dropoff.eq.'+today+',bin_pickup.eq.'+today),
        db.from('crew_members').select('id,name'),
        db.from('jwg_employees').select('id,name'),
        db.from('jwg_schedules').select('employee_id,schedule_data').eq('week_start', monday),
        db.from('jwg_app_settings').select('key,value').in('key',['tasks','emp_order']),
        db.from('jwg_inventory_items').select('item_name,current_stock,min_threshold,status,unit,category_id'),
        db.from('jwg_inventory_categories').select('id,name,sort_order,is_active'),
        // KPI helpers
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').eq('bin_instatus','dropped'),
        db.from('jobs').select('status').gte('date',monday).lt('date',wkEnd),
        db.from('jobs').select('completed_at').eq('completed',true).gte('completed_at',dayStartIso).lt('completed_at',dayEndIso),
        // junk-side work across the schedule week (for the crew-schedule ghosts)
        db.from('jobs').select('service,status,date,junk_date,fb_date,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_pickup')
          .or('and(date.gte.'+monday+',date.lte.'+satEnd+'),and(junk_date.gte.'+monday+',junk_date.lte.'+satEnd+'),and(fb_date.gte.'+monday+',fb_date.lte.'+satEnd+'),and(bin_dropoff.gte.'+monday+',bin_dropoff.lte.'+satEnd+'),and(bin_pickup.gte.'+monday+',bin_pickup.lte.'+satEnd+')'),
        // today's geofence enter/leave notifications — done/not-done for the bin board
        db.from('geofence_notifications').select('job_id,status').gte('created_at', dayStartIso),
        // month tiles — count-only (no row data): jobs this month so far, the same
        // days last year, and new clients this month. Jobs count by their scheduled
        // `date` (history goes back years — created_at only starts at the 2026
        // import), cut at today on BOTH sides, excluding cancelled jobs and quotes.
        db.from('jobs').select('*',{count:'exact',head:true}).gte('date',moStart).lt('date',tomorrow).neq('status','Cancelled').neq('service','Junk Quote'),
        db.from('jobs').select('*',{count:'exact',head:true}).gte('date',lyStart).lt('date',lyCut).neq('status','Cancelled').neq('service','Junk Quote'),
        db.from('clients').select('*',{count:'exact',head:true}).gte('created_at',moStart).lt('created_at',ymd(new Date(y, mo, 1)))
      ]);
      for(var i=0;i<res.length;i++){ if(res[i].error) throw new Error(res[i].error.message); }

      // jobs today — bins appear on their drop-off/pick-up day, junk on its real (junk_date) day
      DATA.jobs = buildTodayEntries(res[0].data||[], today);

      // crew id -> name
      DATA.crew = {}; (res[1].data||[]).forEach(function(c){ DATA.crew[c.id]=c.name; });

      // junk work per person/day for the schedule ghosts (needs DATA.crew, so build it here)
      DATA.junk = buildJunkWeek(res[10].data||[], monday, satEnd);

      // bin board — today's bin legs grouped by driver (needs DATA.crew)
      DATA.binBoard = buildBinBoard(res[0].data||[], today, res[11].data||[]);

      // employees + ordering
      var empName = {}; (res[2].data||[]).forEach(function(e){ empName[e.id]=e.name; });
      var settings = {}; (res[4].data||[]).forEach(function(s){ settings[s.key]=s.value; });
      var order = settings.emp_order || [];
      var ordered = [];
      order.forEach(function(id){ if(empName[id]) ordered.push({id:id,name:empName[id]}); });
      Object.keys(empName).forEach(function(id){ if(order.indexOf(id)===-1) ordered.push({id:id,name:empName[id]}); });
      DATA.emps = ordered;

      // schedules by employee_id
      DATA.sched = {}; (res[3].data||[]).forEach(function(r){ DATA.sched[r.employee_id]=r.schedule_data||{}; });

      // task id -> {label,bg,text,dot}
      DATA.tasks = {}; (settings.tasks||[]).forEach(function(t){ DATA.tasks[t.id]=t; });

      // inventory + categories
      DATA.cats = {}; (res[6].data||[]).forEach(function(c){ DATA.cats[c.id]=c; });
      DATA.inv = (res[5].data||[]).slice().sort(function(a,b){
        var ca=DATA.cats[a.category_id], cb=DATA.cats[b.category_id];
        var sa=ca?ca.sort_order:999, sb=cb?cb.sort_order:999;
        if(sa!==sb) return sa-sb;
        return String(a.item_name).localeCompare(String(b.item_name));
      });

      // KPIs
      var weekRows = res[8].data||[];
      DATA.kpi = {
        jobsToday: DATA.jobs.length,
        landToday: DATA.jobs.filter(function(j){ return j.service==='Landscaping'; }).length,
        binsOut: res[7].count||0,
        weekJobs: weekRows.filter(function(r){ return r.status!=='Cancelled'; }).length,
        completedToday: (res[9].data||[]).length,
        lowStock: DATA.inv.filter(function(it){ return (it.current_stock||0) <= (it.min_threshold||0); }).length,
        workingToday: workingTodayCount(),
        bookedMonth: res[12].count||0,
        bookedLastYear: res[13].count||0,
        newClients: res[14].count||0
      };
    }

    function workingTodayCount(){
      var wd = todayWeekday(), n=0;
      DATA.emps.forEach(function(e){
        var day = (DATA.sched[e.id]||{})[wd];
        if(day && day.status==='work') n++;
      });
      return n;
    }

    // ── renderers ────────────────────────────────────────────────────────────
    function renderSchedule(){
      var monday = parseLocal(mondayStr());
      el('schedMeta').textContent = 'Week of '+monday.toLocaleDateString(undefined,{month:'long', day:'numeric'});
      var wrap = el('schedWrap');
      var days = WEEKDAYS.slice(0,6);            // Mon–Sat
      var todayWd = todayWeekday();
      var gridCols = 'minmax(6em,1.4fr) repeat('+days.length+',1fr)';

      var head = '<div class="sched-row head" style="grid-template-columns:'+gridCols+'">'
        + '<div class="rname"></div>'
        + days.map(function(dn){
            var cls = dn===todayWd?'col today':'col';
            return '<div class="'+cls+'">'+dn.slice(0,3)+'</div>';
          }).join('') + '</div>';

      var rows = DATA.emps.map(function(e,ri){
        var sd = DATA.sched[e.id]||{};
        var jocc = DATA.junk[String(e.name||'').toLowerCase()]||{};
        var cells = days.map(function(dn){
          var day = sd[dn]; var todayCls = dn===todayWd?' today':'';
          if(!day || day.status==='off' || day.status==='dayoff'){
            // untouched day + junk-side booking → read-only ghost (a set "Day off" stays a day off)
            if((!day || day.status==='off') && jocc[dn]){
              var parts = Object.keys(jocc[dn]).map(function(l){ var n=jocc[dn][l]; return l+(n>1?' ×'+n:''); });
              return '<div class="cell jx'+todayCls+'">🚚 '+esc(parts.join(' · '))+'</div>';
            }
            return '<div class="cell off'+todayCls+'">·</div>';
          }
          if(day.status==='sick')
            return '<div class="cell'+todayCls+'" style="background-color:#3a220f;color:#f59e0b">Sick</div>';
          // working — use the first shift's first task for colour + label.
          // Fill the chip with the task colour and pick a readable text colour,
          // so even very dark task colours (e.g. "Office Closed") stay legible.
          var label='Work', col='#22c55e';
          var sh = (day.shifts||[])[0];
          if(sh && sh.tasks && sh.tasks.length){
            var tk = DATA.tasks[sh.tasks[0]];
            if(tk){ label=tk.label||label; col=tk.dot||col; }
          }
          return '<div class="cell'+todayCls+'" style="background-color:'+col+';color:'+readableText(col)+';border-color:transparent">'+esc(label)+'</div>';
        }).join('');
        return '<div class="sched-row'+(ri%2?' zebra':'')+'" style="grid-template-columns:'+gridCols+'">'
          + '<div class="rname">'+esc(e.name)+'</div>'+cells+'</div>';
      }).join('');

      wrap.innerHTML = head + rows;
    }

    function renderKpis(){
      var k = DATA.kpi;
      var now = new Date();
      el('kpiMeta').textContent = now.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});
      // jobs this month so far vs the same days last year (counts only — no money;
      // both windows are month-start → today's day-of-month, no cancelled, no quotes)
      var moName = now.toLocaleDateString(undefined,{month:'short'});
      var lyLabel = moName+' '+(now.getFullYear()-1);
      var delta = k.bookedMonth - k.bookedLastYear;
      var sub, subC;
      if(k.bookedLastYear > 0){
        var pct = Math.round(100*delta/k.bookedLastYear);
        sub = (delta>=0?'▲ ':'▼ ')+Math.abs(pct)+'% vs '+lyLabel+' same days ('+k.bookedLastYear+')';
        subC = delta>=0 ? '#22c55e' : '#ef4444';
      } else {
        sub = 'no '+lyLabel+' data yet';
        subC = 'var(--muted)';
      }
      var tiles = [
        {n:k.jobsToday,     l:'Jobs Today',        c:'#22c55e'},
        {n:k.weekJobs,      l:'Jobs This Week',    c:'#a855f7'},
        {n:k.bookedMonth,   l:'Jobs in '+moName+' so far', c:'#38bdf8', sub:sub, subC:subC},
        {n:k.newClients,    l:'New Clients in '+moName, c:'#f472b6'},
        {n:k.workingToday,  l:'Crew Scheduled Today', c:'#3b82f6'},
        {n:k.binsOut,       l:'Bins Out',          c:'#eab308'},
        {n:k.completedToday,l:'Completed Today',   c:'#10b981'},
        {n:k.lowStock,      l:'Low-Stock Items',   c: k.lowStock>0?'#ef4444':'#22c55e'}
      ];
      el('kpiGrid').innerHTML = tiles.map(function(t){
        return '<div class="kpi"><div class="num" style="--kc:'+t.c+'">'+t.n+'</div><div class="lbl">'+t.l+'</div>'
          + (t.sub ? '<div class="sub" style="color:'+t.subC+'">'+t.sub+'</div>' : '')
          + '</div>';
      }).join('');
    }

    function renderBins(){
      var board = DATA.binBoard||[];
      var total=0, done=0;
      board.forEach(function(g){ total+=g.legs.length; done+=g.done; });
      el('binsMeta').textContent = total
        ? done+' of '+total+' done · updated '+new Date().toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
        : new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
      var wrap = el('binsWrap');
      wrap.style.transform=''; wrap.style.width='';
      if(!total){
        wrap.classList.remove('two-col');
        wrap.innerHTML = '<div class="empty"><div class="big">No bin drop-offs or pick-ups today</div></div>';
        return;
      }
      wrap.classList.toggle('two-col', total > 8);
      wrap.innerHTML = board.map(function(g){
        var rows = g.legs.map(function(l){
          var j = l.j;
          var who = j.business_name || j.name || 'Customer';
          // Field priority: bin size, city, drop/pick, customer, street address last
          var sizeTxt = (j.bin_size||'').replace(/\s*yard/i,' YD');
          var extras = [j.bin_bid?('Bin '+j.bin_bid):'', l.time?fmt12(l.time):''].filter(Boolean).join(' · ');
          return '<div class="bb-row'+(l.done?' done':'')+'">'
            + '<span class="bb-size">'+esc(sizeTxt||'—')+'</span>'
            + '<span class="bb-city">'+esc(j.city||'')+'</span>'
            + '<span class="bb-kind '+(l.kind==='drop'?'k-drop':'k-pick')+'">'+(l.kind==='drop'?'🚛 Drop-off':'🚚 Pick-up')+'</span>'
            + '<span class="bb-who">'+esc(who)+'</span>'
            + (extras?'<span class="bb-extra">'+esc(extras)+'</span>':'')
            + (j.address?'<span class="bb-loc">'+esc(j.address)+'</span>':'')
            + '<span class="bb-state">'+(l.done?'✓ Done':'To do')+'</span>'
            + '</div>';
        }).join('');
        return '<div class="bb-group'+(g.crewId?'':' warn')+'">'
          + '<div class="bb-head"><span class="bb-name">'+(g.crewId?esc(g.name):'⚠️ Unassigned — needs a driver')+'</span>'
          + '<span class="bb-count">'+g.done+' / '+g.legs.length+' done</span></div>'
          + rows + '</div>';
      }).join('');
      // Fit-to-screen: the TV can't scroll, so if the board is still taller
      // than the panel after the two-column flow, shrink it just enough.
      var box = wrap.parentElement;
      if(box && wrap.scrollHeight > box.clientHeight){
        var s = Math.max(0.5, box.clientHeight / wrap.scrollHeight);
        wrap.style.transformOrigin = 'top left';
        wrap.style.transform = 'scale('+s+')';
        wrap.style.width = (100/s)+'%';
      }
    }

    function renderCurrent(){
      var name = PANELS[panelIdx];
      if(name==='bins') renderBins();
      else if(name==='schedule') renderSchedule();
      else if(name==='kpis') renderKpis();
    }

    // ── rotation ─────────────────────────────────────────────────────────────
    function buildDots(){
      el('dots').innerHTML = PANELS.map(function(_,i){ return '<div class="dot'+(i===0?' on':'')+'"></div>'; }).join('');
    }
    function showPanel(i){
      panelIdx = (i+PANELS.length)%PANELS.length;
      var name = PANELS[panelIdx];
      renderCurrent();
      var panels = document.querySelectorAll('.panel');
      panels.forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-panel')===name); });
      var dots = el('dots').children;
      for(var d=0; d<dots.length; d++) dots[d].classList.toggle('on', d===panelIdx);

    function startRotation(){
      buildDots(); showPanel(0);
      clearInterval(rotTimer);
      rotTimer = setInterval(nextPanel, ROTATE_MS);

      // reviewer pin a panel (window.__tv.show(i)) without the 20s rotation.
      if(/[?&]debug\b/.test(location.search)){

    // ── net status ───────────────────────────────────────────────────────────
    function net(ok){ el('netdot').classList.toggle('bad', !ok); }

    // ── auth: one path — must be the display account ─────────────────────────
    function parseCreds(){
      var h = (location.hash||'').replace(/^#/,'');
      if(!h) return null;
      var q = new URLSearchParams(h);
      var email = q.get('e') || q.get('u');
      var pass = q.get('p');
      return (email && pass) ? {email:email, pass:pass} : null;
    }
    function stripHash(){ history.replaceState(null,'', location.pathname + location.search); }
    function fail(msg){ el('gateSpin').style.display='none'; el('gateMsg').innerHTML = esc(msg); }

    // Stash the display credentials in memory. They arrive in the URL hash and the
    // hash is then stripped; keeping a copy lets this 24/7 board sign itself back
    // in whenever its token lapses — without waiting for a Yodeck page reload.
    var _tvCreds = null;

    async function authenticate(){
      if(!_tvCreds) _tvCreds = parseCreds();
      var sess = (await db.auth.getSession()).data.session;
      if(!sess){
        if(!_tvCreds){ fail('This screen needs the office display link. Ask an admin to set it up.'); return null; }
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        stripHash();
        if(r.error){ fail('Could not sign in. Check the display link.'); return null; }
        sess = r.data.session;
      } else { stripHash(); }
      if(!sess || (sess.user && sess.user.email !== DISPLAY_EMAIL)){
        try{ await db.auth.signOut(); }catch(e){}
        fail('This screen is for the office display only.');
        return null;
      }
      return sess;
    }

    // Every board read now needs a logged-in session (RLS lockdown, July 2). Before
    // a refresh, make sure the session is present and not about to expire; if it's
    // gone or stale, sign back in with the stashed display credentials. Without this
    // the 15-min refresh silently reads as logged-out and the board goes empty/stale.
    async function ensureFreshSession(){
      var sess = (await db.auth.getSession()).data.session;
      var leftMs = (sess && sess.expires_at) ? (sess.expires_at*1000 - Date.now()) : -1;
      if(!sess || leftMs < 120000){        // missing, expired, or expiring within 2 min
        if(!_tvCreds) _tvCreds = parseCreds();
        if(!_tvCreds) throw new Error('session lapsed and no display credentials to re-auth');
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        if(r.error) throw r.error;
      }
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    async function boot(){
      var sess = await authenticate();
      if(!sess) return;
      try{
        await loadAll(); net(true);
      }catch(e){
        console.error(e); fail('Trouble loading the board — retrying…');
        setTimeout(boot, 8000); return;
      }
      el('gate').style.display='none';
      el('shell').style.display='flex';
      tickClock(); setInterval(tickClock, 1000);
      loadWeather(); setInterval(loadWeather, 30*60*1000);
      startRotation();
      // Shop is closed Saturday 3 PM through Monday 6 AM — skip data refreshes
      // in that window so the TV pulls nothing from Supabase all weekend.
      // (Boot still loads once so a weekend restart isn't a blank board.)
      function inWeekendQuiet(){
        var n = new Date(), d = n.getDay(), h = n.getHours();
        if(d === 6 && h >= 15) return true;  // Saturday from 3 PM
        if(d === 0) return true;             // all of Sunday
        if(d === 1 && h < 6) return true;    // Monday before 6 AM
        return false;
      }
      // periodic refresh; keep showing last-good data on a blip
      setInterval(async function(){
        if(inWeekendQuiet()) return;
        try{
          await ensureFreshSession();
          await loadAll(); net(true); renderCurrent();
        }catch(e){
          console.error('refresh failed', e); net(false);
          // one recovery attempt: force a fresh sign-in, then retry the load
          try{
            if(!_tvCreds) _tvCreds = parseCreds();
            if(_tvCreds){
              var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
              if(!r.error){ await loadAll(); net(true); renderCurrent(); }
            }
          }catch(e2){ console.error('re-auth retry failed', e2); }
        }
      }, REFRESH_MS);
    }

    boot();
  })();
  </script>
</body>
