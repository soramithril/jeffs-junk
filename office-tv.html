<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jeff's Junk — Office Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ── "Roadside" office TV board — warm cream + spruce green, Baloo 2 / Hanken.
     Authored on a fixed 1920×1080 stage (design handoff) and scaled to fill any
     16:9 wall with a single transform; letterbox areas fall back to the same
     cream + dot texture so nothing shows a seam. ── */
  :root{
    --cream:#f2e9d2; --card:#fffbf0; --soft:#fdf6e6;
    --spruce:#17402a; --ink:#26311f; --gold:#e8b34a;
    --gold-ink:#a8701a; --muted:#8a8b6f; --muted-2:#7a7c5f;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0; height:100%; width:100%; overflow:hidden;
    background-color:var(--cream);
    background-image:
      radial-gradient(1150px 700px at 88% -8%, rgba(232,179,74,.22), transparent 60%),
      linear-gradient(0deg, rgba(232,179,74,.06), rgba(232,179,74,.06)),
      radial-gradient(rgba(23,64,42,.09) 2px, transparent 2.4px);
    background-size:100% 100%, 100% 100%, 30px 30px;
    background-repeat:no-repeat, no-repeat, repeat;
    color:var(--ink);
    font-family:'Baloo 2', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; cursor:none;
  }

  @keyframes pdSpin{to{transform:rotate(360deg)}}
  @keyframes pdHaze{0%,100%{opacity:.7}50%{opacity:.96}}
  @keyframes truckRoll{0%{transform:translateX(0)}50%{transform:translateX(26px)}100%{transform:translateX(0)}}
  @keyframes pulseWarn{0%,100%{box-shadow:0 8px 0 rgba(217,83,43,.2)}50%{box-shadow:0 8px 0 rgba(217,83,43,.2),0 0 0 6px rgba(217,83,43,.14)}}

  /* ── Startup / Standby (also the access-gate + error state) ── */
  #gate{
    position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px; padding:60px; text-align:center;
    background:radial-gradient(1200px 720px at 50% 30%, #1e5335, #12301f 72%, #0d2417);
    color:var(--cream);
  }
  #gate .gate-dots{position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 2px, transparent 2.4px); background-size:34px 34px}
  #gate .gate-spin{position:relative; width:150px; height:150px; border-radius:50%;
    border:9px solid rgba(232,179,74,.25); border-top-color:var(--gold); animation:pdSpin 1.1s linear infinite}
  #gate .gate-truck{position:relative; width:440px; animation:truckRoll 4.5s ease-in-out infinite;
    filter:drop-shadow(0 16px 20px rgba(0,0,0,.35))}
  #gate .gate-h{position:relative; font:800 84px/1 'Baloo 2'; color:var(--soft); margin-top:14px}
  #gate .gate-sub{position:relative; font:600 34px/1.3 'Hanken Grotesk'; color:#9fc9ad; max-width:22em}
  #gate .gate-pulse{position:relative; display:flex; gap:16px; margin-top:10px}
  #gate .gate-pulse span{width:20px; height:20px; border-radius:50%; background:var(--gold);
    animation:pdHaze 1.2s ease-in-out infinite}
  #gate .gate-pulse span:nth-child(2){animation-delay:.2s}
  #gate .gate-pulse span:nth-child(3){animation-delay:.4s}
  #gate .gate-foot{position:absolute; left:0; right:0; bottom:46px;
    display:flex; align-items:center; justify-content:center; gap:16px}
  #gate .gate-foot img{height:60px; opacity:.9}
  #gate .gate-foot span{font:700 22px/1 'Hanken Grotesk'; letter-spacing:.24em; text-transform:uppercase; color:#7fa88d}

  /* ── the 1920×1080 board, centred + scaled to the viewport ── */
  #viewport{position:fixed; inset:0; display:none; align-items:center; justify-content:center; overflow:hidden; z-index:1}
  #board{
    position:relative; flex:0 0 auto; width:1920px; height:1080px; overflow:hidden;
    background-color:var(--cream);
    background-image:
      radial-gradient(1150px 700px at 88% -8%, rgba(232,179,74,.22), transparent 60%),
      linear-gradient(0deg, rgba(232,179,74,.06), rgba(232,179,74,.06)),
      radial-gradient(rgba(23,64,42,.09) 2px, transparent 2.4px);
    background-size:100% 100%, 100% 100%, 30px 30px;
    background-repeat:no-repeat, no-repeat, repeat;
    display:flex; flex-direction:column; padding:44px 50px; gap:24px;
    transform:scale(var(--s,1)); transform-origin:center center;
  }
  /* ambient brand art — truck tucked under the weather box (top-right) with a bin
     snug to its left (a random one of our board renders each page load). Both lifted
     above the panels (z-index) so they ride on top of everything. Gentle roll / bob. */
  #tvtruck{position:absolute; top:150px; right:280px; width:160px; z-index:5; opacity:1;
    pointer-events:none; animation:truckRoll 5s ease-in-out infinite;
    filter:drop-shadow(0 8px 10px rgba(60,74,58,.28))}
  #tvbin{position:absolute; top:150px; right:452px; width:160px; z-index:5; opacity:1;
    pointer-events:none; animation:bob 3.2s ease-in-out infinite;
    filter:drop-shadow(0 8px 10px rgba(60,74,58,.28))}
  #topbar{position:relative; z-index:2}
  #stage{z-index:1}

  /* ── shared header chrome ── */
  #topbar{display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:var(--spruce); border-radius:30px; padding:16px 32px; box-shadow:0 9px 0 rgba(11,38,24,.32); flex:0 0 auto}
  #brand{display:flex; align-items:center; gap:22px; min-width:0}
  #brand img{height:94px; display:block; flex:0 0 auto; filter:drop-shadow(0 3px 5px rgba(11,38,24,.3))}
  .brand-name{font:800 50px/1 'Baloo 2'; color:var(--soft); letter-spacing:.01em}
  .brand-sub{font:700 20px/1 'Hanken Grotesk'; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); margin-top:7px}
  #tright{display:flex; align-items:center; gap:16px; flex:0 0 auto}
  #wx{display:none; align-items:center; gap:11px; background:var(--gold); border-radius:20px; padding:13px 22px}
  #wx.on{display:flex}
  #wx .i{font-size:32px; line-height:1}
  #wx .t{font:700 36px/1 'Baloo 2'; color:var(--ink); font-variant-numeric:tabular-nums}
  #wx .hl{font:600 17px/1.15 'Hanken Grotesk'; color:#5a4a1e; white-space:nowrap}
  #clock{background:var(--soft); border-radius:20px; padding:11px 26px; text-align:right}
  #clock .t{font:700 40px/1 'Baloo 2'; color:var(--spruce); font-variant-numeric:tabular-nums}
  #clock .d{font:600 16px/1 'Hanken Grotesk'; color:#8a7f5f; letter-spacing:.06em; margin-top:5px}

  /* ── panels ── */
  #stage{position:relative; flex:1 1 auto; min-height:0}
  .panel{position:absolute; inset:0; display:flex; flex-direction:column; gap:24px; min-height:0;
    opacity:0; visibility:hidden; transition:opacity .5s ease, visibility .5s}
  .panel.on{opacity:1; visibility:visible}
  .p-head{display:flex; align-items:center; gap:20px; padding:0 4px; flex:0 0 auto}
  .p-head .bar{width:15px; height:46px; background:var(--gold); border-radius:6px; flex:0 0 auto}
  .p-head h2{margin:0; font:700 54px/1 'Baloo 2'; color:var(--spruce); white-space:nowrap}
  .p-head .tag{font:700 25px/1 'Baloo 2'; color:var(--ink); background:var(--gold); border-radius:15px;
    padding:9px 20px; box-shadow:0 5px 0 rgba(23,64,42,.16); flex:0 0 auto}
  .p-head .spacer{flex:1}
  .p-head .status{font:600 23px/1 'Hanken Grotesk'; color:var(--muted-2); white-space:nowrap; flex:0 0 auto}
  .p-body{flex:1 1 auto; min-height:0}

  /* ── Screen 1 · Bin Work Today ── */
  #binsWrap{height:100%; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:24px}
  .bb-group{background:var(--card); border-radius:28px; box-shadow:0 8px 0 rgba(23,64,42,.13);
    overflow:hidden; display:flex; flex-direction:column; min-height:0}
  .bb-group.warn{background:#fbeee7; border:2px solid #eaa588; animation:pulseWarn 2.4s ease-in-out infinite}
  .bb-strip{display:flex; align-items:center; justify-content:space-between; padding:13px 26px; flex:0 0 auto}
  .bb-name{font:700 34px/1 'Baloo 2'; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-count{font:700 21px/1 'Baloo 2'; background:#fff; border-radius:14px; padding:6px 16px; flex:0 0 auto}
  /* --cs scales the leg rows (1 = full size); fitBins() dials it down per card so
     every drop-off/pick-up fits with no clipping. At --cs:1 this is pixel-identical
     to the original. */
  .bb-body{--cs:1; flex:1 1 auto; min-height:0; padding:6px 24px; display:flex; flex-direction:column; justify-content:space-around; overflow:hidden}
  .bb-row{display:grid; grid-template-columns:calc(110px*var(--cs)) minmax(0,1fr) calc(112px*var(--cs)) calc(132px*var(--cs)); align-items:center; gap:calc(16px*var(--cs)); padding:calc(8px*var(--cs)) 0}
  .bb-row:not(.last){border-bottom:2px dotted rgba(38,49,31,.14)}
  /* Done legs read as COMPLETED (Jake 2026-07-07): a soft green wash behind the
     leg + the name struck through + badges dimmed — a clean "crossed off" that
     doesn't slash a hard line through the badges/pills. Keeps the ✓ Done pill. */
  .bb-row.done{opacity:1; position:relative}
  .bb-row.done::before{content:''; position:absolute; inset:calc(3px*var(--cs)) 0; background:rgba(47,138,78,.11);
    border-radius:calc(13px*var(--cs)); z-index:0; pointer-events:none}
  .bb-row.done > *{position:relative; z-index:1}
  .bb-row.done .bb-city{text-decoration:line-through; text-decoration-color:#2f8a4e; text-decoration-thickness:calc(3px*var(--cs)); text-underline-offset:calc(1px*var(--cs)); color:#63705a}
  .bb-row.done .bb-who{text-decoration:line-through; text-decoration-color:rgba(47,138,78,.5); color:var(--muted)}
  .bb-row.done .bb-size{opacity:.5}
  .bb-size{font-weight:700; font-family:'Baloo 2'; font-size:calc(26px*var(--cs)); line-height:1; color:#b06a1a; background:#fbeecb; border:2px solid var(--gold);
    border-radius:13px; padding:calc(8px*var(--cs)) 4px; text-align:center}
  .bb-size.warn{background:#fff3d8}
  .bb-dest{min-width:0; display:flex; flex-direction:column; gap:3px}
  .bb-city{font-weight:700; font-family:'Baloo 2'; font-size:calc(31px*var(--cs)); line-height:1; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-who{font-weight:600; font-family:'Hanken Grotesk'; font-size:calc(18px*var(--cs)); line-height:1.1; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-kind{font-weight:700; font-family:'Hanken Grotesk'; font-size:calc(18px*var(--cs)); line-height:1; letter-spacing:.05em; text-transform:uppercase; border-radius:12px; padding:calc(8px*var(--cs)) 0; text-align:center}
  .bb-kind.k-drop{color:#2f7d8f; background:#e2eff2}
  .bb-kind.k-pick{color:#c25f8f; background:#f6e6ef}
  .bb-state{font-weight:700; font-family:'Baloo 2'; font-size:calc(20px*var(--cs)); line-height:1; border-radius:14px; padding:calc(9px*var(--cs)) 0; text-align:center}
  .bb-state.s-done{color:#2f8a4e; background:#e4f3e8}
  .bb-state.s-todo{color:var(--gold-ink); background:#fbeecb}
  .bb-state.s-assign{color:#fff; background:#d9532b}
  .bins-empty{height:100%; display:flex; align-items:center; justify-content:center;
    font:700 56px/1.15 'Baloo 2'; color:var(--muted); text-align:center; padding:0 8%}

  /* ── Screen 2 · Crew · This Week ── */
  #schedWrap{height:100%; display:grid; gap:10px}
  .day{display:flex; align-items:center; justify-content:center; font:700 27px/1 'Baloo 2';
    color:#5f6650; background:#e6dcc0; border-radius:14px}
  .day.today{flex-direction:column; color:var(--spruce); background:var(--gold); box-shadow:0 5px 0 rgba(23,64,42,.18)}
  .day.today .tlab{font:700 13px/1 'Hanken Grotesk'; letter-spacing:.16em; margin-top:4px}
  .rname{display:flex; align-items:center; gap:13px; padding:0 22px; background:var(--spruce); border-radius:14px; overflow:hidden}
  .rname .pdot{width:15px; height:15px; border-radius:50%; flex:0 0 auto}
  .rname .pn{font:700 29px/1 'Baloo 2'; color:var(--soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cell{display:flex; align-items:center; justify-content:center; border-radius:14px; overflow:hidden; text-align:center}
  .cell.work{flex-direction:column; gap:2px; background:var(--card); box-shadow:0 5px 0 rgba(23,64,42,.1); padding:0 6px}
  .cell.work .wt{font:700 24px/1.05 'Baloo 2'; color:var(--spruce)}
  .cell.work .wl{font:600 15px/1.1 'Hanken Grotesk'; color:var(--muted); max-width:100%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cell.work.today{background:#fff7e6; box-shadow:inset 0 0 0 2.5px var(--gold)}
  .cell.work.today .wt{color:var(--spruce)}
  .cell.work.today .wl{color:var(--gold-ink)}
  .cell.off{background:rgba(38,49,31,.05); color:#b3b0a0; font:700 22px/1 'Baloo 2'}
  .cell.off.today{box-shadow:inset 0 0 0 2.5px rgba(232,179,74,.5)}
  .cell.sick{background:#f6e6cf; color:var(--gold-ink); font:700 22px/1 'Baloo 2'}
  .cell.jx{background:#e7eef3; color:#4f7688; font:600 16px/1.15 'Hanken Grotesk'; padding:0 8px}

  /* ── entrance animations: each screen "comes alive" as it rotates in ──
     (Operations/kpis intentionally NOT animated — it's getting its own overhaul).
     Items are rebuilt every rotation (renderCurrent) so this replays each time;
     `--i` (set per item in the renderers) staggers them. GPU-cheap for the TV. */
  @keyframes tvIn{ from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:none} }
  .panel[data-panel="bins"] .bb-group,
  .panel[data-panel="schedule"] .day,
  .panel[data-panel="schedule"] .rname,
  .panel[data-panel="schedule"] .cell{ animation:tvIn .55s both; animation-delay:calc(var(--i,0) * 55ms) }
  .panel[data-panel="bins"] .bb-row{ animation:tvIn .5s both; animation-delay:calc(var(--i,0) * 45ms + 120ms) }
  /* crew grid is a fixed 7-column grid (name + Mon–Sat) — stagger columns L→R */
  #schedWrap > :nth-child(7n+2){--i:1} #schedWrap > :nth-child(7n+3){--i:2}
  #schedWrap > :nth-child(7n+4){--i:3} #schedWrap > :nth-child(7n+5){--i:4}
  #schedWrap > :nth-child(7n+6){--i:5} #schedWrap > :nth-child(7n+7){--i:6}

  /* ── Screen 3 · Operations — "Beat Last July" scoreboard ── */
  @keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes growY{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  @keyframes celebrate{0%,100%{box-shadow:0 8px 0 rgba(23,64,42,.13),inset 0 0 0 3px rgba(232,179,74,.9)}
    50%{box-shadow:0 8px 0 rgba(23,64,42,.13),inset 0 0 0 3px rgba(232,179,74,.9),0 0 40px rgba(232,179,74,.45)}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(232,179,74,0)}50%{box-shadow:0 0 36px rgba(232,179,74,.6)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  /* bins-out pill lives in the panel head (kpiMeta) */
  #kpiMeta .binsout{display:inline-flex;align-items:center;gap:12px;background:var(--spruce);
    border-radius:16px;padding:8px 20px;vertical-align:middle}
  #kpiMeta .binsout b{font:800 40px/1 'Baloo 2';color:var(--gold);font-variant-numeric:tabular-nums}
  #kpiMeta .binsout span{font:700 18px/1.1 'Hanken Grotesk';letter-spacing:.09em;text-transform:uppercase;color:#cfe0d4}

  /* ── 2A standings lanes (default) ── */
  #kpiGrid{height:100%;display:flex;flex-direction:column;gap:22px}
  .opsl{position:relative;flex:1 1 0;min-height:0;display:flex;align-items:stretch;background:var(--card);
    border-radius:26px;box-shadow:0 8px 0 rgba(23,64,42,.13);overflow:hidden}
  .opsl.beat{background:#fff7e6;animation:celebrate 2.6s ease-in-out infinite}
  .opsl .accent{width:14px;flex:0 0 auto}
  .opsl .who{flex:0 0 320px;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:20px 30px}
  .opsl .who .nm{font:800 42px/1 'Baloo 2';color:var(--ink)}
  .opsl .who .beatchip{align-self:flex-start;font:800 18px/1 'Baloo 2';color:var(--spruce);background:var(--gold);
    border-radius:11px;padding:5px 13px;box-shadow:0 4px 0 rgba(23,64,42,.16)}
  .opsl .who .pc{font:700 20px/1 'Hanken Grotesk'}
  .opsl .who .pc em{color:var(--muted);font-weight:600;font-style:normal}
  .opsl .mid{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:18px 30px 18px 6px}
  .opsl .mid .big{display:flex;align-items:baseline;gap:14px}
  .opsl .mid .big .n{font:800 96px/.82 'Baloo 2';font-variant-numeric:tabular-nums}
  .opsl .mid .big .lab{font:700 22px/1.15 'Hanken Grotesk';color:var(--muted-2)}
  .opsl .bar{position:relative;height:28px;background:#ece3ca;border-radius:999px;margin:2px 0}
  .opsl .bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px;z-index:2;transform-origin:left;animation:growX 1s ease .1s both}
  .opsl .bar .ghost{position:absolute;top:0;bottom:0;border:2px dashed;border-left:none;border-radius:0 999px 999px 0;z-index:1}
  .opsl .bar .tick{position:absolute;top:-9px;bottom:-9px;width:4px;background:var(--spruce);border-radius:2px;z-index:3}
  .opsl .bar .tl{position:absolute;bottom:-27px;transform:translateX(-50%);font:700 15px/1 'Hanken Grotesk';color:var(--spruce);white-space:nowrap}
  .opsl .bar .pl{position:absolute;top:-26px;transform:translateX(-50%);font:800 15px/1 'Hanken Grotesk';white-space:nowrap}
  .opsl .verd{flex:0 0 300px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:11px;padding:20px 30px 20px 0}
  .opsl .verd .pill{font:800 28px/1 'Baloo 2';border-radius:14px;padding:10px 20px;white-space:nowrap}
  .opsl .verd .sub{font:700 21px/1.2 'Hanken Grotesk';text-align:right;white-space:nowrap}
  .opsl .verd .ok{color:#2f8a4e;background:#e4f3e8}
  .opsl .verd .no{color:var(--gold-ink);background:#fbeecb}

  /* ── 2B race arena (celebration takeover) ── */
  .opsa{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;padding:30px 56px 26px;
    background:linear-gradient(160deg,#1e5335,#12301f 82%);border-radius:28px;box-shadow:0 9px 0 rgba(11,38,24,.3)}
  .opsa::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.05) 2px,transparent 2.4px);background-size:34px 34px}
  .opsa-head{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .opsa-head .t{font:800 36px/1 'Baloo 2';color:var(--soft);white-space:nowrap}
  .opsa-head .lg{font:700 19px/1 'Hanken Grotesk';letter-spacing:.14em;text-transform:uppercase;color:#8fb69c;white-space:nowrap}
  .opsa-field{position:relative;flex:1 1 auto}
  .opsa-line{position:absolute;left:0;right:0;top:26%;border-top:3px dashed var(--gold);z-index:4}
  .opsa-line .fin,.opsa-line .last{position:absolute;top:-16px;font:800 17px/1 'Hanken Grotesk';letter-spacing:.12em;
    color:#12301f;background:var(--gold);border-radius:9px;padding:5px 13px;white-space:nowrap}
  .opsa-line .fin{left:0}.opsa-line .last{right:0}
  .opsa-cols{position:absolute;left:0;right:0;top:0;bottom:118px;display:flex;justify-content:space-around;align-items:flex-end}
  .opsa-caps{position:absolute;left:0;right:0;bottom:0;height:104px;display:flex;justify-content:space-around}
  .opsa-col{position:relative;flex:0 0 260px;height:100%;display:flex;justify-content:center;align-items:flex-end}
  .opsa-fx{position:absolute;top:1%;font-size:32px;animation:bob 2.2s ease-in-out infinite}
  .opsa-track{position:relative;width:150px;height:100%;background:rgba(255,255,255,.07);border-radius:18px}
  .opsa-fill{position:absolute;left:0;right:0;bottom:0;border-radius:16px;transform-origin:bottom;animation:growY 1.1s ease .15s both}
  .opsa-fill.beat{animation:growY 1.1s ease .15s both,glowPulse 2.4s ease-in-out infinite}
  .opsa-ghost{position:absolute;left:0;right:0;border:2px dashed;border-bottom:none;border-radius:14px 14px 0 0}
  .opsa-projlab{position:absolute;left:0;right:0;text-align:center;transform:translateY(-9px);font:800 17px/1 'Hanken Grotesk'}
  .opsa-num{position:absolute;left:0;right:0;text-align:center;transform:translateY(-12px);font:800 62px/1 'Baloo 2';font-variant-numeric:tabular-nums}
  .opsa-num.top{top:5%;transform:none}
  .opsa-num .bt{font:800 22px/1 'Baloo 2';color:#12301f;letter-spacing:.04em;margin-bottom:4px}
  .opsa-col-cap{flex:0 0 260px;text-align:center}
  .opsa-col-cap .nm{font:800 30px/1 'Baloo 2';color:var(--soft)}
  .opsa-col-cap .vs{font:600 18px/1.3 'Hanken Grotesk';color:#9fc9ad;margin-top:6px}
  .opsa-col-cap .vd{font:800 19px/1.2 'Hanken Grotesk';margin-top:6px}

  /* ── Screen 4 · Trucks on the Road — live Geotab map + today's pulse ──
     Positions are READ-ONLY (geotab-proxy `device-status`, the same feed the
     dashboard's Live Jobs map uses). The TV never writes to jobs or MyGeotab. */
  #opsWrap{height:100%; display:flex; min-height:0}
  .lo-card{flex:1 1 auto; background:var(--card); border-radius:28px; box-shadow:0 8px 0 rgba(23,64,42,.13);
    overflow:hidden; display:flex; flex-direction:column; min-height:0}
  #tvmap{flex:1 1 auto; min-height:0; background:#dfe4da}
  /* pull the raw OSM tiles toward the board's warm palette so the map reads as ours */
  .leaflet-container{font-family:'Hanken Grotesk',sans-serif; background:#dfe4da}
  .leaflet-tile-pane{filter:saturate(.6) brightness(1.06) contrast(.92) sepia(.12)}
  .leaflet-control-attribution{font:600 11px/1.4 'Hanken Grotesk'; background:rgba(255,251,240,.78); color:#7a7c5f}
  .leaflet-control-attribution a{color:#7a7c5f}
  /* Truck pin — the mockup's marker, scaled 1.5x for the 1920-wide board:
     glossed disc, white ring, name chip, and a ping ring while it's moving. */
  @keyframes tkping{0%{transform:scale(.7);opacity:.85}100%{transform:scale(2.1);opacity:0}}
  .lo-tk{position:relative; display:flex; flex-direction:column; align-items:center; gap:5px}
  .lo-tk .b{position:relative; display:grid; place-items:center; width:45px; height:45px; border-radius:50%;
    box-shadow:0 9px 24px rgba(0,0,0,.30), 0 0 0 5px var(--card), 0 0 0 9px rgba(23,64,42,.07)}
  .lo-tk .b svg{width:24px; height:24px; stroke:#fff; fill:none; stroke-width:2;
    stroke-linecap:round; stroke-linejoin:round}
  .lo-tk .ping{position:absolute; inset:-8px; border-radius:50%; border:3px solid currentColor;
    animation:tkping 1.7s ease-out infinite; pointer-events:none}
  .lo-tk .n{background:var(--card); border:1px solid rgba(23,64,42,.12); border-radius:9px;
    padding:3px 11px; font:700 16px/1.15 'Hanken Grotesk';
    color:var(--ink); white-space:nowrap; box-shadow:0 3px 12px rgba(23,64,42,.20)}
  /* the truck the map is currently focused on */
  .lo-tk.sel .b{width:57px; height:57px}
  .lo-tk.sel .b svg{width:30px; height:30px}
  .lo-yard{width:22px; height:22px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 0 4px var(--card), 0 4px 10px rgba(23,64,42,.3)}
  /* Focused-truck card. A permanent Leaflet tooltip, so it rides with the pin —
     there's no cursor on a wall, so nothing could ever hover it. */
  .leaflet-tooltip.lo-pop{background:none; border:0; box-shadow:none; padding:0; margin:0;
    white-space:normal}
  .leaflet-tooltip.lo-pop::before{display:none}
  .lo-pop .card{width:250px; background:var(--card); border-radius:15px; overflow:hidden;
    box-shadow:0 16px 38px rgba(23,64,42,.32)}
  .lo-pop .hd{display:flex; align-items:center; gap:10px; padding:10px 15px}
  .lo-pop .hd .nm{font:700 23px/1 'Baloo 2'; color:#fff}
  .lo-pop .hd .st{margin-left:auto; font:700 12px/1 'Hanken Grotesk'; letter-spacing:.09em;
    text-transform:uppercase; color:#fff; background:rgba(255,255,255,.26);
    border-radius:20px; padding:5px 11px}
  .lo-pop .rw{display:flex; justify-content:space-between; align-items:baseline; gap:16px;
    padding:8px 15px 0; font:600 16px/1.2 'Hanken Grotesk'; color:var(--muted)}
  .lo-pop .rw:last-child{padding-bottom:12px}
  .lo-pop .rw b{color:var(--ink); font-weight:700}
  /* jobs-left progress, the mockup's .jjbar scaled up */
  .lo-pop .bar{height:9px; border-radius:5px; background:#ece3ca; overflow:hidden; margin:7px 15px 0}
  .lo-pop .bar i{display:block; height:100%; border-radius:5px}
  .lo-pop .cap{font:600 13px/1 'Hanken Grotesk'; color:var(--muted); text-align:right; margin:6px 15px 0}
  /* Legend sits ON the map, bottom-left. It can't live in the panel head: the
     ambient truck/bin art (#tvtruck/#tvbin, z-index 5) is parked over that exact
     spot and buries it. */
  .lo-card{position:relative}
  #loLegend{position:absolute; left:20px; bottom:20px; z-index:400; display:flex; gap:18px;
    background:rgba(255,251,240,.94); border-radius:14px; padding:11px 17px;
    box-shadow:0 5px 14px rgba(23,64,42,.22)}
  #loLegend b{display:flex; align-items:center; gap:9px; font:700 18px/1 'Hanken Grotesk'; color:var(--muted-2)}
  #loLegend i{width:13px; height:13px; border-radius:50%}
  /* Trail — the mockup's flowing dashed route line, scaled 1.5x for this board.
     The dash offset animates, so the path reads as movement even once drawn. */
  @keyframes trailflow{to{stroke-dashoffset:-34}}
  .lo-trail{stroke-dasharray:9 8; animation:trailflow .8s linear infinite}
  /* where the focused truck is, top-right of the map */
  #loTown{position:absolute; right:20px; top:20px; z-index:400; display:none; align-items:center; gap:12px;
    background:var(--spruce); border-radius:16px; padding:12px 20px; box-shadow:0 6px 16px rgba(23,64,42,.3)}
  #loTown.on{display:flex}
  #loTown .k{font:700 14px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#8fb69c}
  #loTown .v{font:700 30px/1 'Baloo 2'; color:var(--soft)}

  /* today's job counts ride in the panel head — the map gets the whole body */
  #loCount{color:var(--gold-ink)}

  /* ── 9 AM briefing card ── */
  #brief{position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center;
    background:rgba(18,48,31,.82); backdrop-filter:blur(6px)}
  #brief.on{display:flex}
  #brief .card{width:min(1200px,74vw); background:var(--card); border-radius:34px; padding:54px 62px;
    box-shadow:0 30px 80px rgba(11,38,24,.5); text-align:center}
  #brief .k{font:700 22px/1 'Hanken Grotesk'; letter-spacing:.24em; text-transform:uppercase;
    color:var(--gold-ink)}
  #brief .t{font:700 46px/1.35 'Baloo 2'; color:var(--spruce); margin-top:22px}
  #brief .warn{font:600 20px/1.4 'Hanken Grotesk'; color:#b06a1a; margin-top:26px}

  /* ── net-status pip ── */
  #netdot{position:fixed; bottom:14px; right:14px; width:12px; height:12px; border-radius:50%;
    background:#2f8a4e; opacity:.5; transition:background .3s, opacity .3s; z-index:50}
  #netdot.bad{background:#d9532b; opacity:1}
</style>
