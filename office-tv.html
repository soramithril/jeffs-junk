<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Jeff's Junk — Office Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── "Roadside" office TV board — warm cream + spruce green, Baloo 2 / Hanken.
     Authored on a fixed 1920×1080 stage (design handoff) and scaled to fill any
     16:9 wall with a single transform; letterbox areas fall back to the same
     cream + dot texture so nothing shows a seam. ── */
  :root{
    --cream:#f2e9d2; --card:#fffbf0; --soft:#fdf6e6;
    --spruce:#17402a; --ink:#26311f; --gold:#e8b34a;
    --gold-ink:#a8701a; --muted:#8a8b6f; --muted-2:#7a7c5f;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0; height:100%; width:100%; overflow:hidden;
    background:var(--cream);
    background-image:radial-gradient(rgba(23,64,42,.09) 2px, transparent 2.4px);
    background-size:30px 30px;
    color:var(--ink);
    font-family:'Baloo 2', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; cursor:none;
  }

  @keyframes pdSpin{to{transform:rotate(360deg)}}
  @keyframes pdHaze{0%,100%{opacity:.7}50%{opacity:.96}}
  @keyframes truckRoll{0%{transform:translateX(0)}50%{transform:translateX(26px)}100%{transform:translateX(0)}}
  @keyframes pulseWarn{0%,100%{box-shadow:0 8px 0 rgba(217,83,43,.2)}50%{box-shadow:0 8px 0 rgba(217,83,43,.2),0 0 0 6px rgba(217,83,43,.14)}}

  /* ── Startup / Standby (also the access-gate + error state) ── */
  #gate{
    position:fixed; inset:0; z-index:100; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px; padding:60px; text-align:center;
    background:radial-gradient(1200px 720px at 50% 30%, #1e5335, #12301f 72%, #0d2417);
    color:var(--cream);
  }
  #gate .gate-dots{position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 2px, transparent 2.4px); background-size:34px 34px}
  #gate .gate-spin{position:relative; width:150px; height:150px; border-radius:50%;
    border:9px solid rgba(232,179,74,.25); border-top-color:var(--gold); animation:pdSpin 1.1s linear infinite}
  #gate .gate-truck{position:relative; width:440px; animation:truckRoll 4.5s ease-in-out infinite;
    filter:drop-shadow(0 16px 20px rgba(0,0,0,.35))}
  #gate .gate-h{position:relative; font:800 84px/1 'Baloo 2'; color:var(--soft); margin-top:14px}
  #gate .gate-sub{position:relative; font:600 34px/1.3 'Hanken Grotesk'; color:#9fc9ad; max-width:22em}
  #gate .gate-pulse{position:relative; display:flex; gap:16px; margin-top:10px}
  #gate .gate-pulse span{width:20px; height:20px; border-radius:50%; background:var(--gold);
    animation:pdHaze 1.2s ease-in-out infinite}
  #gate .gate-pulse span:nth-child(2){animation-delay:.2s}
  #gate .gate-pulse span:nth-child(3){animation-delay:.4s}
  #gate .gate-foot{position:absolute; left:0; right:0; bottom:46px;
    display:flex; align-items:center; justify-content:center; gap:16px}
  #gate .gate-foot img{height:60px; opacity:.9}
  #gate .gate-foot span{font:700 22px/1 'Hanken Grotesk'; letter-spacing:.24em; text-transform:uppercase; color:#7fa88d}

  /* ── the 1920×1080 board, centred + scaled to the viewport ── */
  #viewport{position:fixed; inset:0; display:none; align-items:center; justify-content:center; overflow:hidden; z-index:1}
  #board{
    position:relative; flex:0 0 auto; width:1920px; height:1080px; overflow:hidden;
    background:var(--cream);
    background-image:radial-gradient(rgba(23,64,42,.09) 2px, transparent 2.4px); background-size:30px 30px;
    display:flex; flex-direction:column; padding:44px 50px; gap:24px;
    transform:scale(var(--s,1)); transform-origin:center center;
  }

  /* ── shared header chrome ── */
  #topbar{display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:var(--spruce); border-radius:30px; padding:16px 32px; box-shadow:0 9px 0 rgba(11,38,24,.32); flex:0 0 auto}
  #brand{display:flex; align-items:center; gap:22px; min-width:0}
  #brand img{height:94px; display:block; flex:0 0 auto; filter:drop-shadow(0 3px 5px rgba(11,38,24,.3))}
  .brand-name{font:800 50px/1 'Baloo 2'; color:var(--soft); letter-spacing:.01em}
  .brand-sub{font:700 20px/1 'Hanken Grotesk'; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); margin-top:7px}
  #tright{display:flex; align-items:center; gap:16px; flex:0 0 auto}
  #wx{display:none; align-items:center; gap:11px; background:var(--gold); border-radius:20px; padding:13px 22px}
  #wx.on{display:flex}
  #wx .i{font-size:32px; line-height:1}
  #wx .t{font:700 36px/1 'Baloo 2'; color:var(--ink); font-variant-numeric:tabular-nums}
  #wx .hl{font:600 17px/1.15 'Hanken Grotesk'; color:#5a4a1e; white-space:nowrap}
  #clock{background:var(--soft); border-radius:20px; padding:11px 26px; text-align:right}
  #clock .t{font:700 40px/1 'Baloo 2'; color:var(--spruce); font-variant-numeric:tabular-nums}
  #clock .d{font:600 16px/1 'Hanken Grotesk'; color:#8a7f5f; letter-spacing:.06em; margin-top:5px}

  /* ── panels ── */
  #stage{position:relative; flex:1 1 auto; min-height:0}
  .panel{position:absolute; inset:0; display:flex; flex-direction:column; gap:24px; min-height:0;
    opacity:0; visibility:hidden; transition:opacity .5s ease, visibility .5s}
  .panel.on{opacity:1; visibility:visible}
  .p-head{display:flex; align-items:center; gap:20px; padding:0 4px; flex:0 0 auto}
  .p-head .bar{width:15px; height:46px; background:var(--gold); border-radius:6px; flex:0 0 auto}
  .p-head h2{margin:0; font:700 54px/1 'Baloo 2'; color:var(--spruce); white-space:nowrap}
  .p-head .tag{font:700 25px/1 'Baloo 2'; color:var(--ink); background:var(--gold); border-radius:15px;
    padding:9px 20px; box-shadow:0 5px 0 rgba(23,64,42,.16); flex:0 0 auto}
  .p-head .spacer{flex:1}
  .p-head .status{font:600 23px/1 'Hanken Grotesk'; color:var(--muted-2); white-space:nowrap; flex:0 0 auto}
  .p-body{flex:1 1 auto; min-height:0}

  /* ── Screen 1 · Bin Work Today ── */
  #binsWrap{height:100%; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:24px}
  .bb-group{background:var(--card); border-radius:28px; box-shadow:0 8px 0 rgba(23,64,42,.13);
    overflow:hidden; display:flex; flex-direction:column; min-height:0}
  .bb-group.warn{background:#fbeee7; border:2px solid #eaa588; animation:pulseWarn 2.4s ease-in-out infinite}
  .bb-strip{display:flex; align-items:center; justify-content:space-between; padding:13px 26px; flex:0 0 auto}
  .bb-name{font:700 34px/1 'Baloo 2'; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-count{font:700 21px/1 'Baloo 2'; background:#fff; border-radius:14px; padding:6px 16px; flex:0 0 auto}
  .bb-body{flex:1 1 auto; min-height:0; padding:6px 24px; display:flex; flex-direction:column; justify-content:space-around; overflow:hidden}
  .bb-row{display:grid; grid-template-columns:110px minmax(0,1fr) 112px 132px; align-items:center; gap:16px; padding:8px 0}
  .bb-row:not(.last){border-bottom:2px dotted rgba(38,49,31,.14)}
  .bb-row.done{opacity:.5}
  .bb-size{font:700 26px/1 'Baloo 2'; color:#b06a1a; background:#fbeecb; border:2px solid var(--gold);
    border-radius:13px; padding:8px 4px; text-align:center}
  .bb-size.warn{background:#fff3d8}
  .bb-dest{min-width:0; display:flex; flex-direction:column; gap:3px}
  .bb-city{font:700 31px/1 'Baloo 2'; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-who{font:600 18px/1.1 'Hanken Grotesk'; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bb-kind{font:700 18px/1 'Hanken Grotesk'; letter-spacing:.05em; text-transform:uppercase; border-radius:12px; padding:8px 0; text-align:center}
  .bb-kind.k-drop{color:#2f7d8f; background:#e2eff2}
  .bb-kind.k-pick{color:#c25f8f; background:#f6e6ef}
  .bb-state{font:700 20px/1 'Baloo 2'; border-radius:14px; padding:9px 0; text-align:center}
  .bb-state.s-done{color:#2f8a4e; background:#e4f3e8}
  .bb-state.s-todo{color:var(--gold-ink); background:#fbeecb}
  .bb-state.s-assign{color:#fff; background:#d9532b}
  .bins-empty{height:100%; display:flex; align-items:center; justify-content:center;
    font:700 56px/1.15 'Baloo 2'; color:var(--muted); text-align:center; padding:0 8%}

  /* ── Screen 2 · Crew · This Week ── */
  #schedWrap{height:100%; display:grid; gap:10px}
  .day{display:flex; align-items:center; justify-content:center; font:700 27px/1 'Baloo 2';
    color:#5f6650; background:#e6dcc0; border-radius:14px}
  .day.today{flex-direction:column; color:var(--spruce); background:var(--gold); box-shadow:0 5px 0 rgba(23,64,42,.18)}
  .day.today .tlab{font:700 13px/1 'Hanken Grotesk'; letter-spacing:.16em; margin-top:4px}
  .rname{display:flex; align-items:center; gap:13px; padding:0 22px; background:var(--spruce); border-radius:14px; overflow:hidden}
  .rname .pdot{width:15px; height:15px; border-radius:50%; flex:0 0 auto}
  .rname .pn{font:700 29px/1 'Baloo 2'; color:var(--soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cell{display:flex; align-items:center; justify-content:center; border-radius:14px; overflow:hidden; text-align:center}
  .cell.work{flex-direction:column; gap:3px; background:var(--card); box-shadow:0 5px 0 rgba(23,64,42,.1)}
  .cell.work .wl{font:700 25px/1.05 'Baloo 2'; color:var(--spruce); padding:0 8px; max-width:100%;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .cell.work.today{background:#fff7e6; box-shadow:inset 0 0 0 2.5px var(--gold)}
  .cell.work.today .wl{color:var(--gold-ink)}
  .cell.off{background:rgba(38,49,31,.05); color:#b3b0a0; font:700 22px/1 'Baloo 2'}
  .cell.off.today{box-shadow:inset 0 0 0 2.5px rgba(232,179,74,.5)}
  .cell.sick{background:#f6e6cf; color:var(--gold-ink); font:700 22px/1 'Baloo 2'}
  .cell.jx{background:#e7eef3; color:#4f7688; font:600 16px/1.15 'Hanken Grotesk'; padding:0 8px}

  /* ── Screen 3 · Operations ── */
  #kpiGrid{height:100%; display:grid; grid-template-columns:1.15fr 1fr 1fr; grid-template-rows:1fr 1fr; gap:24px}
  .ops-hero{grid-row:span 2; background:var(--spruce); border-radius:28px; padding:44px 46px;
    display:flex; flex-direction:column; justify-content:space-between; box-shadow:0 9px 0 rgba(11,38,24,.3);
    position:relative; overflow:hidden}
  .ops-hero .ohl{font:700 27px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#8fb69c}
  .ops-hero .ohn{font:800 250px/.85 'Baloo 2'; color:var(--soft); font-variant-numeric:tabular-nums}
  .ops-hero .ohsub{display:flex; align-items:center; gap:12px; margin-top:14px}
  .ops-hero .ohsub .d1{font:700 30px/1 'Baloo 2'; color:var(--gold)}
  .ops-hero .ohsub .odot{width:8px; height:8px; border-radius:50%; background:#8fb69c}
  .ops-hero .ohsub .d2{font:700 30px/1 'Baloo 2'; color:#8fb69c}
  .ops-hero .obar{height:16px; border-radius:999px; background:rgba(255,255,255,.14); overflow:hidden}
  .ops-hero .obar-fill{height:100%; background:var(--gold); border-radius:999px}
  .ops-hero .owm{position:absolute; right:-30px; bottom:-26px; width:220px; opacity:.16}
  .ops-tile{background:var(--card); border-radius:28px; padding:34px 38px; display:flex; flex-direction:column;
    justify-content:space-between; box-shadow:0 8px 0 rgba(23,64,42,.12)}
  .ops-tile .otl{font:700 24px/1 'Hanken Grotesk'; letter-spacing:.12em; text-transform:uppercase; color:var(--muted)}
  .ops-tile .otn{font:800 150px/.85 'Baloo 2'; font-variant-numeric:tabular-nums}
  .ops-tile .otc{font:600 22px/1.2 'Hanken Grotesk'; color:var(--muted-2)}
  .ops-tile.gold{background:var(--gold); box-shadow:0 8px 0 rgba(23,64,42,.18)}
  .ops-tile.gold .otl{color:#7a5a10}
  .ops-tile.gold .otn{color:var(--spruce)}
  .ops-tile.gold .otc{color:#7a5a10}
  .ops-tile.gold .otn-wrap{display:flex; align-items:baseline; gap:16px}
  .ops-tile.gold .delta{font:800 44px/1 'Baloo 2'}

  /* ── Screen 4 · Bin Rental Rates ── */
  #ratesWrap{height:100%; display:grid; grid-template-columns:1fr 1fr; gap:22px}
  .rate-card{background:var(--card); border-radius:26px; box-shadow:0 8px 0 rgba(23,64,42,.12);
    display:flex; flex-direction:column; align-items:center; padding:34px 30px 40px; position:relative; min-height:0}
  .rate-pop{position:absolute; top:22px; right:22px; font:700 20px/1 'Hanken Grotesk'; letter-spacing:.08em;
    text-transform:uppercase; color:#fff; background:#d9532b; border-radius:12px; padding:8px 16px}
  .rate-img{flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; width:100%}
  .rate-img img{max-width:100%; max-height:100%; object-fit:contain}
  .rate-size{font:700 64px/1 'Baloo 2'; color:var(--spruce); margin-top:14px}
  .rate-use{font:600 26px/1.25 'Hanken Grotesk'; color:var(--muted); margin-top:12px; text-align:center}
  .rate-price{font:800 84px/1 'Baloo 2'; color:var(--ink); background:var(--gold); border-radius:22px;
    padding:14px 44px; margin-top:20px; box-shadow:0 7px 0 rgba(23,64,42,.16); font-variant-numeric:tabular-nums}
  .rate-note{font:600 22px/1 'Hanken Grotesk'; color:var(--muted-2); margin-top:16px}

  /* ── net-status pip ── */
  #netdot{position:fixed; bottom:14px; right:14px; width:12px; height:12px; border-radius:50%;
    background:#2f8a4e; opacity:.5; transition:background .3s, opacity .3s; z-index:50}
  #netdot.bad{background:#d9532b; opacity:1}
</style>
</head>
<body>
  <!-- Startup / Standby — shown on boot, reconnect, or a hard failure -->
  <div id="gate">
    <div class="gate-dots" aria-hidden="true"></div>
    <div class="gate-spin" id="gateSpin"></div>
    <img class="gate-truck" src="assets/tv-truck.png" alt="Jeff's Junk truck">
    <div class="gate-h">Warming up the board…</div>
    <div class="gate-sub" id="gateMsg">Reconnecting to dispatch — hang tight</div>
    <div class="gate-pulse"><span></span><span></span><span></span></div>
    <div class="gate-foot"><img src="assets/jeffs-junk-logo.png" alt=""><span>Office Board · Barrie, ON</span></div>
  </div>

  <div id="viewport">
    <div id="board">
      <!-- shared header -->
      <div id="topbar">
        <div id="brand">
          <img src="assets/jeffs-junk-logo.png" alt="Jeff's Junk">
          <div><div class="brand-name">Jeff's Junk</div><div class="brand-sub">Office Board</div></div>
        </div>
        <div id="tright">
          <div id="wx"><span class="i" id="wxI"></span><span class="t" id="wxT"></span><span class="hl" id="wxHL"></span></div>
          <div id="clock"><div class="t" id="clockT">–</div><div class="d" id="clockD">–</div></div>
        </div>
      </div>

      <div id="stage">
        <!-- Screen 1 · Bin Work Today -->
        <section class="panel" data-panel="bins">
          <div class="p-head"><span class="bar"></span><h2>Bin Work Today</h2>
            <span class="tag" id="binsTag"></span><span class="spacer"></span><span class="status" id="binsMeta"></span></div>
          <div class="p-body"><div id="binsWrap"></div></div>
        </section>

        <!-- Screen 2 · Crew · This Week -->
        <section class="panel" data-panel="schedule">
          <div class="p-head"><span class="bar"></span><h2>Crew · This Week</h2>
            <span class="tag" id="schedTag"></span><span class="spacer"></span><span class="status" id="schedMeta"></span></div>
          <div class="p-body"><div id="schedWrap"></div></div>
        </section>

        <!-- Screen 3 · Operations -->
        <section class="panel" data-panel="kpis">
          <div class="p-head"><span class="bar"></span><h2>Operations</h2>
            <span class="spacer"></span><span class="status" id="kpiMeta"></span></div>
          <div class="p-body"><div id="kpiGrid"></div></div>
        </section>

        <!-- Screen 4 · Bin Rental Rates -->
        <section class="panel" data-panel="rates">
          <div class="p-head"><span class="bar"></span><h2>Bin Rental Rates</h2>
            <span class="tag">7-day rental</span><span class="spacer"></span>
            <span class="status">Barrie &amp; area · taxes extra</span></div>
          <div class="p-body"><div id="ratesWrap"></div></div>
        </section>
      </div>
    </div>
  </div>
  <div id="netdot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function(){
    "use strict";

    // ── config ──────────────────────────────────────────────────────────────
    var SUPABASE_URL = 'https://okoqzbdyfjfgcdgmcamq.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3F6YmR5ZmpmZ2NkZ21jYW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDYyNzEsImV4cCI6MjA4ODIyMjI3MX0.SQQD5HN2h179Lsqb-gxqnuTZcIXUyxrtmBP6VLOO57w';
    var DISPLAY_EMAIL = 'officetv@jeffsjunk.ca';   // ONLY this account may view the board
    var ROTATE_MS  = 20000;   // time each panel is shown
    var REFRESH_MS = 900000;  // how often data is refetched (15 min — keeps Supabase egress low; panels still rotate every 20s so the board stays lively)
    var PANELS = ['bins','schedule','kpis','rates'];
    var WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    var RATES_AREA = 'Barrie & Area';   // which our_prices zone drives the Rates screen

    // Dedicated session store so this page can NEVER pick up a staff member's
    // dashboard session in the same browser — it only ever runs as the display user.
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth:{ storageKey:'jj-office-tv-auth', persistSession:true, autoRefreshToken:true, detectSessionInUrl:false }
    });

    // ── date helpers (all local time) ────────────────────────────────────────
    function pad2(n){ return String(n).padStart(2,'0'); }
    function ymd(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
    function todayStr(){ return ymd(new Date()); }
    function mondayStr(){
      var d = new Date(); var g = d.getDay();            // 0=Sun..6=Sat
      d.setDate(d.getDate() + (g===0 ? -6 : 1-g));       // back to Monday
      return ymd(d);
    }
    function todayWeekday(){ return WEEKDAYS[(new Date().getDay()+6)%7]; }
    function fmt12(t){                                    // "7:00" -> "7a", "19:00" -> "7p"
      if(!t) return '';
      var p = String(t).split(':'); var h = parseInt(p[0],10); if(isNaN(h)) return t;
      var ap = h>=12 ? 'p':'a'; var hh = h%12; if(hh===0) hh=12;
      var m = p[1] && p[1]!=='00' ? ':'+p[1] : '';
      return hh+m+ap;
    }

    // ── DOM helpers ──────────────────────────────────────────────────────────
    function el(id){ return document.getElementById(id); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function parseLocal(s){ var p=String(s).split('-'); return new Date(+p[0], (+p[1])-1, +p[2]); } // avoid UTC shift

    // ── state ────────────────────────────────────────────────────────────────
    var DATA = { jobs:[], crew:{}, crewColor:{}, jwgColor:{}, emps:[], sched:{}, tasks:{},
                 inv:[], cats:{}, kpi:{}, junk:{}, binBoard:[], rates:{} };
    var panelIdx = 0, rotTimer = null;

    function jobTime(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_time || j.time || '';
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_time || j.time || '';
      return j.time || j.junk_time || j.fb_time || '';
    }
    function timeMins(t){ if(!t) return 99999; var p=String(t).split(':'); return parseInt(p[0],10)*60+(parseInt(p[1],10)||0); }
    // the day a job actually happens on (junk/landscaping reschedule via junk_date, furniture via fb_date)
    function effDay(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_date || j.date;
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_date || j.date;
      return j.date;
    }
    // today's board entries — bins split into their drop-off / pick-up legs on the LEG day
    function buildTodayEntries(rows, today){
      var out=[];
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        function mk(label, time, crewIds){
          out.push({ service:label, time:time||'', name:j.name, business_name:j.business_name,
                     address:j.address, city:j.city, crewIds:(crewIds||[]).filter(Boolean) });
        }
        if(j.service==='Bin Rental'){
          if(j.bin_dropoff===today) mk('Bin Drop-off', j.bin_dropoff_time, [j.dropoff_crew_id]);
          if(j.bin_pickup===today)  mk('Bin Pick-up',  j.bin_pickup_time,  [j.pickup_crew_id]);
        } else if(effDay(j)===today){
          mk(j.service, jobTime(j), [].concat(j.assigned_crew_ids||[]));
        }
      });
      return out.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
    }
    // Today's bin legs grouped by driver. Done/not-done comes from DB state
    // only (manual pickup + geofence notifications) — the TV never calls
    // Geotab. A drop leg counts as done on a real zone visit or once the bin
    // is picked up; login's inventory auto-drop alone doesn't count.
    function buildBinBoard(rows, today, notifRows){
      var geo = {dropped:{}, pickedup:{}};
      (notifRows||[]).forEach(function(n){ if(geo[n.status]) geo[n.status][n.job_id]=1; });
      var groups = {}, keys = [];
      function push(crewId, leg){
        var key = crewId || '';
        if(!groups[key]){ groups[key] = {crewId:key, legs:[]}; keys.push(key); }
        groups[key].legs.push(leg);
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled' || j.service!=='Bin Rental') return;
        var picked = j.bin_instatus==='pickedup' || geo.pickedup[j.job_id];
        if(j.bin_dropoff===today)
          push(j.dropoff_crew_id, {kind:'drop', time:j.bin_dropoff_time||'', j:j, done: !!(picked || geo.dropped[j.job_id])});
        if(j.bin_pickup===today)
          push(j.pickup_crew_id, {kind:'pick', time:j.bin_pickup_time||'', j:j, done: !!picked});
      });
      var list = keys.map(function(k){ return groups[k]; });
      list.forEach(function(g){
        g.name = g.crewId ? (DATA.crew[g.crewId]||'Unknown') : 'Unassigned';
        g.legs.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
        g.done = g.legs.filter(function(l){ return l.done; }).length;
      });
      // named drivers first (alpha), the unassigned "needs a driver" alert card last
      list.sort(function(a,b){
        if(!a.crewId && b.crewId) return 1;
        if(!b.crewId && a.crewId) return -1;
        return a.name.localeCompare(b.name);
      });
      return list;
    }

    // junk-side work per person per weekday (for schedule ghosts) — same one-way rules as the dashboard
    function buildJunkWeek(rows, monday, satEnd){
      var occ = {};
      function dayName(ds){ return WEEKDAYS[(parseLocal(ds).getDay()+6)%7]; }
      function add(cid, ds, label){
        var nm = cid && DATA.crew[cid];
        if(!nm || !ds || ds<monday || ds>satEnd) return;
        var k = nm.toLowerCase(), dn = dayName(ds);
        occ[k]=occ[k]||{}; occ[k][dn]=occ[k][dn]||{};
        occ[k][dn][label]=(occ[k][dn][label]||0)+1;
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        if(j.service==='Bin Rental'){
          add(j.dropoff_crew_id, j.bin_dropoff, 'Bins');
          add(j.pickup_crew_id,  j.bin_pickup,  'Bins');
        } else {
          var lbl = j.service==='Junk Removal' ? 'Junk'
                  : j.service==='Junk Quote' ? 'Quote'
                  : j.service==='Landscaping' ? 'Landscaping'
                  : String(j.service||'').indexOf('Furniture')===0 ? 'Furniture' : 'Junk';
          var ds = effDay(j);
          (j.assigned_crew_ids||[]).forEach(function(cid){ add(cid, ds, lbl); });
        }
      });
      return occ;
    }

    // ── data load ────────────────────────────────────────────────────────────
    async function loadAll(){
      var today = todayStr(), monday = mondayStr();
      // parseLocal, not new Date(str) — bare 'YYYY-MM-DD' parses as UTC midnight, which
      // in Toronto lands on the PREVIOUS local day and made tomorrow === today.
      var wkEnd = ymd(new Date(parseLocal(monday).getTime()+7*864e5));
      var tomorrow = ymd(new Date(parseLocal(today).getTime()+864e5));
      var satEnd = ymd(new Date(parseLocal(monday).getTime()+5*864e5));   // schedule board shows Mon–Sat
      // Local-midnight bounds for timestamptz columns — a bare 'YYYY-MM-DD' string is
      // read as UTC midnight (8 PM ET the day before), which puts evening events on
      // the wrong day.
      var dayStartIso = parseLocal(today).toISOString();
      var dayEndIso   = new Date(parseLocal(today).getTime()+864e5).toISOString();
      // month windows for the month-vs-last-year tile (count-only queries). BOTH
      // sides are cut at the same day-of-month (first N days vs first N days) so
      // mid-month numbers compare fairly — jobs.date is the SCHEDULED day, so an
      // uncut current month would include pre-booked future jobs and inflate it.
      var y = +today.slice(0,4), mo = +today.slice(5,7);
      function monthStartStr(yy,mm){ return yy+'-'+String(mm).padStart(2,'0')+'-01'; }
      var moStart = monthStartStr(y, mo);
      var lyStart = monthStartStr(y-1, mo);
      var d0 = parseLocal(today);
      var lyCut = ymd(new Date(d0.getFullYear()-1, d0.getMonth(), d0.getDate()+1));

      var res = await Promise.all([
        db.from('jobs').select('job_id,service,status,name,business_name,address,city,date,time,junk_date,junk_time,fb_date,fb_time,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_dropoff_time,bin_pickup,bin_pickup_time,bin_instatus,bin_size,bin_bid')
          .or('date.eq.'+today+',junk_date.eq.'+today+',fb_date.eq.'+today+',bin_dropoff.eq.'+today+',bin_pickup.eq.'+today),
        db.from('crew_members').select('id,name,color,jwg_id').eq('on_junk', true),
        db.from('jwg_employees').select('id,name'),
        db.from('jwg_schedules').select('employee_id,schedule_data').eq('week_start', monday),
        db.from('jwg_app_settings').select('key,value').in('key',['tasks','emp_order']),
        db.from('jwg_inventory_items').select('item_name,current_stock,min_threshold,status,unit,category_id'),
        db.from('jwg_inventory_categories').select('id,name,sort_order,is_active'),
        // KPI helpers
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').eq('bin_instatus','dropped'),
        db.from('jobs').select('status').gte('date',monday).lt('date',wkEnd),
        db.from('jobs').select('completed_at').eq('completed',true).gte('completed_at',dayStartIso).lt('completed_at',dayEndIso),
        // junk-side work across the schedule week (for the crew-schedule ghosts)
        db.from('jobs').select('service,status,date,junk_date,fb_date,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_pickup')
          .or('and(date.gte.'+monday+',date.lte.'+satEnd+'),and(junk_date.gte.'+monday+',junk_date.lte.'+satEnd+'),and(fb_date.gte.'+monday+',fb_date.lte.'+satEnd+'),and(bin_dropoff.gte.'+monday+',bin_dropoff.lte.'+satEnd+'),and(bin_pickup.gte.'+monday+',bin_pickup.lte.'+satEnd+')'),
        // today's geofence enter/leave notifications — done/not-done for the bin board
        db.from('geofence_notifications').select('job_id,status').gte('created_at', dayStartIso),
        // month tiles — count-only (no row data): jobs this month so far and the same
        // days last year. Jobs count by their scheduled `date`, cut at today on BOTH
        // sides, excluding cancelled jobs and quotes.
        db.from('jobs').select('*',{count:'exact',head:true}).gte('date',moStart).lt('date',tomorrow).neq('status','Cancelled').neq('service','Junk Quote'),
        db.from('jobs').select('*',{count:'exact',head:true}).gte('date',lyStart).lt('date',lyCut).neq('status','Cancelled').neq('service','Junk Quote'),
        // Rates screen — the two everyday bin prices for the Barrie & Area zone
        db.from('our_prices').select('bins').eq('area',RATES_AREA).limit(1)
      ]);
      for(var i=0;i<res.length;i++){ if(res[i].error) throw new Error(res[i].error.message); }

      // jobs today — bins appear on their drop-off/pick-up day, junk on its real (junk_date) day
      DATA.jobs = buildTodayEntries(res[0].data||[], today);

      // crew id -> name, plus master-colour maps (by crew id AND by jwg_id) so
      // both boards can tint each person with their app-wide colour.
      DATA.crew = {}; DATA.crewColor = {}; DATA.jwgColor = {};
      (res[1].data||[]).forEach(function(c){
        DATA.crew[c.id]=c.name;
        if(c.color){ DATA.crewColor[c.id]=c.color; if(c.jwg_id) DATA.jwgColor[c.jwg_id]=c.color; }
      });

      // junk work per person/day for the schedule ghosts (needs DATA.crew, so build it here)
      DATA.junk = buildJunkWeek(res[10].data||[], monday, satEnd);

      // bin board — today's bin legs grouped by driver (needs DATA.crew)
      DATA.binBoard = buildBinBoard(res[0].data||[], today, res[11].data||[]);

      // employees + ordering
      var empName = {}; (res[2].data||[]).forEach(function(e){ empName[e.id]=e.name; });
      var settings = {}; (res[4].data||[]).forEach(function(s){ settings[s.key]=s.value; });
      var order = settings.emp_order || [];
      var ordered = [];
      order.forEach(function(id){ if(empName[id]) ordered.push({id:id,name:empName[id]}); });
      Object.keys(empName).forEach(function(id){ if(order.indexOf(id)===-1) ordered.push({id:id,name:empName[id]}); });
      DATA.emps = ordered;

      // schedules by employee_id
      DATA.sched = {}; (res[3].data||[]).forEach(function(r){ DATA.sched[r.employee_id]=r.schedule_data||{}; });

      // task id -> {label,bg,text,dot}
      DATA.tasks = {}; (settings.tasks||[]).forEach(function(t){ DATA.tasks[t.id]=t; });

      // inventory + categories
      DATA.cats = {}; (res[6].data||[]).forEach(function(c){ DATA.cats[c.id]=c; });
      DATA.inv = (res[5].data||[]).slice().sort(function(a,b){
        var ca=DATA.cats[a.category_id], cb=DATA.cats[b.category_id];
        var sa=ca?ca.sort_order:999, sb=cb?cb.sort_order:999;
        if(sa!==sb) return sa-sb;
        return String(a.item_name).localeCompare(String(b.item_name));
      });

      // Rates — Barrie & Area 14yd/20yd base prices + per-tonne dump charge
      var rp=(res[14].data||[])[0], rb=(rp&&rp.bins)||{};
      DATA.rates = { y14: rb['14 yard'], y20: rb['20 yard'], tonne: rb._tonne };

      // KPIs
      var weekRows = res[8].data||[];
      DATA.kpi = {
        jobsToday: DATA.jobs.length,
        binsOut: res[7].count||0,
        weekJobs: weekRows.filter(function(r){ return r.status!=='Cancelled'; }).length,
        completedToday: (res[9].data||[]).length,
        lowStock: DATA.inv.filter(function(it){ return (it.current_stock||0) <= (it.min_threshold||0); }).length,
        workingToday: workingTodayCount(),
        bookedMonth: res[12].count||0,
        bookedLastYear: res[13].count||0
      };
    }

    function workingTodayCount(){
      var wd = todayWeekday(), n=0;
      DATA.emps.forEach(function(e){
        var day = (DATA.sched[e.id]||{})[wd];
        if(day && day.status==='work') n++;
      });
      return n;
    }

    // ── renderers ────────────────────────────────────────────────────────────
    // Screen 1 · Bin Work Today — 2×2 driver cards, unassigned flags red
    function renderBins(){
      var board = DATA.binBoard||[];
      var total=0, done=0;
      board.forEach(function(g){ total+=g.legs.length; done+=g.done; });
      var tag = el('binsTag');
      tag.textContent = total ? done+' of '+total+' done' : '';
      tag.style.display = total ? '' : 'none';
      el('binsMeta').textContent = total
        ? 'Updated '+new Date().toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
        : new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
      var wrap = el('binsWrap');
      if(!total){
        wrap.innerHTML = '<div class="bins-empty">No bin drop-offs or pick-ups today</div>';
        return;
      }
      wrap.innerHTML = board.map(function(g){
        var color = g.crewId ? (DATA.crewColor[g.crewId]||'#3a9d5a') : '#d9532b';
        var last = g.legs.length-1;
        var rows = g.legs.map(function(l,idx){
          var j = l.j, who = j.business_name || j.name || 'Customer';
          var sizeTxt = (j.bin_size||'').replace(/\s*yard/i,' YD') || '—';
          var sub = [who, l.time?fmt12(l.time):''].filter(Boolean).join(' · ');
          var stateCls, stateTxt;
          if(l.done){ stateCls='s-done'; stateTxt='✓ Done'; }
          else if(!g.crewId){ stateCls='s-assign'; stateTxt='Assign!'; }
          else { stateCls='s-todo'; stateTxt='To do'; }
          return '<div class="bb-row'+(l.done?' done':'')+(idx===last?' last':'')+'">'
            + '<span class="bb-size'+(g.crewId?'':' warn')+'">'+esc(sizeTxt)+'</span>'
            + '<span class="bb-dest"><span class="bb-city">'+esc(j.city||'')+'</span><span class="bb-who">'+esc(sub)+'</span></span>'
            + '<span class="bb-kind '+(l.kind==='drop'?'k-drop':'k-pick')+'">'+(l.kind==='drop'?'Drop':'Pick')+'</span>'
            + '<span class="bb-state '+stateCls+'">'+stateTxt+'</span>'
            + '</div>';
        }).join('');
        return '<div class="bb-group'+(g.crewId?'':' warn')+'">'
          + '<div class="bb-strip" style="background:'+color+'">'
          + '<span class="bb-name">'+(g.crewId?esc(g.name):'⚠ Needs a driver')+'</span>'
          + '<span class="bb-count" style="color:'+color+'">'+g.done+' / '+g.legs.length+(g.crewId?' done':'')+'</span></div>'
          + '<div class="bb-body">'+rows+'</div></div>';
      }).join('');
    }

    // Screen 2 · Crew · This Week — one grid, name column + Mon–Sat, today gold
    function renderSchedule(){
      var monday = parseLocal(mondayStr());
      el('schedTag').textContent = 'Week of '+monday.toLocaleDateString(undefined,{month:'short', day:'numeric'});
      el('schedMeta').textContent = DATA.emps.length+' on the board';
      var wrap = el('schedWrap');
      var days = WEEKDAYS.slice(0,6);            // Mon–Sat
      var todayWd = todayWeekday();
      wrap.style.gridTemplateColumns = '288px repeat(6,1fr)';
      wrap.style.gridTemplateRows = '66px repeat('+DATA.emps.length+',minmax(0,1fr))';

      var cells = ['<div></div>'];               // empty top-left corner
      days.forEach(function(dn){
        cells.push(dn===todayWd
          ? '<div class="day today"><span>'+dn.slice(0,3)+'</span><span class="tlab">TODAY</span></div>'
          : '<div class="day">'+dn.slice(0,3)+'</div>');
      });

      DATA.emps.forEach(function(e){
        var sd = DATA.sched[e.id]||{};
        var jocc = DATA.junk[String(e.name||'').toLowerCase()]||{};
        var col = DATA.jwgColor[e.id]||'#6b7280';
        cells.push('<div class="rname"><span class="pdot" style="background:'+col+'"></span><span class="pn">'+esc(e.name)+'</span></div>');
        days.forEach(function(dn){
          var t = dn===todayWd ? ' today' : '';
          var day = sd[dn];
          if(!day || day.status==='off' || day.status==='dayoff'){
            // untouched day + junk-side booking → read-only ghost (a set "Day off" stays a day off)
            if((!day || day.status==='off') && jocc[dn]){
              var parts = Object.keys(jocc[dn]).map(function(l){ var n=jocc[dn][l]; return l+(n>1?' ×'+n:''); });
              cells.push('<div class="cell jx'+t+'">🚚 '+esc(parts.join(' · '))+'</div>');
            } else {
              cells.push('<div class="cell off'+t+'">OFF</div>');
            }
            return;
          }
          if(day.status==='sick'){ cells.push('<div class="cell sick'+t+'">Sick</div>'); return; }
          // working — first shift's first task drives the label (real schedule data)
          var label='Work';
          var sh = (day.shifts||[])[0];
          if(sh && sh.tasks && sh.tasks.length){ var tk = DATA.tasks[sh.tasks[0]]; if(tk && tk.label) label=tk.label; }
          cells.push('<div class="cell work'+t+'"><span class="wl">'+esc(label)+'</span></div>');
        });
      });
      wrap.innerHTML = cells.join('');
    }

        deltaHtml = '<span class="delta" style="color:'+(delta>=0?'#2f7d2a':'#b03a1a')+'">'+(delta>=0?'▲':'▼')+Math.abs(p)+'%</span>';

          + '<div class="obar"><div class="obar-fill" style="width:'+pct+'%"></div></div>'

          + '<div class="otn-wrap"><span class="otn">'+k.bookedMonth+'</span>'+deltaHtml+'</div>'
          + '<div class="otc">'+cap+'</div></div>';
    }

    function parseCreds(){
      var h = (location.hash||'').replace(/^#/,'');
      if(!h) return null;
      var q = new URLSearchParams(h);
      var email = q.get('e') || q.get('u');
      var pass = q.get('p');
      return (email && pass) ? {email:email, pass:pass} : null;
    }
    function stripHash(){ history.replaceState(null,'', location.pathname + location.search); }
    function fail(msg){ el('gateSpin').style.display='none'; el('gateMsg').innerHTML = esc(msg); }

    // Stash the display credentials in memory. They arrive in the URL hash and the
    // hash is then stripped; keeping a copy lets this 24/7 board sign itself back
    // in whenever its token lapses — without waiting for a Yodeck page reload.
    var _tvCreds = null;

    async function authenticate(){
      if(!_tvCreds) _tvCreds = parseCreds();
      var sess = (await db.auth.getSession()).data.session;
      if(!sess){
        if(!_tvCreds){ fail('This screen needs the office display link. Ask an admin to set it up.'); return null; }
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        stripHash();
        if(r.error){ fail('Could not sign in. Check the display link.'); return null; }
        sess = r.data.session;
      } else { stripHash(); }
      if(!sess || (sess.user && sess.user.email !== DISPLAY_EMAIL)){
        try{ await db.auth.signOut(); }catch(e){}
        fail('This screen is for the office display only.');
        return null;
      }
      return sess;
    }

    // Every board read now needs a logged-in session (RLS lockdown, July 2). Before
    // a refresh, make sure the session is present and not about to expire; if it's
    // gone or stale, sign back in with the stashed display credentials. Without this
    // the 15-min refresh silently reads as logged-out and the board goes empty/stale.
    async function ensureFreshSession(){
      var sess = (await db.auth.getSession()).data.session;
      var leftMs = (sess && sess.expires_at) ? (sess.expires_at*1000 - Date.now()) : -1;
      if(!sess || leftMs < 120000){        // missing, expired, or expiring within 2 min
        if(!_tvCreds) _tvCreds = parseCreds();
        if(!_tvCreds) throw new Error('session lapsed and no display credentials to re-auth');
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        if(r.error) throw r.error;
      }
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    async function boot(){
      var sess = await authenticate();
      if(!sess) return;
      try{
        await loadAll(); net(true);
      }catch(e){
        console.error(e); fail('Trouble loading the board — retrying…');
        setTimeout(boot, 8000); return;
      }
      el('gate').style.display='none';
      el('viewport').style.display='flex';
      fitBoard(); window.addEventListener('resize', fitBoard);
      tickClock(); setInterval(tickClock, 1000);
      loadWeather(); setInterval(loadWeather, 30*60*1000);
      startRotation();
      // Shop is closed Saturday 3 PM through Monday 6 AM — skip data refreshes
      // in that window so the TV pulls nothing from Supabase all weekend.
      // (Boot still loads once so a weekend restart isn't a blank board.)
      function inWeekendQuiet(){
        var n = new Date(), d = n.getDay(), h = n.getHours();
        if(d === 6 && h >= 15) return true;  // Saturday from 3 PM
        if(d === 0) return true;             // all of Sunday
        if(d === 1 && h < 6) return true;    // Monday before 6 AM
        return false;
      }
      // periodic refresh; keep showing last-good data on a blip
      setInterval(async function(){
        if(inWeekendQuiet()) return;
        try{
          await ensureFreshSession();
          await loadAll(); net(true); renderCurrent();
        }catch(e){
          console.error('refresh failed', e); net(false);
          // one recovery attempt: force a fresh sign-in, then retry the load
          try{
            if(!_tvCreds) _tvCreds = parseCreds();
            if(_tvCreds){
              var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
              if(!r.error){ await loadAll(); net(true); renderCurrent(); }
            }
          }catch(e2){ console.error('re-auth retry failed', e2); }
        }
      }, REFRESH_MS);
    }

    boot();
  })();
  </script>
</body>
</html>
