<body>
  <!-- Startup / Standby — shown on boot, reconnect, or a hard failure -->
  <div id="gate">
    <div class="gate-dots" aria-hidden="true"></div>
    <div class="gate-spin" id="gateSpin"></div>
    <img class="gate-truck" src="assets/tv-truck.png" alt="Jeff's Junk truck">
    <div class="gate-h">Warming up the board…</div>
    <div class="gate-sub" id="gateMsg">Reconnecting to dispatch — hang tight</div>
    <div class="gate-pulse"><span></span><span></span><span></span></div>
    <div class="gate-foot"><img src="assets/jeffs-junk-logo.png" alt=""><span>Office Board · Barrie, ON</span></div>
  </div>

  <div id="viewport">
    <div id="board">
      <!-- shared header -->
      <div id="topbar">
        <div id="brand">
          <img src="assets/jeffs-junk-logo.png" alt="Jeff's Junk">
          <div><div class="brand-name">Jeff's Junk</div><div class="brand-sub">Office Board</div></div>
        </div>
        <div id="tright">
          <div id="wx"><span class="i" id="wxI"></span><span class="t" id="wxT"></span><span class="hl" id="wxHL"></span></div>
          <div id="clock"><div class="t" id="clockT">–</div><div class="d" id="clockD">–</div></div>
        </div>
      </div>

      <img id="tvtruck" src="assets/tv-truck.png" alt="" aria-hidden="true">
      <img id="tvbin" alt="" aria-hidden="true">

      <div id="stage">
        <!-- Screen 1 · Bin Work Today -->
        <section class="panel" data-panel="bins">
          <div class="p-head"><span class="bar"></span><h2>Bin Work Today</h2>
            <span class="tag" id="binsTag"></span><span class="spacer"></span><span class="status" id="binsMeta"></span></div>
          <div class="p-body"><div id="binsWrap"></div></div>
        </section>

        <!-- Screen 2 · Crew · This Week -->
        <section class="panel" data-panel="schedule">
          <div class="p-head"><span class="bar"></span><h2>Crew · This Week</h2>
            <span class="tag" id="schedTag"></span><span class="spacer"></span><span class="status" id="schedMeta"></span></div>
          <div class="p-body"><div id="schedWrap"></div></div>
        </section>

        <!-- Screen 3 · Operations -->
        <section class="panel" data-panel="kpis">
          <div class="p-head"><span class="bar"></span><h2>Operations</h2>
            <span class="spacer"></span><span class="status" id="kpiMeta"></span></div>
          <div class="p-body"><div id="kpiGrid"></div></div>
        </section>

        <!-- Screen 4 · Trucks on the Road -->
        <section class="panel" data-panel="liveops">
          <div class="p-head"><span class="bar"></span><h2>Trucks on the Road</h2>
            <span class="tag" id="loTag"></span><span class="status" id="loCount"></span>
            <span class="spacer"></span><span class="status" id="loMeta"></span></div>
          <div class="p-body"><div id="opsWrap">
            <div class="lo-card"><div id="tvmap"></div><div id="loLegend"></div><div id="loTown"></div></div>
          </div></div>
        </section>

      </div>
    </div>
  </div>
  <!-- 9 AM spoken briefing — the text shows too, so it still works if the
       browser refuses to autoplay audio -->
  <div id="brief"><div class="card">
    <div class="k">This morning</div>
    <div class="t" id="briefText"></div>
    <div class="warn" id="briefWarn"></div>
  </div></div>

  <div id="netdot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function(){
    "use strict";

    // ── config ──────────────────────────────────────────────────────────────
    var SUPABASE_URL = 'https://okoqzbdyfjfgcdgmcamq.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3F6YmR5ZmpmZ2NkZ21jYW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDYyNzEsImV4cCI6MjA4ODIyMjI3MX0.SQQD5HN2h179Lsqb-gxqnuTZcIXUyxrtmBP6VLOO57w';
    var DISPLAY_EMAIL = 'officetv@jeffsjunk.ca';   // ONLY this account may view the board
    var ROTATE_MS  = 20000;   // default time each panel is shown
    // The map screen earns extra time — it cycles through the trucks, so 20s only
    // gets you two of them. Everything else stays at ROTATE_MS.
    var PANEL_MS   = { liveops: 45000 };
    function panelMs(name){ return PANEL_MS[name] || ROTATE_MS; }
    var REFRESH_MS = 900000;  // how often data is refetched (15 min — keeps Supabase egress low; panels still rotate every 20s so the board stays lively)
    var PANELS = ['bins','schedule','kpis','liveops'];
    var YARD = { lat:44.3683, lng:-79.6831 };   // 92 Davidson St — home base
    var YARD_KM = 0.6;                          // inside this ring a truck reads "at the yard"
    // How close the map flies when it focuses a truck. FOCUS_ZOOM is the cap (a
    // truck that has barely moved shouldn't slam to max magnification); MIN_ZOOM is
    // the floor — a 90-min trail can span half the county, and framing all of it
    // pushed the map so far out you couldn't tell where the truck was. Past the
    // floor we centre on the truck and let the older trail run off-screen.
    var FOCUS_ZOOM = 13;
    var MIN_ZOOM   = 12;
    var FIT_PAD    = [100, 110];                // per-side, when framing a trail
    var WEEKDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    var TV_BINS = ['tv-bin-4.png','tv-bin-14.png','tv-bin-20.png'];   // bottom overlay picks one at random each load

    // Dedicated session store so this page can NEVER pick up a staff member's
    // dashboard session in the same browser — it only ever runs as the display user.
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth:{ storageKey:'jj-office-tv-auth', persistSession:true, autoRefreshToken:true, detectSessionInUrl:false }
    });

    // ── date helpers (all local time) ────────────────────────────────────────
    function pad2(n){ return String(n).padStart(2,'0'); }
    function ymd(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
    function todayStr(){ return ymd(new Date()); }
    function mondayStr(){
      var d = new Date(); var g = d.getDay();            // 0=Sun..6=Sat
      d.setDate(d.getDate() + (g===0 ? -6 : 1-g));       // back to Monday
      return ymd(d);
    }
    function todayWeekday(){ return WEEKDAYS[(new Date().getDay()+6)%7]; }
    // When the shop is shut, the board pulls nothing — no Supabase, no Geotab.
    // Open hours are Mon–Fri 7 AM–7 PM and Sat 7 AM–2 PM; everything else is quiet.
    //
    // This used to cover the weekend only, which left the board polling every 105
    // seconds all night on weeknights, for trucks parked in the yard. That was
    // roughly half of all polling, done for an empty office: a measured 36 KB per
    // trails call adds up to ~700 MB/month of Supabase egress, and busy days would
    // triple it against a 5 GB free-tier budget. Closing the nights cuts it ~45%
    // and costs nothing, since nobody is watching.
    //
    // (Boot still loads once, so a restart at 2 AM isn't a blank board.)
    function inQuietHours(){
      var n = new Date(), d = n.getDay(), h = n.getHours();
      if(d === 0) return true;             // Sunday
      if(h < 7) return true;               // before 7 AM, any day
      if(d === 6) return h >= 14;          // Saturday winds up at 2 PM
      return h >= 19;                      // weeknights after 7 PM
    }
    function fmt12(t){                                    // "7:00" -> "7a", "19:00" -> "7p"
      if(!t) return '';
      var p = String(t).split(':'); var h = parseInt(p[0],10); if(isNaN(h)) return t;
      var ap = h>=12 ? 'p':'a'; var hh = h%12; if(hh===0) hh=12;
      var m = p[1] && p[1]!=='00' ? ':'+p[1] : '';
      return hh+m+ap;
    }
    function fmt12ap(t){                                  // "7:00" -> "7am", "16:00" -> "4pm"
      if(!t) return '';
      var p = String(t).split(':'); var h = parseInt(p[0],10); if(isNaN(h)) return t;
      var ap = h>=12 ? 'pm':'am'; var hh = h%12; if(hh===0) hh=12;
      var m = p[1] && p[1]!=='00' ? ':'+p[1] : '';
      return hh+m+ap;
    }

    // ── Operations scoreboard: working-day pace (Mon–Sat) ─────────────────────
    function workingDaysBetween(start, end){                 // Mon–Sat in [start,end)
      var n=0, d=new Date(start);
      while(d < end){ if(d.getDay()!==0) n++; d.setDate(d.getDate()+1); }
      return n;
    }
    function paceProject(soFar){                              // month-so-far → projected month-end
      var now=new Date(), y=now.getFullYear(), m=now.getMonth();
      var elapsed=Math.max(1, workingDaysBetween(new Date(y,m,1), new Date(y,m,now.getDate()+1)));
      var total  =Math.max(elapsed, workingDaysBetween(new Date(y,m,1), new Date(y,m+1,1)));
      return Math.round(soFar * total / elapsed);
    }
    // How long the arena takes over after a FRESH beat. 0 = never (2A only).
    var BEAT_CELEBRATE_MS = 6*60*1000;                        // 6 minutes
    // True while a newly-crossed "beat last year" is still inside its window.
    function beatCelebrationActive(services){
      var now=Date.now(), monthKey=new Date().toISOString().slice(0,7), key='jj-tv-beat';
      var st; try{ st=JSON.parse(localStorage.getItem(key)||'{}'); }catch(e){ st={}; }
      if(st.month!==monthKey) st={month:monthKey, seen:[], until:0};
      var beaters=services.filter(function(s){ return s.last>0 && s.cur>=s.last; })
                          .map(function(s){ return s.name; });
      var fresh=beaters.filter(function(n){ return st.seen.indexOf(n)===-1; });
      if(fresh.length){ st.until=now+BEAT_CELEBRATE_MS; st.seen=beaters; }
      try{ localStorage.setItem(key, JSON.stringify(st)); }catch(e){}
      return now < (st.until||0);
    }
    // Count-up numbers from 0 (replays each rotation/refresh since the panels rebuild).
    // Animates any LEAF element whose text is a plain integer — used on the Operations
    // and Bin Work screens.
    function countUp(root){
      var nums = [].slice.call(root.querySelectorAll('*')).filter(function(el){
        return el.children.length===0 && /^\d+$/.test((el.textContent||'').trim());
      });
      // requestAnimationFrame is PAUSED while the tab is hidden, so if we zeroed
      // the numbers now they'd stick at 0 until the tab is visible again — the
      // board would read "0 of 0 done". The count-up is only eye-candy, so when
      // hidden just leave the real values on screen and skip the animation.
      if(document.hidden){ return; }
      nums.forEach(function(el, i){
        var target = parseInt(el.textContent, 10), dur = 850, delay = 120 + i*55, start = null;
        el.textContent = '0';
        function tick(ts){
          if(start == null) start = ts;
          var p = (ts - start - delay) / dur;
          if(p < 0){ requestAnimationFrame(tick); return; }
          if(p >= 1){ el.textContent = String(target); return; }
          el.textContent = String(Math.round(target * (1 - Math.pow(1 - p, 3))));  // easeOutCubic
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
        // Safety net: setTimeout keeps firing even when rAF is throttled/paused
        // (e.g. the tab gets hidden mid-animation), so the real number always lands
        // and the board can never get stuck showing 0.
        setTimeout(function(){ el.textContent = String(target); }, delay + dur + 400);
      });
    }

    // ── DOM helpers ──────────────────────────────────────────────────────────
    function el(id){ return document.getElementById(id); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function parseLocal(s){ var p=String(s).split('-'); return new Date(+p[0], (+p[1])-1, +p[2]); } // avoid UTC shift

    // ── state ────────────────────────────────────────────────────────────────
    var DATA = { jobs:[], crew:{}, crewColor:{}, jwgColor:{}, emps:[], sched:{}, tasks:{},
                 inv:[], cats:{}, kpi:{}, junk:{}, binBoard:[], trucks:[], trucksAt:0,
                 crewAll:{}, trails:{}, trailsAt:0 };
    var panelIdx = 0, rotTimer = null;

    function jobTime(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_time || j.time || '';
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_time || j.time || '';
      return j.time || j.junk_time || j.fb_time || '';
    }
    function timeMins(t){ if(!t) return 99999; var p=String(t).split(':'); return parseInt(p[0],10)*60+(parseInt(p[1],10)||0); }
    // the day a job actually happens on (junk/landscaping reschedule via junk_date, furniture via fb_date)
    function effDay(j){
      var s=j.service;
      if(s==='Furniture Pickup'||s==='Furniture Delivery') return j.fb_date || j.date;
      if(s==='Junk Removal'||s==='Junk Quote'||s==='Landscaping') return j.junk_date || j.date;
      return j.date;
    }
    // today's board entries — bins split into their drop-off / pick-up legs on the LEG day
    function buildTodayEntries(rows, today){
      var out=[];
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        // Not real Jeff's Junk jobs: quotes aren't jobs, landscaping is the JWG side.
        if(j.service==='Junk Quote' || j.service==='Landscaping') return;
        function mk(label, time, crewIds){
          out.push({ service:label, time:time||'', name:j.name, business_name:j.business_name,
                     address:j.address, city:j.city, crewIds:(crewIds||[]).filter(Boolean),
                     completed: !!j.completed });
        }
        if(j.service==='Bin Rental'){
          if(j.bin_dropoff===today) mk('Bin Drop-off', j.bin_dropoff_time, [j.dropoff_crew_id]);
          if(j.bin_pickup===today)  mk('Bin Pick-up',  j.bin_pickup_time,  [j.pickup_crew_id]);
        } else if(effDay(j)===today){
          mk(j.service, jobTime(j), [].concat(j.assigned_crew_ids||[]));
        }
      });
      return out.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
    }
    // Today's bin legs grouped by driver. Done/not-done is GEOFENCE-ONLY (Jake
    // 2026-07-07): a leg crosses off purely from truck-GPS zone visits
    // (geofence_notifications), NOT the job's bin_instatus. The TV never calls
    // Geotab. A drop leg counts as done on a zone visit (dropped OR pickedup
    // notif = the truck was there); a pick leg once the truck has left (pickedup).
    function buildBinBoard(rows, today, notifRows){
      var geo = {dropped:{}, pickedup:{}};
      (notifRows||[]).forEach(function(n){ if(geo[n.status]) geo[n.status][n.job_id]=1; });
      var groups = {}, keys = [];
      function push(crewId, leg){
        var key = crewId || '';
        if(!groups[key]){ groups[key] = {crewId:key, legs:[]}; keys.push(key); }
        groups[key].legs.push(leg);
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled' || j.service!=='Bin Rental') return;
        var picked = !!geo.pickedup[j.job_id];   // geofence-ONLY (Jake 2026-07-07): a leg crosses off from truck-GPS zone visits only, never the job's bin_instatus
        if(j.bin_dropoff===today)
          push(j.dropoff_crew_id, {kind:'drop', time:j.bin_dropoff_time||'', j:j, done: !!(picked || geo.dropped[j.job_id])});
        if(j.bin_pickup===today)
          push(j.pickup_crew_id, {kind:'pick', time:j.bin_pickup_time||'', j:j, done: !!picked});
      });
      var list = keys.map(function(k){ return groups[k]; });
      list.forEach(function(g){
        g.name = g.crewId ? (DATA.crew[g.crewId]||'Unknown') : 'Unassigned';
        g.legs.sort(function(a,b){ return timeMins(a.time)-timeMins(b.time); });
        g.done = g.legs.filter(function(l){ return l.done; }).length;
      });
      // named drivers first (alpha), the unassigned "needs a driver" alert card last
      list.sort(function(a,b){
        if(!a.crewId && b.crewId) return 1;
        if(!b.crewId && a.crewId) return -1;
        return a.name.localeCompare(b.name);
      });
      return list;
    }

    // junk-side work per person per weekday (for schedule ghosts) — same one-way rules as the dashboard
    function buildJunkWeek(rows, monday, satEnd){
      var occ = {};
      function dayName(ds){ return WEEKDAYS[(parseLocal(ds).getDay()+6)%7]; }
      function add(cid, ds, label){
        var nm = cid && DATA.crew[cid];
        if(!nm || !ds || ds<monday || ds>satEnd) return;
        var k = nm.toLowerCase(), dn = dayName(ds);
        occ[k]=occ[k]||{}; occ[k][dn]=occ[k][dn]||{};
        occ[k][dn][label]=(occ[k][dn][label]||0)+1;
      }
      rows.forEach(function(j){
        if(j.status==='Cancelled') return;
        if(j.service==='Bin Rental'){
          add(j.dropoff_crew_id, j.bin_dropoff, 'Bins');
          add(j.pickup_crew_id,  j.bin_pickup,  'Bins');
        } else {
          var lbl = j.service==='Junk Removal' ? 'Junk'
                  : j.service==='Junk Quote' ? 'Quote'
                  : j.service==='Landscaping' ? 'Landscaping'
                  : String(j.service||'').indexOf('Furniture')===0 ? 'Furniture' : 'Junk';
          var ds = effDay(j);
          (j.assigned_crew_ids||[]).forEach(function(cid){ add(cid, ds, lbl); });
        }
      });
      return occ;
    }

    // ── data load ────────────────────────────────────────────────────────────
    async function loadAll(){
      var today = todayStr(), monday = mondayStr();
      // parseLocal, not new Date(str) — bare 'YYYY-MM-DD' parses as UTC midnight, which
      // in Toronto lands on the PREVIOUS local day and made tomorrow === today.
      var wkEnd = ymd(new Date(parseLocal(monday).getTime()+7*864e5));
      var tomorrow = ymd(new Date(parseLocal(today).getTime()+864e5));
      var satEnd = ymd(new Date(parseLocal(monday).getTime()+5*864e5));   // schedule board shows Mon–Sat
      // Local-midnight bounds for timestamptz columns — a bare 'YYYY-MM-DD' string is
      // read as UTC midnight (8 PM ET the day before), which puts evening events on
      // the wrong day.
      var dayStartIso = parseLocal(today).toISOString();
      var dayEndIso   = new Date(parseLocal(today).getTime()+864e5).toISOString();
      // month windows for the month-vs-last-year tile (count-only queries). jobs.date
      // is the SCHEDULED day, so the current side is cut at today — an uncut current
      // month would include pre-booked future jobs and inflate it. Last year gets TWO
      // cuts, on purpose:
      //   lyCut      — same day-of-month as today. Feeds the % ONLY, so "up or down"
      //                reads day-for-day against where we stood last year.
      //   lyMonthEnd — last year's WHOLE month. The "beat last year" finish line: the
      //                bar tick, the projection and the pace verdict all aim at it.
      var y = +today.slice(0,4), mo = +today.slice(5,7);
      function monthStartStr(yy,mm){ return yy+'-'+String(mm).padStart(2,'0')+'-01'; }
      var moStart = monthStartStr(y, mo);
      var lyStart = monthStartStr(y-1, mo);
      var d0 = parseLocal(today);
      var lyCut = ymd(new Date(d0.getFullYear()-1, d0.getMonth(), d0.getDate()+1));
      var lyMonthEnd = (mo===12) ? monthStartStr(y, 1) : monthStartStr(y-1, mo+1);

      var res = await Promise.all([
        db.from('jobs').select('job_id,service,status,name,business_name,address,city,date,time,junk_date,junk_time,fb_date,fb_time,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_dropoff_time,bin_pickup,bin_pickup_time,bin_instatus,bin_size,bin_bid,completed')
          .or('date.eq.'+today+',junk_date.eq.'+today+',fb_date.eq.'+today+',bin_dropoff.eq.'+today+',bin_pickup.eq.'+today),
        // on_junk is no longer filtered server-side: DATA.crew still keeps only the
        // junk crew (below), but the truck-assignment lookup needs to name ANY
        // assigned driver, junk-side or not.
        db.from('crew_members').select('id,name,color,jwg_id,on_junk'),
        db.from('jwg_employees').select('id,name'),
        db.from('jwg_schedules').select('employee_id,schedule_data').eq('week_start', monday),
        db.from('jwg_app_settings').select('key,value').in('key',['tasks','emp_order']),
        db.from('jwg_inventory_items').select('item_name,current_stock,min_threshold,status,unit,category_id'),
        db.from('jwg_inventory_categories').select('id,name,sort_order,is_active'),
        // KPI helpers
        // Bins out now — matches the DASHBOARD's fleet count exactly (Bin Rental,
        // dropped, NOT cancelled). Without the cancelled exclusion the TV over-counts.
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').eq('bin_instatus','dropped').neq('status','Cancelled'),
        // jobs this week (Mon–Sun) — NOT counting quotes (a quote isn't a job) or
        // landscaping (the JWG side, not Jeff's Junk).
        db.from('jobs').select('*',{count:'exact',head:true}).gte('date',monday).lt('date',wkEnd).neq('status','Cancelled').neq('service','Junk Quote').neq('service','Landscaping'),
        // completed today (hero done/to-go) — same exclusions
        db.from('jobs').select('completed_at').eq('completed',true).gte('completed_at',dayStartIso).lt('completed_at',dayEndIso).neq('service','Junk Quote').neq('service','Landscaping'),
        // junk-side work across the schedule week (for the crew-schedule ghosts)
        db.from('jobs').select('service,status,date,junk_date,fb_date,assigned_crew_ids,dropoff_crew_id,pickup_crew_id,bin_dropoff,bin_pickup')
          .or('and(date.gte.'+monday+',date.lte.'+satEnd+'),and(junk_date.gte.'+monday+',junk_date.lte.'+satEnd+'),and(fb_date.gte.'+monday+',fb_date.lte.'+satEnd+'),and(bin_dropoff.gte.'+monday+',bin_dropoff.lte.'+satEnd+'),and(bin_pickup.gte.'+monday+',bin_pickup.lte.'+satEnd+')'),
        // today's geofence enter/leave notifications — done/not-done for the bin board
        db.from('geofence_notifications').select('job_id,status').gte('created_at', dayStartIso),
        // ── "beat last year" per service ── count-only, by scheduled `date`, excluding
        // cancelled. Three cuts each: this month so far (12/14/16), last year's FULL
        // month for the finish line (13/15/17), last year to the SAME day for the %
        // (18/19/20).
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').gte('date',moStart).lt('date',tomorrow).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').gte('date',lyStart).lt('date',lyMonthEnd).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Junk Removal').gte('date',moStart).lt('date',tomorrow).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Junk Removal').gte('date',lyStart).lt('date',lyMonthEnd).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).in('service',['Furniture Pickup','Furniture Delivery']).gte('date',moStart).lt('date',tomorrow).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).in('service',['Furniture Pickup','Furniture Delivery']).gte('date',lyStart).lt('date',lyMonthEnd).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Bin Rental').gte('date',lyStart).lt('date',lyCut).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).eq('service','Junk Removal').gte('date',lyStart).lt('date',lyCut).neq('status','Cancelled'),
        db.from('jobs').select('*',{count:'exact',head:true}).in('service',['Furniture Pickup','Furniture Delivery']).gte('date',lyStart).lt('date',lyCut).neq('status','Cancelled')
      ]);
      // Every query is critical — fail fast so the board never renders half-loaded.
      for(var i=0;i<res.length;i++){ if(res[i].error) throw new Error(res[i].error.message); }

      // jobs today — bins appear on their drop-off/pick-up day, junk on its real (junk_date) day
      DATA.jobs = buildTodayEntries(res[0].data||[], today);

      // crew id -> name, plus master-colour maps (by crew id AND by jwg_id) so
      // both boards can tint each person with their app-wide colour.
      DATA.crew = {}; DATA.crewColor = {}; DATA.jwgColor = {}; DATA.crewAll = {};
      (res[1].data||[]).forEach(function(c){
        DATA.crewAll[c.id]=c.name;                 // every crew member, for naming drivers
        if(c.on_junk) DATA.crew[c.id]=c.name;      // junk crew only — unchanged from before
        if(c.color){ DATA.crewColor[c.id]=c.color; if(c.jwg_id) DATA.jwgColor[c.jwg_id]=c.color; }
      });


      // junk work per person/day for the schedule ghosts (needs DATA.crew, so build it here)
      DATA.junk = buildJunkWeek(res[10].data||[], monday, satEnd);

      // bin board — today's bin legs grouped by driver (needs DATA.crew)
      DATA.binBoard = buildBinBoard(res[0].data||[], today, res[11].data||[]);

      // employees + ordering
      var empName = {}; (res[2].data||[]).forEach(function(e){ empName[e.id]=e.name; });
      var settings = {}; (res[4].data||[]).forEach(function(s){ settings[s.key]=s.value; });
      var order = settings.emp_order || [];
      var ordered = [];
      order.forEach(function(id){ if(empName[id]) ordered.push({id:id,name:empName[id]}); });
      Object.keys(empName).forEach(function(id){ if(order.indexOf(id)===-1) ordered.push({id:id,name:empName[id]}); });
      DATA.emps = ordered;

      // schedules by employee_id
      DATA.sched = {}; (res[3].data||[]).forEach(function(r){ DATA.sched[r.employee_id]=r.schedule_data||{}; });

      // task id -> {label,bg,text,dot}
      DATA.tasks = {}; (settings.tasks||[]).forEach(function(t){ DATA.tasks[t.id]=t; });

      // inventory + categories
      DATA.cats = {}; (res[6].data||[]).forEach(function(c){ DATA.cats[c.id]=c; });
      DATA.inv = (res[5].data||[]).slice().sort(function(a,b){
        var ca=DATA.cats[a.category_id], cb=DATA.cats[b.category_id];
        var sa=ca?ca.sort_order:999, sb=cb?cb.sort_order:999;
        if(sa!==sb) return sa-sb;
        return String(a.item_name).localeCompare(String(b.item_name));
      });

      // KPIs
      DATA.kpi = {
        jobsToday: DATA.jobs.length,
        binsOut: res[7].count||0,
        weekJobs: res[8].count||0,
        completedToday: (res[9].data||[]).length,
        lowStock: DATA.inv.filter(function(it){ return (it.current_stock||0) <= (it.min_threshold||0); }).length,
        workingToday: workingTodayCount(),
        binsMonth: res[12].count||0, binsLastYear: res[13].count||0, binsLastYearToDate: res[18].count||0,
        junkMonth: res[14].count||0, junkLastYear: res[15].count||0, junkLastYearToDate: res[19].count||0,
        furnMonth: res[16].count||0, furnLastYear: res[17].count||0, furnLastYearToDate: res[20].count||0
      };
    }

    function workingTodayCount(){
      var wd = todayWeekday(), n=0;
      DATA.emps.forEach(function(e){
        var day = (DATA.sched[e.id]||{})[wd];
        if(day && day.status==='work') n++;
      });
      return n;
    }

    // ── renderers ────────────────────────────────────────────────────────────
    // Shrink each bin card's leg list just enough that every drop-off/pick-up fits —
    // no clipping. Scales the rows via --cs (1 = full size) and leaves cards that
    // already fit untouched. clientHeight is fixed by the grid cell (independent of
    // --cs), so comparing the stacked row heights against it stays stable as we dial
    // --cs down.
    function fitBins(wrap){
      [].slice.call(wrap.querySelectorAll('.bb-body')).forEach(function(body){
        body.style.setProperty('--cs','1');
        var avail = body.clientHeight - 12;   // minus the 6px top/bottom padding
        function contentH(){ var h=0; [].forEach.call(body.children, function(c){ h+=c.offsetHeight; }); return h; }
        var cs=1, guard=0;   // floor ~0.3 so even a heavy day (a dozen+ legs) still fits, not clipped
        while(contentH() > avail && cs>0.3 && guard++<40){
          cs-=0.04; body.style.setProperty('--cs', cs.toFixed(3));
        }
      });
    }
    // Screen 1 · Bin Work Today — driver cards (grid fits the driver count), unassigned flags red
    function renderBins(){
      var board = DATA.binBoard||[];
      var total=0, done=0;
      board.forEach(function(g){ total+=g.legs.length; done+=g.done; });
      var tag = el('binsTag');
      tag.innerHTML = total ? '<span>'+done+'</span> of <span>'+total+'</span> done' : '';
      tag.style.display = total ? '' : 'none';
      el('binsMeta').textContent = total
        ? 'Updated '+new Date().toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
        : new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
      var wrap = el('binsWrap');
      if(!total){
        wrap.style.gridTemplateColumns = '1fr';
        wrap.innerHTML = '<div class="bins-empty">No bin drop-offs or pick-ups today</div>';
        return;
      }
      wrap.innerHTML = board.map(function(g, gi){
        var color = g.crewId ? (DATA.crewColor[g.crewId]||'#3a9d5a') : '#d9532b';
        var last = g.legs.length-1;
        var rows = g.legs.map(function(l,idx){
          var j = l.j, who = j.business_name || j.name || 'Customer';
          var sizeTxt = (j.bin_size||'').replace(/\s*yard/i,' YD') || '—';
          var sub = [who, l.time?fmt12(l.time):''].filter(Boolean).join(' · ');
          var stateCls, stateTxt;
          if(l.done){ stateCls='s-done'; stateTxt='✓ Done'; }
          else if(!g.crewId){ stateCls='s-assign'; stateTxt='Assign!'; }
          else { stateCls='s-todo'; stateTxt='To do'; }
          return '<div class="bb-row'+(l.done?' done':'')+(idx===last?' last':'')+'" style="--i:'+idx+'">'
            + '<span class="bb-size'+(g.crewId?'':' warn')+'">'+esc(sizeTxt)+'</span>'
            + '<span class="bb-dest"><span class="bb-city">'+esc(j.city||'')+'</span><span class="bb-who">'+esc(sub)+'</span></span>'
            + '<span class="bb-kind '+(l.kind==='drop'?'k-drop':'k-pick')+'">'+(l.kind==='drop'?'Drop':'Pick')+'</span>'
            + '<span class="bb-state '+stateCls+'">'+stateTxt+'</span>'
            + '</div>';
        }).join('');
        return '<div class="bb-group'+(g.crewId?'':' warn')+'" style="--i:'+gi+'">'
          + '<div class="bb-strip" style="background:'+color+'">'
          + '<span class="bb-name">'+(g.crewId?esc(g.name):'⚠ Needs a driver')+'</span>'
          + '<span class="bb-count" style="color:'+color+'"><span>'+g.done+'</span> / <span>'+g.legs.length+'</span>'+(g.crewId?' done':'')+'</span></div>'
          + '<div class="bb-body">'+rows+'</div></div>';
      }).join('');
      // Few drivers each get their OWN full-height column (single row) so a heavy
      // day's legs show full-size, instead of stacking into half-height cards that
      // fitBins() then has to shrink. Only when there are many drivers do we wrap
      // to 2 rows (kept wide enough that the leg rows still fit).
      var n = board.length;
      var cols = n<=3 ? n : n<=4 ? 2 : n<=6 ? 3 : 4;
      wrap.style.gridTemplateColumns = 'repeat('+cols+',minmax(0,1fr))';
      fitBins(wrap);
    }

    // Screen 2 · Crew · This Week — one grid, name column + Mon–Sat, today gold
    function renderSchedule(){
      var monday = parseLocal(mondayStr());
      el('schedTag').textContent = 'Week of '+monday.toLocaleDateString(undefined,{month:'short', day:'numeric'});
      el('schedMeta').textContent = DATA.emps.length+' on the board';
      var wrap = el('schedWrap');
      var days = WEEKDAYS.slice(0,6);            // Mon–Sat
      var todayWd = todayWeekday();
      wrap.style.gridTemplateColumns = '288px repeat(6,1fr)';
      wrap.style.gridTemplateRows = '66px repeat('+DATA.emps.length+',minmax(0,1fr))';

      var cells = ['<div></div>'];               // empty top-left corner
      days.forEach(function(dn){
        cells.push(dn===todayWd
          ? '<div class="day today"><span>'+dn.slice(0,3)+'</span><span class="tlab">TODAY</span></div>'
          : '<div class="day">'+dn.slice(0,3)+'</div>');
      });

      DATA.emps.forEach(function(e){
        var sd = DATA.sched[e.id]||{};
        var jocc = DATA.junk[String(e.name||'').toLowerCase()]||{};
        var col = DATA.jwgColor[e.id]||'#6b7280';
        cells.push('<div class="rname"><span class="pdot" style="background:'+col+'"></span><span class="pn">'+esc(e.name)+'</span></div>');
        days.forEach(function(dn){
          var t = dn===todayWd ? ' today' : '';
          var day = sd[dn];
          if(!day || day.status==='off' || day.status==='dayoff'){
            // untouched day + junk-side booking → read-only ghost (a set "Day off" stays a day off)
            if((!day || day.status==='off') && jocc[dn]){
              var parts = Object.keys(jocc[dn]).map(function(l){ var n=jocc[dn][l]; return l+(n>1?' ×'+n:''); });
              cells.push('<div class="cell jx'+t+'">🚚 '+esc(parts.join(' · '))+'</div>');
            } else {
              cells.push('<div class="cell off'+t+'">OFF</div>');
            }
            return;
          }
          if(day.status==='sick'){ cells.push('<div class="cell sick'+t+'">Sick</div>'); return; }
          // working — show the shift time range (real start/end) over the task label,
          // matching the design's two-line cell.
          var label='Work', tstr='';
          var sh = (day.shifts||[])[0];
          if(sh){
            if(sh.start && sh.end) tstr = fmt12ap(sh.start)+'–'+fmt12ap(sh.end);
            if(sh.tasks && sh.tasks.length){ var tk = DATA.tasks[sh.tasks[0]]; if(tk && tk.label) label=tk.label; }
          }
          var inner = tstr
            ? '<span class="wt">'+esc(tstr)+'</span><span class="wl">'+esc(label)+'</span>'
            : '<span class="wt">'+esc(label)+'</span>';
          cells.push('<div class="cell work'+t+'">'+inner+'</div>');
        });
      });
      wrap.innerHTML = cells.join('');
    }

    // Screen 3 · Operations — "Beat Last July" scoreboard (2A lanes / 2B arena)
    function renderKpis(){
      var k=DATA.kpi, now=new Date();
      var MONTH=now.toLocaleDateString(undefined,{month:'long'});
      el('kpiMeta').innerHTML='<span class="binsout"><b>'+(k.binsOut||0)+'</b><span>Bins out<br>right now</span></span>';

      // `last` = last year's FULL month — the target the race is run against.
      // `lastTd` = last year cut at today's day-of-month — the % only, day-for-day.
      var services=[
        {name:'Bin Rentals',      accent:'#2f8a4e', cur:k.binsMonth||0, last:k.binsLastYear||0, lastTd:k.binsLastYearToDate||0},
        {name:'Junk Removal',     accent:'#c98a2b', cur:k.junkMonth||0, last:k.junkLastYear||0, lastTd:k.junkLastYearToDate||0},
        {name:'Furniture Pickup', accent:'#b7654a', cur:k.furnMonth||0, last:k.furnLastYear||0, lastTd:k.furnLastYearToDate||0}
      ];
      services.forEach(function(s){
        s.proj  = paceProject(s.cur);
        s.beat  = s.last>0 && s.cur>=s.last;
        s.onPace= s.last>0 && s.proj>=s.last;
        s.pct   = s.lastTd>0 ? Math.round((s.cur-s.lastTd)/s.lastTd*100) : null;
      });

      el('kpiGrid').innerHTML = beatCelebrationActive(services)
        ? renderOpsArena(services, MONTH)
        : renderOpsLanes(services, MONTH);
      // count-up runs centrally in renderCurrent (covers kpiGrid + the bins-out pill)
    }

    // 2A — standings lanes
    function renderOpsLanes(services, MONTH){
      return services.map(function(s){
        var scale=Math.max(s.proj, s.last, 1)*1.14, W=function(v){ return Math.max(0,Math.min(100,v/scale*100)); };
        var solid=W(s.cur), projW=W(s.proj), tick=W(s.last);
        var ghostL=Math.min(solid,projW), ghostW=Math.max(0,projW-ghostL);
        var pctTxt=s.pct==null?'':(s.pct>=0?'▲ '+s.pct+'%':'▼ '+Math.abs(s.pct)+'%');
        var pctCol=(s.pct!=null&&s.pct>=0)?'#2f8a4e':'#c0532b';
        var good=s.beat||s.onPace;
        var pill=s.beat?'AHEAD ✓':(s.onPace?'ON PACE ✓':'BEHIND PACE');
        var sub =s.beat?('ahead by '+(s.cur-s.last))
                :s.onPace?('on track, +'+Math.max(0,s.proj-s.last))
                :((s.last-s.proj)+' short of '+s.last);
        return '<div class="opsl'+(s.beat?' beat':'')+'">'
          +'<div class="accent" style="background:'+s.accent+'"></div>'
          +'<div class="who"><div class="nm">'+esc(s.name)+'</div>'
            +(s.beat?'<div class="beatchip">★ BEAT LAST '+MONTH.slice(0,3).toUpperCase()+'</div>':'')
            +'<div class="pc" style="color:'+pctCol+'">'+pctTxt+' <em>vs same days last '+MONTH+'</em></div></div>'
          +'<div class="mid"><div class="big"><span class="n" style="color:'+s.accent+'">'+s.cur+'</span>'
            +'<span class="lab">this '+MONTH+'<br>so far</span></div>'
            +'<div class="bar"><div class="fill" style="width:'+solid+'%;background:'+s.accent+'"></div>'
            +(ghostW>0.5?'<div class="ghost" style="left:'+ghostL+'%;width:'+ghostW+'%;border-color:'+s.accent
                +';background:repeating-linear-gradient(90deg,'+s.accent+'38 0 6px,transparent 6px 12px)"></div>':'')
            +'<div class="tick" style="left:'+tick+'%"></div>'
            +'<div class="tl" style="left:'+tick+'%">last '+MONTH+' '+s.last+'</div>'
            +'<div class="pl" style="left:'+projW+'%;color:'+s.accent+'">proj '+s.proj+'</div></div></div>'
          +'<div class="verd"><div class="pill '+(good?'ok':'no')+'">'+pill+'</div>'
            +'<div class="sub" style="color:'+(good?'#2f8a4e':'#a8701a')+'">'+esc(sub)+'</div></div>'
        +'</div>';
      }).join('');
    }

    // 2B — race arena (celebration). Finish line = last year, at 26% down from the top.
    function renderOpsArena(services, MONTH){
      var LINE=0.74;
      var cols='', caps='';
      services.forEach(function(s){
        var H=function(v){ return Math.max(0,Math.min(0.99, v/Math.max(s.last,1)*LINE)); };
        var solid=H(s.cur), projTop=H(s.proj), ghostH=Math.max(0,projTop-solid);
        var pctTxt=s.pct==null?'':(s.pct>=0?'▲ '+s.pct+'%':'▼ '+Math.abs(s.pct)+'%');
        var pctCol=(s.pct!=null&&s.pct>=0)?'#8fe0a8':'#ff9d76';
        var fill=s.beat?'linear-gradient(180deg,#f2c766,#e8b34a)':'linear-gradient(180deg,'+s.accent+'cc,'+s.accent+')';
        var edge=s.beat?'#e8b34a':s.accent;
        cols+='<div class="opsa-col">'
          +(s.beat?'<span class="opsa-fx" style="left:16%">🎉</span><span class="opsa-fx" style="right:14%;animation-delay:.4s">🎉</span>':'')
          +'<div class="opsa-track">'
            +(ghostH>0.01?'<div class="opsa-ghost" style="bottom:'+(solid*100)+'%;height:'+(ghostH*100)+'%;border-color:'+edge
                +';background:repeating-linear-gradient(0deg,'+edge+'2e 0 6px,transparent 6px 12px)"></div>':'')
            +'<div class="opsa-projlab" style="bottom:'+(projTop*100)+'%;color:'+edge+'">proj '+s.proj+'</div>'
            +'<div class="opsa-fill'+(s.beat?' beat':'')+'" style="height:'+(solid*100)+'%;background:'+fill+'"></div>'
            +'<div class="opsa-num'+(s.beat?' top':'')+'" style="'+(s.beat?'':'bottom:'+(solid*100)+'%;')+'color:'+(s.beat?'#12301f':'#fdf6e6')+'">'
              +(s.beat?'<div class="bt">★ BEAT!</div>':'')+s.cur+'</div>'
          +'</div></div>';
        var vd=s.beat?'AHEAD · proj '+s.proj:(s.onPace?'ON PACE ✓ proj '+s.proj:'BEHIND PACE · proj '+s.proj);
        caps+='<div class="opsa-col-cap"><div class="nm">'+esc(s.name)+'</div>'
          +'<div class="vs">last '+MONTH+' '+s.last+' · <b style="color:'+pctCol+'">'+pctTxt+' vs same days</b></div>'
          +'<div class="vd" style="color:'+(s.beat||s.onPace?'#8fe0a8':'#f0b877')+'">'+vd+'</div></div>';
      });
      return '<div class="opsa"><div class="opsa-head"><span class="t">Race to Beat Last '+MONTH+'</span>'
        +'<span class="lg">Solid = booked · dashed = projected</span></div>'
        +'<div class="opsa-field"><div class="opsa-line"><span class="fin">FINISH</span>'
        +'<span class="last">LAST '+MONTH.toUpperCase()+'</span></div>'
        +'<div class="opsa-cols">'+cols+'</div><div class="opsa-caps">'+caps+'</div></div></div>';
    }

    // ── Screen 4 · Trucks on the Road ─────────────────────────────────────────
    // Truck positions come from the geotab-proxy edge function (`device-status`) —
    // the same read-only feed the dashboard's Live Jobs map uses. Visual only: the
    // TV never writes to jobs or to MyGeotab.
    var TRUCK_SVG = '<svg viewBox="0 0 24 24"><path d="M14 16.5V6.5a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h1"/><path d="M14 8.5h4l3 3.2v4.8a1 1 0 0 1-1 1h-1"/><circle cx="7" cy="17.3" r="2"/><circle cx="17.4" cy="17.3" r="2"/><path d="M9 17.3h6.4"/></svg>';
    // Only trucks that are OUT get drawn, so there's no 'yard' pin colour.
    var TRUCK_C = { moving:'#2f8a4e', stopped:'#c9861c' };
    var _map = null, _markers = {};
    // _cycleGen invalidates in-flight cycles. Without it a second startCycle (panel
    // re-entry, or the async refreshTrucks restart) leaves the previous chain's
    // pending timeout unclearable, and two chains race, each spawning cards.
    var _cycleTimer = null, _focusId = null, _card = null, _cycleGen = 0;
    var _trailLine = null, _replayRaf = null;
    // The trail window (90 min, set in geotab-proxy) compressed into this. Kept
    // short deliberately: with a full fleet out, each truck only holds the screen
    // for panelMs/n — 7.5s at six trucks — so a longer replay would still be
    // drawing when the cycle moves on.
    var REPLAY_MS = 5500;
    var TRAILS_MAX_AGE_MS = 5 * 60 * 1000;   // how long a fetched trail is reused

    function kmBetween(aLat, aLng, bLat, bLng){
      var R = 6371, toR = Math.PI/180;
      var dLat = (bLat-aLat)*toR, dLng = (bLng-aLng)*toR;
      var a = Math.sin(dLat/2)*Math.sin(dLat/2)
            + Math.cos(aLat*toR)*Math.cos(bLat*toR)*Math.sin(dLng/2)*Math.sin(dLng/2);
      return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function kmFromYard(lat, lng){ return kmBetween(lat, lng, YARD.lat, YARD.lng); }

    // Which town a truck is in. Nearest-town from the same list the dashboard's
    // coverage map uses (RC_CITIES in app.js) — copied because this page loads no
    // app.js. Coordinates only, deliberately NOT a reverse-geocode service: a 24/7
    // wall has no business hammering a public geocoder every time it pans.
    var TOWNS = [
      ['Barrie',44.3894,-79.6903],['Midhurst',44.4331,-79.7336],['Shanty Bay',44.4142,-79.5714],
      ['Oro-Medonte',44.53,-79.53],['Minesing',44.3861,-79.8536],['Thornton',44.235,-79.7869],
      ['Anten Mills',44.3781,-79.8181],['Innisfil',44.30,-79.585],['Angus',44.3181,-79.8811],
      ['Elmvale',44.5836,-79.8664],['Hillsdale',44.53,-79.78],['Gilford',44.2278,-79.5344],
      ['Tiny Township',44.68,-79.93],['Orillia',44.6083,-79.42],['Wasaga Beach',44.5203,-80.0164],
      ['Stayner',44.4189,-80.0847],['Bradford',44.1153,-79.5636],['Creemore',44.3242,-80.105],
      ['Alliston',44.1522,-79.8656],['Warminster',44.6175,-79.5342],['Severn',44.70,-79.65],
      ['Beeton',44.0819,-79.7828],['Mansfield',44.1839,-80.0331],['Waubaushene',44.7519,-79.7047],
      ['Midland',44.75,-79.8833],['Schomberg',44.00,-79.6864],['Mulmur',44.20,-80.1167],
      ['Port McNicoll',44.7519,-79.8067],['Penetanguishene',44.7669,-79.9314],['Washago',44.7519,-79.3383],
      ['Tottenham',44.0175,-79.8039],['Victoria Harbour',44.7519,-79.7644],['Collingwood',44.5008,-80.2169],
      ['Newmarket',44.0592,-79.4613],['Brechin',44.5333,-79.1833],['Ramara',44.60,-79.22],
      ['King City',43.9256,-79.5289],['Aurora',44.0065,-79.4504],['Blue Mountains',44.53,-80.40],
      ['Shelburne',44.0783,-80.2042],['Gravenhurst',44.9167,-79.3667],['Muskoka',45.15,-79.35],
      ['Thornbury',44.5636,-80.4553],['Bracebridge',45.0333,-79.30],['Bala',45.0167,-79.6167],
      ['Port Carling',45.1167,-79.5833],['Huntsville',45.3269,-79.2158]
    ];
    function nearestTown(lat, lng){
      var best = null, bestKm = Infinity;
      for(var i=0; i<TOWNS.length; i++){
        var km = kmBetween(lat, lng, TOWNS[i][1], TOWNS[i][2]);
        if(km < bestKm){ bestKm = km; best = TOWNS[i][0]; }
      }
      return best;
    }
    // Three states we can actually derive from a position: parked at the yard,
    // moving, or stopped out in the field. (No "on site" here — that needs the
    // bin zones, which live on the dashboard's map, not the wall.)
    function truckState(t){
      if(kmFromYard(t.lat, t.lng) <= YARD_KM) return 'yard';
      return t.isDriving ? 'moving' : 'stopped';
    }

    async function loadTrucks(){
      var r = await fetch(SUPABASE_URL + '/functions/v1/geotab-proxy', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'device-status' })
      });
      var d = await r.json();
      if(!d.ok) throw new Error(d.error || 'device-status failed');
      // Range-checked, not just type-checked: Geotab reports 0,0 for a unit that has
      // never got a fix, which would drop a pin in the Atlantic and drag fitBounds
      // (and the focus cycle) out there with it.
      DATA.trucks = (d.devices||[]).filter(function(t){
        return typeof t.lat === 'number' && typeof t.lng === 'number'
            && t.lat >= -90 && t.lat <= 90 && t.lng >= -180 && t.lng <= 180
            && !(t.lat === 0 && t.lng === 0);
      });
      DATA.trucksAt = Date.now();
    }
    // Geotab is a separate service from Supabase and it's quota'd, so a blip here
    // must never take the board down: keep the last-good pins on the wall (the
    // timestamp in the panel head shows how stale they are) and try again next
    // time the screen rotates in.
    // Last 30 min of breadcrumbs per truck, replayed when the map focuses one.
    // Same read-only proxy, separate action.
    async function loadTrails(){
      var r = await fetch(SUPABASE_URL + '/functions/v1/geotab-proxy', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'trails' })
      });
      var d = await r.json();
      if(!d.ok) throw new Error(d.error || 'trails failed');
      var out = {};
      (d.trails||[]).forEach(function(t){
        var pts = (t.points||[]).filter(function(p){
          return p && typeof p[0] === 'number' && typeof p[1] === 'number'
              && p[0] >= -90 && p[0] <= 90 && p[1] >= -180 && p[1] <= 180
              && !(p[0] === 0 && p[1] === 0);
        });
        // Geotab keeps emitting heartbeats while a truck sits still, so a parked
        // truck comes back as several BYTE-IDENTICAL points (measured: 3 points,
        // 0.0 m spread, over a 90-min window). Length, not point count, is what
        // makes a path — otherwise an idle truck claims a trail that goes nowhere.
        var moved = 0;
        for(var i = 1; i < pts.length; i++){
          moved += kmBetween(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1]);
        }
        if(pts.length >= 2 && moved >= 0.05) out[t.id] = pts;   // 50 m of travel
      });
      DATA.trails = out;
      DATA.trailsAt = Date.now();
    }

    async function refreshTrucks(){
      try{
        await loadTrucks();
        // Trails are a second Geotab read and only decoration — if they fail, the
        // pins must still go up, so this is caught on its own.
        //
        // Cached for TRAILS_MAX_AGE_MS rather than refetched every lap: the trail
        // is a 90-MINUTE history, so two fetches 105s apart are ~98% the same
        // line. Reusing it is invisible on screen and cuts both the payload and
        // the Geotab LogRecord calls to a third. Positions still refresh every
        // lap — it's only the history behind them that's cached.
        if(Date.now() - (DATA.trailsAt || 0) > TRAILS_MAX_AGE_MS){
          try { await loadTrails(); } catch(e){ console.warn('trails failed', e); }
        }
        // Restart the cycle on fresh data so it steps through the trucks that are
        // actually out right now, from the top.
        if(PANELS[panelIdx] === 'liveops'){ renderLiveOps(); startCycle(); }
      }catch(e){ console.warn('truck positions failed', e); }
    }

    function ensureTruckMap(){
      if(_map) return _map;
      if(typeof L === 'undefined') return null;
      var host = el('tvmap');
      if(!host) return null;
      // Fully inert — it's a wall, there's nobody to pan or zoom it.
      _map = L.map(host, { zoomControl:false, attributionControl:true, dragging:false,
                           scrollWheelZoom:false, doubleClickZoom:false, boxZoom:false,
                           keyboard:false, touchZoom:false, tap:false })
              .setView([YARD.lat, YARD.lng], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom:19, attribution:'© OpenStreetMap'
      }).addTo(_map);
      // A bare landmark dot, no label. A text chip here collides constantly —
      // Barrie sits right on top of the yard, and truck labels hang down into it.
      // How many trucks are parked here needs no chip either: "5 of 6 out" says it.
      L.marker([YARD.lat, YARD.lng], {
        interactive:false, zIndexOffset:-1000, icon: L.divIcon({
          className:'', iconSize:[22,22], iconAnchor:[11,11], html:'<div class="lo-yard"></div>'
        })
      }).addTo(_map);
      return _map;
    }

    // Only trucks that are actually OUT get a pin — the yarded ones would all land
    // on the same pixel. This is also what the "N of M out" tag counts.
    function outTrucks(){
      return (DATA.trucks || []).filter(function(t){ return truckState(t) !== 'yard'; });
    }

    // A truck that hasn't moved all trail-window (90 min, under 50 m of travel =
    // no trail) is parked — shop, yard, wherever — and the focus tour skips it
    // (Jake 2026-07-20). It keeps its pin; it just doesn't get flown to.
    //
    // Two guards keep this honest:
    // - moving RIGHT NOW always tours, even with no trail yet — covers a truck
    //   that woke up inside the 5-min trail cache window.
    // - stale/absent trail data disarms the skip entirely — on a Geotab blip the
    //   whole fleet would otherwise look asleep and the tour would stop.
    function isParked(t){
      if(!DATA.trailsAt || Date.now() - DATA.trailsAt > 15 * 60000) return false;
      if(truckState(t) === 'moving') return false;
      return !(DATA.trails || {})[t.id];
    }
    function tourTrucks(){
      return outTrucks().filter(function(t){ return !isParked(t); });
    }

    // The mockup's marker: glossed disc, white ring, name chip, and a ping ring
    // while the truck is moving. `sel` is the truck the map is focused on.
    function truckIcon(t, sel){
      var st = truckState(t), c = TRUCK_C[st], d = sel ? 57 : 45;
      var gloss = 'radial-gradient(circle at 34% 28%, color-mix(in srgb, '+c+' 55%, #fff), '+c+')';
      var ping = st === 'moving' ? '<span class="ping" style="color:'+c+'"></span>' : '';
      return L.divIcon({ className:'', iconSize:[d, d+30], iconAnchor:[d/2, d/2],
        html:'<div class="lo-tk'+(sel ? ' sel' : '')+'">'
           + '<span class="b" style="background:'+gloss+'">'+TRUCK_SVG+ping+'</span>'
           + '<span class="n">'+esc(t.name)+'</span></div>' });
    }

    // Each truck's regular driver — the same pairing app-leaderboard.js encodes as
    // AUTO_ASSIGNMENTS, and what Jake confirms: Kevin is always in the L7, Neil in
    // Hino 2020.
    //
    // Deliberately NOT vehicle_assignments. That table is the crew ROSTER on a truck
    // (UNIQUE(vid, crew_member_id, assignment_date); toggleCrewAssignment inserts one
    // row per person), so a driver and their helper sit there as concurrent open rows
    // — on 2026-07-07 the L7 held Kevin 08:07 and Josh 11:24 at once. Picking the
    // latest row therefore names the HELPER, and since bin legs carry only the
    // driver's crew id, their jobs-left reads 0 while the truck still has a full run.
    var TRUCK_DRIVERS = [
      { match:'SILVERADO',    driver:'Max'    },
      { match:'Darrin Truck', driver:'Darrin' },
      { match:'2020',         driver:'Neil'   },
      { match:'L7 2023',      driver:'Kevin'  }
    ];
    function driverFor(truckName){
      var name = String(truckName || ''), hit = null;
      TRUCK_DRIVERS.forEach(function(d){ if(!hit && name.indexOf(d.match) >= 0) hit = d.driver; });
      return hit;
    }
    function crewIdByName(name){
      var want = String(name || '').toLowerCase(), hit = null;
      Object.keys(DATA.crewAll || {}).forEach(function(id){
        if(!hit && String(DATA.crewAll[id]).toLowerCase() === want) hit = id;
      });
      return hit;
    }

    // Today's work still outstanding for one crew member. Bin legs come from the
    // board (done/not-done is geofence-driven, same as Screen 1); everything else
    // counts as left until the job is marked completed.
    function crewProgress(crewId){
      var done = 0, total = 0;
      (DATA.binBoard||[]).forEach(function(g){
        if(g.crewId !== crewId) return;
        g.legs.forEach(function(l){ total++; if(l.done) done++; });
      });
      (DATA.jobs||[]).forEach(function(e){
        if(e.service === 'Bin Drop-off' || e.service === 'Bin Pick-up') return;   // counted above
        if((e.crewIds||[]).indexOf(crewId) === -1) return;
        total++; if(e.completed) done++;
      });
      return { done:done, total:total, left:total-done };
    }

    // Card for the focused truck. A permanent tooltip so it tracks the pin rather
    // than needing a hover the wall can never give it. Driver and jobs-left only
    // appear when today's truck assignment tells us who is actually in it.
    function truckCard(t){
      var st = truckState(t), c = TRUCK_C[st];
      var label = st === 'moving' ? 'Moving' : 'Stopped';
      // Against Date.now(), NOT DATA.trucksAt: both of those are stamped at fetch
      // time, so the age froze and read "just now" for the whole weekend while the
      // pins were Saturday's. An "ago" label has to keep counting.
      var age = t.lastUpdate
        ? Math.max(0, Math.round((Date.now() - Date.parse(t.lastUpdate)) / 60000)) : null;
      var driver = driverFor(t.name);
      var crewId = driver ? crewIdByName(driver) : null;
      var rows = '';
      if(driver && crewId){
        var pr = crewProgress(crewId);
        rows += '<div class="rw"><span>Driver</span><b>'+esc(driver)+'</b></div>'
             +  '<div class="rw"><span>Jobs left</span><b>'+pr.left+'</b></div>';
        // Bar only when there's work to measure — a 0-of-0 bar reads as "finished"
        // when it actually means "nothing was assigned".
        if(pr.total){
          rows += '<div class="bar"><i style="width:'+Math.round(100*pr.done/pr.total)
               +  '%;background:'+c+'"></i></div>'
               +  '<div class="cap">'+pr.done+' of '+pr.total+' done</div>';
        }
      }
      rows += '<div class="rw"><span>Speed</span><b>'+Math.round(t.speed||0)+' km/h</b></div>'
           +  '<div class="rw"><span>Last ping</span><b>'
           +  (age === null ? '—' : age === 0 ? 'just now' : age + ' min ago') + '</b></div>';
      return '<div class="card"><div class="hd" style="background:'+c+'">'
        + '<span class="nm">'+esc(t.name)+'</span><span class="st">'+label+'</span></div>'
        + rows + '</div>';
    }

    function drawTrucks(){
      var map = ensureTruckMap();
      if(!map) return;
      var list = outTrucks(), seen = {};
      list.forEach(function(t){
        seen[t.id] = 1;
        var m = _markers[t.id];
        if(m){ m.setLatLng([t.lat, t.lng]); m.setIcon(truckIcon(t, t.id === _focusId)); }
        else {
          m = L.marker([t.lat, t.lng], { icon:truckIcon(t, false), interactive:false }).addTo(map);
          _markers[t.id] = m;
        }
      });
      Object.keys(_markers).forEach(function(id){
        if(!seen[id]){ map.removeLayer(_markers[id]); delete _markers[id]; }
      });
      // The panel is hidden when the map is first built, so Leaflet needs a nudge
      // to pick up its real size.
      map.invalidateSize();
    }

    // Frame everything — the overview we fall back to when there's nobody to focus.
    function frameAll(){
      if(!_map) return;
      var pts = outTrucks().map(function(t){ return [t.lat, t.lng]; });
      pts.push([YARD.lat, YARD.lng]);
      _map.fitBounds(pts, { padding:[80,90], maxZoom:12, animate:false });
    }

    // ── trail replay ──────────────────────────────────────────────────────────
    function stopReplay(){
      if(_replayRaf){ cancelAnimationFrame(_replayRaf); _replayRaf = null; }
      if(_trailLine){ _trailLine.remove(); _trailLine = null; }
    }

    // Draw the focused truck's recent path, growing it from oldest to newest so
    // the run replays rather than just appearing. Carries the cycle generation so
    // a frame that lands after the cycle moved on can't draw onto the next truck.
    function replayTrail(t, gen){
      stopReplay();
      var pts = (DATA.trails || {})[t.id];
      if(!pts || pts.length < 2 || !_map) return;
      var c = TRUCK_C[truckState(t)];
      _trailLine = L.polyline([pts[0]], {
        color:c, weight:6, opacity:.85, lineCap:'round', lineJoin:'round',
        interactive:false, className:'lo-trail'
      }).addTo(_map);
      // requestAnimationFrame is throttled to a crawl (and can stop entirely) while
      // the tab is hidden, which would strand the line part-drawn — the same reason
      // countUp() bails when hidden. Nobody is watching then, so just draw the whole
      // path and skip the animation.
      if(document.hidden){ _trailLine.setLatLngs(pts); return; }
      var start = null;
      function frame(ts){
        if(gen !== _cycleGen){ return; }
        if(start === null) start = ts;
        var p = Math.min(1, (ts - start) / REPLAY_MS);
        // ease-out so it charges away and settles, rather than crawling linearly
        var e = 1 - Math.pow(1 - p, 2);
        _trailLine.setLatLngs(pts.slice(0, Math.max(2, Math.round(e * pts.length))));
        if(p < 1) _replayRaf = requestAnimationFrame(frame);
        else _replayRaf = null;
      }
      _replayRaf = requestAnimationFrame(frame);
    }

    // ── focus cycle: step through the trucks while the screen is up ───────────
    function stopCycle(){
      stopReplay();
      _cycleGen++;                       // any chain still in flight now bails out
      clearTimeout(_cycleTimer); _cycleTimer = null; _focusId = null;
      el('loTown').classList.remove('on');
      // .remove(), not map.closeTooltip() — these are added as layers, and
      // closeTooltip only clears ones opened via openTooltip.
      if(_card){ _card.remove(); _card = null; }
    }

    function focusTruck(i, gen){
      if(gen !== _cycleGen) return;      // a newer cycle has taken over
      var list = tourTrucks();           // parked trucks keep pins but aren't flown to
      if(!list.length){ _focusId = null; frameAll(); return; }
      var t = list[((i % list.length) + list.length) % list.length];
      _focusId = t.id;
      list.forEach(function(x){
        var m = _markers[x.id];
        if(m) m.setIcon(truckIcon(x, x.id === t.id));
      });
      var town = el('loTown');
      town.innerHTML = '<span class="k">In</span><span class="v">'+esc(nearestTown(t.lat, t.lng))+'</span>';
      town.classList.add('on');
      if(_card) _card.remove();
      _card = L.tooltip({ permanent:true, direction:'top', offset:[0,-34],
                          className:'lo-pop', interactive:false })
        .setLatLng([t.lat, t.lng]).setContent(truckCard(t)).addTo(_map);
      // flyTo, not panTo — panning alone left the map parked at the wide overview
      // zoom, so a focused truck was a dot in a region. This drops right in on it.
      // With a trail we frame the whole recent run instead, capped at the same
      // zoom so a truck that has barely moved doesn't slam to max magnification.
      var path = (DATA.trails || {})[t.id];
      var bounds = path && path.length >= 2
        ? L.latLngBounds(path.concat([[t.lat, t.lng]])) : null;
      // getBoundsZoom tells us what fitting the trail WOULD cost. If that's wider
      // than the floor, don't fit it — stay close on the truck instead.
      //
      // The doubling is load-bearing: flyToBounds applies `padding` to BOTH sides
      // and hands getBoundsZoom the sum, while getBoundsZoom treats its argument as
      // the total. Checking with FIT_PAD un-doubled saw more room than the real
      // call had, so trails slipped through and then fitted a zoom level below the
      // floor — measured: a 20 km trail passed the check and framed at 11.
      if(bounds && _map.getBoundsZoom(bounds, false,
           L.point(FIT_PAD[0] * 2, FIT_PAD[1] * 2)) >= MIN_ZOOM){
        _map.flyToBounds(bounds, { maxZoom:FOCUS_ZOOM, padding:FIT_PAD, duration:0.9 });
      } else {
        _map.flyTo([t.lat, t.lng], FOCUS_ZOOM, { duration:0.9 });
      }
      replayTrail(t, gen);
      // Split the screen's dwell across however many trucks are out, with a floor
      // so a big fleet doesn't turn into a strobe.
      var hold = Math.max(6000, Math.floor(panelMs('liveops') / list.length));
      _cycleTimer = setTimeout(function(){ focusTruck(i + 1, gen); }, hold);
    }

    function startCycle(){
      stopCycle();
      if(!_map) return;
      frameAll();
      // All-parked (or none out) is a valid state: pins stay up, the overview
      // frames them, and nobody gets flown to. The next data refresh restarts
      // the tour the moment anything wakes up.
      if(tourTrucks().length) focusTruck(0, _cycleGen);
    }

    function renderLiveOps(){
      var list = DATA.trucks || [];
      var out = list.filter(function(t){ return truckState(t) !== 'yard'; }).length;

      var tag = el('loTag');
      tag.textContent = list.length ? out + ' of ' + list.length + ' out' : '';
      tag.style.display = list.length ? '' : 'none';

      el('loLegend').innerHTML = '<b><i style="background:'+TRUCK_C.moving+'"></i>Moving</b>'
        + '<b><i style="background:'+TRUCK_C.stopped+'"></i>Stopped</b>'
        + '<b><i style="background:var(--gold)"></i>Yard</b>';
      // No clock here — the header already has one. This slot only speaks up when
      // the GPS feed has given us nothing, which the header can't tell you.
      el('loMeta').textContent = DATA.trucksAt ? '' : 'Waiting on GPS…';

      // Bins-out isn't repeated here — the Operations screen already carries it.
      // These two live nowhere else on the board, so they ride in the head rather
      // than costing the map any width.
      var k = DATA.kpi || {};
      el('loCount').textContent = (k.jobsToday||0) + ' jobs today · ' + (k.completedToday||0) + ' done';

      drawTrucks();
    }

    function renderCurrent(){
      var name = PANELS[panelIdx];
      if(name==='bins') renderBins();
      else if(name==='schedule') renderSchedule();
      else if(name==='kpis') renderKpis();
      else if(name==='liveops') renderLiveOps();
      // count the numbers up on the Bin Work + Operations screens
      if(name==='bins' || name==='kpis'){
        var panel = document.querySelector('.panel[data-panel="'+name+'"]');
        if(panel) countUp(panel);
      }
    }

    // ── rotation ─────────────────────────────────────────────────────────────
    function showPanel(i){
      panelIdx = (i+PANELS.length)%PANELS.length;
      var name = PANELS[panelIdx];
      renderCurrent();
      var panels = document.querySelectorAll('.panel');
      panels.forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-panel')===name); });
      // Pull fresh truck positions as the map rotates in — once every lap rather
      // than on a timer of its own, so the pins are current exactly when they're
      // on screen and we spend nothing on Geotab's quota the rest of the time.
      if(name === 'liveops'){
        startCycle();                                   // begin with what we have
        if(!inQuietHours()) refreshTrucks();          // then restart on fresh data
      } else {
        stopCycle();                                    // nothing spinning off-screen
      }
    }
    // try/finally is load-bearing: this is a self-rearming chain, so if showPanel()
    // throws, the re-arm never runs and the wall freezes on one screen forever. The
    // old setInterval kept firing regardless; the chain has to match that.
    function nextPanel(){
      try { showPanel(panelIdx+1); }
      catch(e){ console.error('panel render failed', e); }
      finally { armRotation(); }
    }
    // A setTimeout chain rather than one setInterval, so each panel can hold the
    // screen for its own length of time.
    function armRotation(){
      clearTimeout(rotTimer);
      rotTimer = setTimeout(nextPanel, panelMs(PANELS[panelIdx]));
    }
    function startRotation(){
      showPanel(0);
      armRotation();
      // Verification hook only — inert unless the URL carries ?debug. Lets a
      // reviewer pin a panel (window.__tv.show(i)) without the rotation moving on.
      if(/[?&]debug\b/.test(location.search)){
        window.__tv = { show:function(i){ clearTimeout(rotTimer); showPanel(i); }, next:nextPanel, DATA:DATA, render:renderCurrent };
      }
    }

    // ── fit the fixed 1920×1080 board to the wall ─────────────────────────────
    function fitBoard(){
      el('board').style.setProperty('--s', Math.min(window.innerWidth/1920, window.innerHeight/1080));
    }

    // ── clock ────────────────────────────────────────────────────────────────
    function tickClock(){
      var d = new Date();
      el('clockT').textContent = d.toLocaleTimeString(undefined,{hour:'numeric', minute:'2-digit'});
      el('clockD').textContent = d.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'}).toUpperCase();
    }

    // ── weather (Open-Meteo, free, no key; Barrie-area yard coords) ──────────
    var WMO = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',56:'🌦️',57:'🌦️',
               61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',77:'🌨️',
               80:'🌦️',81:'🌦️',82:'🌦️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
    async function loadWeather(){
      try{
        var r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=44.3683&longitude=-79.6831'
          +'&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&forecast_days=1&timezone=auto');
        var w = await r.json();
        var cur = w.current||{}, d = w.daily||{};
        if(cur.temperature_2m==null) return;
        el('wxI').textContent = WMO[cur.weather_code]||'🌡️';
        el('wxT').textContent = Math.round(cur.temperature_2m)+'°';
        el('wxHL').innerHTML = 'H '+Math.round((d.temperature_2m_max||[])[0])+'°<br>L '+Math.round((d.temperature_2m_min||[])[0])+'°';
        el('wx').classList.add('on');
      }catch(e){ console.warn('weather failed', e); }   // board just shows no weather on a blip
    }

    // ── 9 AM briefing ────────────────────────────────────────────────────────
    // A GitHub Action speaks the day's work at 9 and publishes it as a Release
    // asset. The board shows the text alongside, so if the browser blocks
    // autoplay — Chrome does, without a user gesture, and nobody touches a wall
    // display — the briefing still lands and we're told why it was silent.
    var BRIEF_URL = 'https://github.com/soramithril/jeffs-junk/releases/download/briefing/';
    var BRIEF_HOUR = 9;
    var BRIEF_SHOW_MS = 45000;

    function briefDoneKey(){ return 'jj-tv-brief-' + todayStr(); }

    async function playBriefing(){
      try{
        // ?t= because GitHub caches Release assets and this URL never changes.
        var meta = await fetch(BRIEF_URL + 'briefing.json?t=' + Date.now(), { cache:'no-store' })
          .then(function(r){ return r.ok ? r.json() : null; });
        // Refuse to read out a stale briefing: better silent than announcing
        // yesterday's work as today's.
        if(!meta || meta.date !== todayStr()) return;

        el('briefText').textContent = meta.text || '';
        el('briefWarn').textContent = '';
        el('brief').classList.add('on');

        var audio = new Audio(BRIEF_URL + 'briefing.mp3?t=' + Date.now());
        audio.play().catch(function(err){
          console.warn('briefing autoplay blocked', err);
          el('briefWarn').textContent = 'Audio blocked by the browser — text only. '
            + 'Yodeck needs --autoplay-policy=no-user-gesture-required.';
        });

        setTimeout(function(){ el('brief').classList.remove('on'); }, BRIEF_SHOW_MS);
      }catch(e){ console.warn('briefing failed', e); }
    }

    // Fires once on the first tick at or after 9 AM. localStorage keyed by date,
    // so a reload at 9:30 doesn't replay it and a reload tomorrow does.
    function checkBriefing(){
      if(new Date().getHours() < BRIEF_HOUR) return;
      if(inQuietHours()) return;
      try{
        if(localStorage.getItem(briefDoneKey())) return;
        // Sweep old date-keyed markers before writing today's — without this the
        // board accrues one dead ~30-byte key per day, forever. Trivial, but this
        // display runs unattended for months.
        //
        // Collect first, THEN remove: localStorage.key(i) order is unspecified
        // and may reshuffle after a removeItem, so deleting while iterating can
        // let a key hop past the cursor — verified, one of 30 seeded stale keys
        // survived a backwards-iterating sweep.
        var stale = [];
        for(var i = 0; i < localStorage.length; i++){
          var k = localStorage.key(i);
          if(k && k.indexOf('jj-tv-brief-') === 0 && k !== briefDoneKey()) stale.push(k);
        }
        stale.forEach(function(s){ localStorage.removeItem(s); });
        localStorage.setItem(briefDoneKey(), '1');
      }catch(e){ return; }   // no storage means we can't dedupe, so don't play
      playBriefing();
    }

    // ── net status ───────────────────────────────────────────────────────────
    function net(ok){ el('netdot').classList.toggle('bad', !ok); }

    // ── self-update: reload when a NEW office-tv.html is deployed ──────────────
    // Yodeck (and the browser) cache the page, so a new deploy can sit stale on the
    // wall indefinitely. This polls the file's ETag straight from GitHub — a HEAD with
    // cache:'no-store' + a unique query, so no cache can answer it. When the content
    // changes the ETag changes → reload cache-busted (?r=), carrying the display
    // creds forward in the hash so the reloaded page always re-auths (the persisted
    // session isn't reliable across a Yodeck reload — see below).
    var _tvEtag = null, _tvPending = null;
    async function checkForUpdate(){
      try{
        var r = await fetch(location.pathname + '?u=' + Date.now(), { method:'HEAD', cache:'no-store' });
        if(!r.ok) return;
        var tag = r.headers.get('etag') || r.headers.get('last-modified');
        if(!tag) return;
        if(_tvEtag === null){ _tvEtag = tag; return; }        // first poll = baseline
        if(tag === _tvEtag){ _tvPending = null; return; }     // unchanged (or settled back) — nothing pending
        // Changed vs baseline: reload only once the SAME new version shows up on two
        // checks in a row. Right after a deploy the CDN can briefly serve old/new from
        // different edges; requiring two matching reads means one clean reload, never
        // a couple in a row.
        if(tag === _tvPending){
          // Carry the display creds forward in the hash so the reloaded page can
          // ALWAYS sign itself back in. The self-reload drops the original Yodeck
          // hash, and the persisted session does NOT reliably survive a Yodeck
          // reload — without this the board stranded on the "needs display link"
          // gate after every update until someone reloaded it by hand.
          var frag = _tvCreds ? ('#e='+encodeURIComponent(_tvCreds.email)+'&p='+encodeURIComponent(_tvCreds.pass)) : '';
          location.replace(location.pathname + '?r=' + Date.now() + frag);
        }
        else { _tvPending = tag; }
      }catch(e){ /* offline blip — retry next tick */ }
    }

    // ── auth: one path — must be the display account ─────────────────────────
    function parseCreds(){
      var h = (location.hash||'').replace(/^#/,'');
      if(!h) return null;
      var q = new URLSearchParams(h);
      var email = q.get('e') || q.get('u');
      var pass = q.get('p');
      return (email && pass) ? {email:email, pass:pass} : null;
    }
    function stripHash(){ history.replaceState(null,'', location.pathname + location.search); }
    function fail(msg){ el('gateSpin').style.display='none'; el('gateMsg').innerHTML = esc(msg); }

    // Stash the display credentials in memory. They arrive in the URL hash and the
    // hash is then stripped; keeping a copy lets this 24/7 board sign itself back
    // in whenever its token lapses — without waiting for a Yodeck page reload.
    var _tvCreds = null;

    async function authenticate(){
      if(!_tvCreds) _tvCreds = parseCreds();
      var sess = (await db.auth.getSession()).data.session;
      if(!sess){
        if(!_tvCreds){ fail('This screen needs the office display link. Ask an admin to set it up.'); return null; }
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        stripHash();
        // A sign-in error at a 24/7 wall is almost always the office Wi-Fi dropping
        // mid-request — throw so boot() retries in place (and self-heals when the
        // connection returns) rather than parking on an error screen.
        if(r.error){ throw r.error; }
        sess = r.data.session;
      } else { stripHash(); }
      if(!sess || (sess.user && sess.user.email !== DISPLAY_EMAIL)){
        try{ await db.auth.signOut(); }catch(e){}
        fail('This screen is for the office display only.');
        return null;
      }
      return sess;
    }

    // Every board read now needs a logged-in session (RLS lockdown, July 2). Before
    // a refresh, make sure the session is present and not about to expire; if it's
    // gone or stale, sign back in with the stashed display credentials. Without this
    // the 15-min refresh silently reads as logged-out and the board goes empty/stale.
    async function ensureFreshSession(){
      var sess = (await db.auth.getSession()).data.session;
      var leftMs = (sess && sess.expires_at) ? (sess.expires_at*1000 - Date.now()) : -1;
      if(!sess || leftMs < 120000){        // missing, expired, or expiring within 2 min
        if(!_tvCreds) _tvCreds = parseCreds();
        if(!_tvCreds) throw new Error('session lapsed and no display credentials to re-auth');
        var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
        if(r.error) throw r.error;
      }
    }

    // ── boot ─────────────────────────────────────────────────────────────────
    var _bootFails = 0;
    async function boot(){
      try{
        var sess = await authenticate();   // returns null ONLY for a permanent stop
        if(!sess) return;                  //   (no display link / wrong account) — leave that message up
        await loadAll(); net(true); _bootFails = 0;
      }catch(e){
        console.error(e); net(false);
        // A failure here is a transient blip — the office Wi-Fi dropped mid sign-in
        // or mid data-load. We RETRY IN PLACE with a gentle backoff and let the
        // connection come back, keeping the "reconnecting" screen up. We do NOT
        // reload: reloading can't fix a blip (a genuinely broken build never parses,
        // so it never reaches this catch), and the old 3-strikes reload is exactly
        // what stranded the wall in a loop on the loading screen. New builds are
        // still picked up by checkForUpdate(), so nothing goes stale.
        _bootFails++;
        el('gateMsg').textContent = 'Reconnecting to dispatch — hang tight…';
        setTimeout(boot, Math.min(30000, 6000 * _bootFails));   // 6s, 12s, 18s … capped at 30s
        return;
      }
      el('gate').style.display='none';
      el('viewport').style.display='flex';
      el('tvbin').src = 'assets/' + TV_BINS[Math.floor(Math.random()*TV_BINS.length)];   // random bin this load
      fitBoard(); window.addEventListener('resize', fitBoard);
      tickClock(); setInterval(tickClock, 1000);
      checkBriefing(); setInterval(checkBriefing, 60000);   // 9 AM spoken briefing
      loadWeather(); setInterval(loadWeather, 30*60*1000);
      startRotation();
      // Prime the pins so the map screen has trucks on it the first time it rotates in.
      if(!inQuietHours()) refreshTrucks();
      // Auto-pick-up new deploys (bypasses Yodeck/browser cache) so the wall never
      // sits stale — checks every 5 min and reloads itself when a new build ships.
      checkForUpdate(); setInterval(checkForUpdate, 5*60*1000);
      // periodic refresh; keep showing last-good data on a blip
      setInterval(async function(){
        if(inQuietHours()) return;
        try{
          await ensureFreshSession();
          await loadAll(); net(true); renderCurrent();
        }catch(e){
          console.error('refresh failed', e); net(false);
          // one recovery attempt: force a fresh sign-in, then retry the load
          try{
            if(!_tvCreds) _tvCreds = parseCreds();
            if(_tvCreds){
              var r = await db.auth.signInWithPassword({ email:_tvCreds.email, password:_tvCreds.pass });
              if(!r.error){ await loadAll(); net(true); renderCurrent(); }
            }
          }catch(e2){ console.error('re-auth retry failed', e2); }
        }
      }, REFRESH_MS);
    }

    boot();
  })();
  </script>
</body>
</html>
