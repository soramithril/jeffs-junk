<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Jeff's App</title>
<script>
  /* Layout switch (Jake only): if Jake last chose the full dashboard on this
     device, bounce there. Gated by jjDashUser, set only on Jake's dashboard
     login — Jeff and other staff never have it, so they stay on this page. */
  try {
    if (localStorage.getItem('jjDashUser') === 'Jake' && localStorage.getItem('jjLayout') === 'dashboard') {
      location.replace('index.html');
    }
  } catch (e) {}
</script>
<link rel="icon" type="image/png" href="assets/app-icon-192.png">
<link rel="apple-touch-icon" href="assets/app-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jeff's App">
<meta name="theme-color" content="#16a34a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(1200px 760px at 50% -8%,#eef1f3,#e0e4e7);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#17223a}
a{color:#16a34a;text-decoration:none}
a:hover{color:#15803d}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes jspin{to{transform:rotate(360deg)}}
.jspin{width:38px;height:38px;border-radius:50%;border:3px solid #e7eae8;border-top-color:#16a34a;animation:jspin .8s linear infinite}
.jscreen{animation:screenIn .26s ease both}
.jscroll::-webkit-scrollbar{width:0;height:0;display:none}
.jscroll{scrollbar-width:none;-ms-overflow-style:none;overscroll-behavior:contain}
.pa{transition:transform .12s ease;-webkit-tap-highlight-color:transparent}
.pa:active{transform:scale(.96)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.phone{position:relative;width:426px;height:898px;border-radius:56px;background:linear-gradient(150deg,#15171b,#000);padding:12px;box-shadow:0 50px 100px rgba(0,0,0,.32),0 6px 20px rgba(0,0,0,.2)}
.glass{position:relative;width:100%;height:100%;border-radius:46px;overflow:hidden;background:#eef1ee}
@media (max-width:466px){
  html,body{overflow:hidden;height:100%}
  .wrap{padding:0}
  .phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none}
  .glass{border-radius:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="glass">
      <div class="jscroll" id="scroll" style="position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column">
        <div id="screen" style="flex:1 0 auto;display:flex;flex-direction:column"></div>
      </div>

      <div id="toast"></div>
      <div id="busy"></div>
    </div>
  </div>
</div>

<input id="jeff-photo-input" type="file" accept="image/*" multiple style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px">
<input id="jeff-date-input" type="date" style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  "use strict";

  // Jake-only layout switch. This flag is set only when Jake signs into the full
  // dashboard on this device (see app.js), so Jeff and other staff never see the
  // toggle. The '⇄ Full dashboard' pill and the head redirect both key off it.
  var isJake = false;
  try { isJake = localStorage.getItem('jjDashUser') === 'Jake'; } catch(e){}

  var state = {
    screen:'home', dayOffset:0, truckIdx:0, angle:0, filter:'all',
    toast:'', busy:'', fleet:null, fleetErr:false, jobs:null, syncedAt:'',
    authChecked:false, authed:false, me:null
  };
  var lastScreen = null;
  var toastTimer = null, feedTimer = null, pendingJob = null;

  // ---------- data ----------
  function clock(){ var d=new Date(),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+(m<10?'0':'')+m+' '+ap; }

  // ---------- Supabase (same project + auth as the desktop dashboard) ----------
  var SB_URL = 'https://okoqzbdyfjfgcdgmcamq.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3F6YmR5ZmpmZ2NkZ21jYW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDYyNzEsImV4cCI6MjA4ODIyMjI3MX0.SQQD5HN2h179Lsqb-gxqnuTZcIXUyxrtmBP6VLOO57w';
  // supabase-js persists the session in localStorage under the same key the dashboard
  // uses (same origin + project), so a dashboard login carries straight into this app.
  var db = supabase.createClient(SB_URL, SB_KEY);
  // Cloudinary unsigned upload — same account/preset as the dashboard (see app.js).
  var CLOUDINARY_CLOUD_NAME = 'dglezca2l';
  var CLOUDINARY_PRESET = 'jeffs_junk';
  var STC = { ok:'#22c55e', warn:'#f5b342', bad:'#ef4444', muted:'#6b727a' };
  var STBG = { '#22c55e':'rgba(34,197,94,.14)', '#f5b342':'rgba(245,179,66,.14)', '#ef4444':'rgba(239,68,68,.15)', '#6b727a':'rgba(139,146,153,.14)' };
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var STATE_RANK = { muted:0, ok:1, warn:2, bad:3 };

  function ymd(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function todayISO(){ return ymd(new Date()); }
  function dateFromOffset(off){ var d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()+off); return d; }
  function fmtTime(iso){ try{ return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
  // Turn a stored "14:30" / "2:30 PM" style time into a short label; blank stays blank.
  function prettyTime(t){
    if(!t) return '';
    var m = String(t).match(/^(\d{1,2}):(\d{2})/);
    if(!m) return String(t);
    var h=parseInt(m[1],10), mn=m[2], ap=h>=12?'PM':'AM'; h=h%12||12;
    return h+':'+mn+' '+ap;
  }
  function timeKey(t){ var m=String(t||'').match(/(\d{1,2}):(\d{2})/); return m ? (parseInt(m[1],10)*60+parseInt(m[2],10)) : 9999; }

  // ---------- Cloudinary photo upload (mirrors app.js) ----------
  async function compressImage(file){
    var bmp = await createImageBitmap(file, {imageOrientation:'from-image'});
    var scale = Math.min(1, 1920/Math.max(bmp.width,bmp.height));
    var w=Math.round(bmp.width*scale), h=Math.round(bmp.height*scale);
    var c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(bmp,0,0,w,h);
    return new Promise(function(res,rej){ c.toBlob(function(b){ b?res(b):rej(new Error('toBlob failed')); }, 'image/jpeg', 0.82); });
  }
  async function uploadToCloudinary(file){
    var blob = await compressImage(file);
    var fd = new FormData(); fd.append('file', blob); fd.append('upload_preset', CLOUDINARY_PRESET);
    var res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD_NAME+'/image/upload', {method:'POST', body:fd});
    if(!res.ok) throw new Error('Upload failed: HTTP '+res.status);
    var data = await res.json();
    if(!data.secure_url) throw new Error('Upload failed: no URL');
    return data.secure_url;
  }
  function cloudinaryThumb(url, width){
    if(!url || url.indexOf('/upload/')<0) return url;
    return url.replace('/upload/', '/upload/f_auto,q_auto,w_'+(width||200)+'/');
  }

  // Oil status — mirrors the desktop _vehOilStatus (>180d overdue, >90d due soon).
  function oilStatus(v){
    if(!v.oil_date) return { state:'muted', head:'Oil', sub:'No date set' };
    var days = Math.floor((Date.now() - new Date(v.oil_date+'T12:00:00')) / 86400000);
    var state = days>180 ? 'bad' : days>90 ? 'warn' : 'ok';
    var head = 'Oil '+(state==='bad'?'overdue':state==='warn'?'due soon':'OK');
    var sub = days+'d since last'+(v.oil_km?' · '+Number(v.oil_km).toLocaleString()+' km':'');
    return { state:state, head:head, sub:sub, days:days };
  }
  // Sticker status — mirrors the desktop _vehStickerStatus (valid through end of month).
  function stickerStatus(v){
    if(!v.sticker_month || !v.sticker_year) return { state:'muted', head:'Sticker', sub:'Not set' };
    var y=parseInt(v.sticker_year,10), m=parseInt(v.sticker_month,10);
    var expiry=new Date(y,m,0); expiry.setHours(23,59,59,999);
    var diff=Math.floor((expiry-Date.now())/86400000);
    var state = diff<0 ? 'bad' : diff<30 ? 'warn' : 'ok';
    var sub = MONTHS[m-1]+' '+y+(diff<0?' · expired':diff<30?' · '+diff+'d left':'');
    return { state:state, head:'Sticker', sub:sub, days:diff };
  }
  // Soonest km-based service from the desktop's maintenance_schedules + live odometer.
  function serviceStatus(list, odoKm){
    if(!list || !list.length) return null;
    var soonest=null;
    list.forEach(function(s){
      var kmLeft = (s.next_due_km!=null && odoKm!=null) ? (s.next_due_km - odoKm) : null;
      if(kmLeft==null) return;
      if(soonest==null || kmLeft<soonest.km) soonest={ km:kmLeft, type:s.maintenance_type };
    });
    if(!soonest) return { state:'muted', text:'Schedule set · no odometer' };
    var state = soonest.km<=0 ? 'bad' : soonest.km<=500 ? 'warn' : 'ok';
    var text = soonest.type+' '+(soonest.km<=0 ? Math.abs(soonest.km).toLocaleString()+' km overdue' : 'in '+soonest.km.toLocaleString()+' km');
    return { state:state, text:text };
  }
  function shortName(n){ return String(n).replace(/^Hino\s+/i,'').replace(/Furniture Bank Van/i,'Van'); }

  function TRUCKS(){ return state.fleet || []; }

  // ---------- fleet load ----------
  // Pulls the real fleet from Supabase (vehicles + odometer + maintenance + today's
  // driver) plus live Geotab position, and builds one model per truck. Non-fleet
  // (leaderboard-only personal) trucks are excluded, matching the desktop fleet views.
  function loadAll(){ loadFleet(); loadJobs(); }

  function loadFleet(){
    Promise.all([
      db.from('vehicles').select('vid,name,type,color,notes,sticker_month,sticker_year,oil_date,oil_km,oil_interval,vehicle_status,leaderboard_only').eq('leaderboard_only',false).order('created_at'),
      db.from('vehicle_odometers').select('vid,odometer_km'),
      db.from('maintenance_schedules').select('vid,maintenance_type,next_due_km,status'),
      db.from('vehicle_assignments').select('vid,crew_member_id,ended_at').eq('assignment_date', todayISO()),
      db.from('crew_members').select('id,name'),
      fetch(SB_URL+'/functions/v1/geotab-proxy',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'device-status'}) })
        .then(function(r){ return r.ok?r.json():{devices:[]}; }).catch(function(){ return {devices:[]}; })
    ]).then(function(res){
      var veh=res[0].data||[], odo=res[1].data||[], maint=res[2].data||[], assign=res[3].data||[], crew=res[4].data||[], dev=(res[5]&&res[5].devices)||[];
      var odoBy={}; odo.forEach(function(o){ odoBy[o.vid]=o.odometer_km; });
      var crewBy={}; crew.forEach(function(c){ crewBy[c.id]=c.name; });
      var driverBy={}; assign.forEach(function(a){ if(!a.ended_at) driverBy[a.vid]=crewBy[a.crew_member_id]||null; });
      var devBy={}; dev.forEach(function(d){ devBy[d.name]=d; });
      var maintBy={}; maint.forEach(function(m){ (maintBy[m.vid]=maintBy[m.vid]||[]).push(m); });

      var fleet = veh.map(function(v){
        var odoKm = (odoBy[v.vid]!=null) ? odoBy[v.vid] : null;
        var oil=oilStatus(v), st=stickerStatus(v), svc=serviceStatus(maintBy[v.vid], odoKm);
        // Three switchable angles per truck (source: hino 195 1-3 for the bin trucks,
        // hino L7 1-3 for the L7), cleaned + composited onto the dark hero.
        var imgs = /L7/i.test(v.name) ? ['assets/truck-l7-1.png','assets/truck-l7-2.png','assets/truck-l7-3.png']
                 : /hino|bin/i.test(v.name+' '+v.type) ? ['assets/truck-bin-1.png','assets/truck-bin-2.png','assets/truck-bin-3.png']
                 : [];
        var worst='ok';
        [oil.state, st.state, svc?svc.state:'ok'].forEach(function(s){ if(STATE_RANK[s]>STATE_RANK[worst]) worst=s; });
        if(v.vehicle_status && v.vehicle_status!=='Available' && STATE_RANK.warn>STATE_RANK[worst]) worst='warn';
        var alerts=[];
        if(oil.state==='bad'||oil.state==='warn') alerts.push({ sev:oil.state, text:'Oil '+(oil.state==='bad'?'overdue':'due soon') });
        if(st.state==='bad'||st.state==='warn') alerts.push({ sev:st.state, text:'Sticker '+(st.state==='bad'?'expired':'expiring') });
        if(svc && (svc.state==='bad'||svc.state==='warn')) alerts.push({ sev:svc.state, text:svc.text });
        return { vid:v.vid, name:v.name, type:v.type||'Truck', color:v.color||'#22c55e', status:v.vehicle_status||'Available',
                 odoKm:odoKm, oil:oil, sticker:st, service:svc, driver:driverBy[v.vid]||null, device:devBy[v.name]||null,
                 imgs:imgs, alerts:alerts, worst:worst };
      });
      setState({ fleet:fleet, fleetErr:false, syncedAt: clock() });
    }).catch(function(e){ setState({ fleet:[], fleetErr:true, syncedAt: clock() }); });
  }
  function refreshFleet(){ showToast('🔄 Refreshing trucks…'); loadFleet(); }

  // ---------- jobs load (real schedule) ----------
  // One query covers both The Day and Photos: every non-cancelled job with any of its
  // date fields on/after a few days ago. We bucket it into per-day "stops" client-side.
  function loadJobs(){
    var since = ymd(dateFromOffset(-3));
    db.from('jobs')
      .select('job_id,service,status,name,city,address,time,date,bin_dropoff,bin_pickup,bin_dropoff_time,bin_pickup_time,junk_date,junk_time,fb_date,fb_time,photos,bin_size')
      .neq('status','Cancelled')
      .or('date.gte.'+since+',bin_dropoff.gte.'+since+',bin_pickup.gte.'+since+',junk_date.gte.'+since+',fb_date.gte.'+since)
      .limit(1500)
      .then(function(r){ setState({ jobs: r.error ? [] : (r.data||[]) }); });
  }

  function svcColor(s){ s=s||''; if(/quote/i.test(s)) return '#0d6efd'; if(/junk/i.test(s)) return '#eab308'; if(/land/i.test(s)) return '#65a30d'; if(/furniture/i.test(s)) return '#8b5cf6'; if(/bin/i.test(s)) return '#0891b2'; return '#5b6472'; }

  function mkStop(j,label,color,time){
    return { label:label, color:color, who:[j.name,j.city].filter(Boolean).join(' · '), addr:j.address||'',
             time:prettyTime(time), tk:timeKey(time), hasPhotos:!!(j.photos&&j.photos.length), binSize:j.bin_size||'' };
  }
  // Build the ordered list of stops for a given YYYY-MM-DD, from the loaded jobs.
  function dayStops(D){
    var stops=[];
    (state.jobs||[]).forEach(function(j){
      var m=false;
      if(j.bin_dropoff===D){ stops.push(mkStop(j,'Drop','#0891b2',j.bin_dropoff_time)); m=true; }
      if(j.bin_pickup===D){ stops.push(mkStop(j,'Pick','#be185d',j.bin_pickup_time)); m=true; }
      if(j.junk_date===D){ stops.push(mkStop(j,j.service||'Junk',svcColor(j.service),j.junk_time)); m=true; }
      if(j.fb_date===D){ stops.push(mkStop(j,j.service||'Furniture','#8b5cf6',j.fb_time)); m=true; }
      if(!m && j.date===D){ stops.push(mkStop(j,j.service||'Job',svcColor(j.service),j.time)); }
    });
    stops.sort(function(a,b){ return a.tk-b.tk; });
    return stops;
  }

  // Photo-worthy jobs for the Photos screen (quotes / landscaping / junk / furniture —
  // not the routine bin drops/picks, which live on The Day).
  function photosJobs(){
    var f=state.filter;
    var list=(state.jobs||[]).filter(function(j){
      if(j.service==='Bin Rental') return false;
      if(f==='Quote') return j.service==='Junk Quote';
      if(f==='Landscaping') return j.service==='Landscaping';
      return true;
    });
    list.sort(function(a,b){ return String(a.fb_date||a.junk_date||a.date||'').localeCompare(String(b.fb_date||b.junk_date||b.date||'')); });
    return list.slice(0,40);
  }

  // ---------- state ----------
  function setState(patch){ for(var k in patch) state[k]=patch[k]; render(); }

  function showToast(m){ state.toast=m; renderToast(); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ state.toast=''; renderToast(); }, 2200); }

  // ---------- actions ----------
  function nav(sc){ state.toast=''; renderToast(); setState({screen:sc}); }
  function openAlert(){ var t=TRUCKS(); var i=-1; for(var k=0;k<t.length;k++){ if(t[k].alerts && t[k].alerts.length){ i=k; break; } } state.toast=''; renderToast(); setState({screen:'trucks', truckIdx: i<0?0:i, angle:0}); }
  function prevDay(){ setState({dayOffset: state.dayOffset-1}); }
  function nextDay(){ setState({dayOffset: state.dayOffset+1}); }
  function openDate(){ var el=document.getElementById('jeff-date-input'); if(!el) return; el.value=ymd(dateFromOffset(state.dayOffset)); try{ if(el.showPicker) el.showPicker(); else el.click(); }catch(e){ el.click(); } }
  function onDate(e){ var v=e.target.value; if(!v) return; var d=new Date(v+'T12:00:00'); var off=Math.round((d - dateFromOffset(0))/86400000); setState({dayOffset:off}); }
  function setFilter(f){ setState({filter:f}); }
  function pickTruck(i){ setState({truckIdx: parseInt(i,10)||0, angle:0}); }
  function setAngle(i){ setState({angle: parseInt(i,10)||0}); }
  function nextAngle(){ var f=TRUCKS(); var t=f[Math.min(state.truckIdx, f.length-1)]; var n=(t&&t.imgs&&t.imgs.length)?t.imgs.length:1; setState({angle:(state.angle+1)%n}); }

  // A photo can take a while on a truck's signal. Hold the screen with something obvious
  // and centred until it's actually saved — a toast that fades after 2 seconds reads as
  // "done" while the upload is still going.
  function setBusy(title, note){ state.busy=title||''; state.busyNote=note||''; renderBusy(); }

  // Add photos to a REAL job: upload each to Cloudinary, append the URL to jobs.photos.
  function addPhoto(jobId){ pendingJob=jobId; var el=document.getElementById('jeff-photo-input'); if(el){ el.value=''; el.click(); } }
  async function onPhoto(e){
    var files = Array.prototype.slice.call(e.target.files||[]);
    var jobId = pendingJob;
    if(!jobId || !files.length) return;
    var urls=[], failed=0;
    for(var i=0;i<files.length;i++){
      setBusy('Uploading…', files.length>1 ? ('Photo '+(i+1)+' of '+files.length) : '');
      try{ urls.push(await uploadToCloudinary(files[i])); }
      catch(err){ failed++; }
    }
    if(urls.length){
      setBusy('Uploading…', 'Saving to the job…');
      var job=(state.jobs||[]).filter(function(j){ return j.job_id===jobId; })[0];
      var next=((job&&job.photos)||[]).concat(urls);
      var r = await db.from('jobs').update({photos:next}).eq('job_id', jobId);
      if(r.error){ setBusy(''); showToast('⚠ Couldn\'t save to the job'); return; }
      if(job){ job.photos=next; }
      render();
    }
    setBusy('');
    showToast(urls.length ? ('📷 '+urls.length+' added'+(failed?' · '+failed+' failed':'')) : '⚠ Upload failed');
  }

  // Take a photo off a job. The file stays in Cloudinary — the unsigned upload preset has
  // no delete rights — but it's off the job, which is what the crew sees.
  async function delPhoto(arg){
    var bits = String(arg||'').split('|');
    var jobId = bits[0], idx = parseInt(bits[1],10);
    var job=(state.jobs||[]).filter(function(j){ return j.job_id===jobId; })[0];
    if(!job || !job.photos || !job.photos[idx]) return;
    if(!confirm('Delete this photo?')) return;
    var next = job.photos.slice(); next.splice(idx,1);
    setBusy('Deleting…', '');
    var r = await db.from('jobs').update({photos:next}).eq('job_id', jobId);
    setBusy('');
    if(r.error){ showToast('⚠ Couldn\'t delete'); return; }
    job.photos=next;
    render();
    showToast('🗑 Photo deleted');
  }

  var ACTS = {
    goHome:function(){ nav('home'); }, goJobs:function(){ nav('jobs'); }, goTrucks:function(){ nav('trucks'); },
    openAlert:openAlert, onPrev:prevDay, onNext:nextDay, onPick:openDate,
    setAll:function(){ setFilter('all'); }, setQuote:function(){ setFilter('Quote'); }, setLand:function(){ setFilter('Landscaping'); },
    pickTruck:function(arg){ pickTruck(arg); }, onLoc:refreshFleet,
    setAngle:function(arg){ setAngle(arg); }, nextAngle:nextAngle,
    addPhoto:function(arg){ addPhoto(arg); },
    goQuotes:function(){ state.filter='Quote'; nav('photos'); },
    delPhoto:delPhoto,
    goDash:function(){ try{ localStorage.setItem('jjLayout','dashboard'); }catch(e){} location.href='index.html'; }
  };

  // ---------- helpers ----------
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Today's quote jobs (Junk Quote booked for today), with time + location.
  function todaysQuotes(){
    var T=todayISO();
    return (state.jobs||[]).filter(function(j){ return j.service==='Junk Quote' && (j.junk_date===T || j.date===T || j.fb_date===T); })
      .map(function(j){
        var tm = j.junk_date===T ? j.junk_time : j.date===T ? j.time : j.fb_time;
        return { who:[j.name,j.city].filter(Boolean).join(' · '), addr:j.address||'', time:prettyTime(tm), tk:timeKey(tm) };
      })
      .sort(function(a,b){ return a.tk-b.tk; });
  }

  // ---------- screens ----------
  function homeHTML(){
    var trucks=TRUCKS();
    var flagged=[]; trucks.forEach(function(t){ if(t.alerts && t.alerts.length) flagged.push(t); });

        '<div class="pa" data-act="onLoc" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0">🔄</div>'+
      '</div>';
    var open = '<div class="screenpad" style="flex:1 0 auto;background:radial-gradient(135% 90% at 50% 24%,#14161a 0%,#0a0b0e 58%,#060708 100%);padding:calc(env(safe-area-inset-top, 0px) + 22px) 18px calc(env(safe-area-inset-bottom, 0px) + 24px);display:flex;flex-direction:column;color:#f4f6f7">';

    if(state.fleet===null){
      return open+head+'<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#8b9299;font-size:15px">Loading fleet…</div></div>';
    }
    if(state.fleetErr || !state.fleet.length){
      return open+head+'<div style="margin-top:56px;text-align:center;color:#8b9299"><div style="font-size:40px">🚛</div><div style="font-size:15px;margin-top:10px">'+(state.fleetErr?'Couldn\'t reach the fleet data.':'No trucks found.')+'</div><div class="pa" data-act="onLoc" style="display:inline-block;margin-top:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:10px 20px;font-size:14px;font-weight:700;color:#e6e9ec;cursor:pointer">Try again</div></div></div>';
    }

    var idx = Math.min(state.truckIdx, state.fleet.length-1);
    var t = state.fleet[idx];

    var chips = state.fleet.map(function(tk,i){
      var on = i===idx;
      var dot = tk.worst==='bad' ? '<span style="width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0"></span>'
              : tk.worst==='warn' ? '<span style="width:6px;height:6px;border-radius:50%;background:#f5b342;flex-shrink:0"></span>' : '';
      return '<div class="pa" data-act="pickTruck" data-arg="'+i+'" style="display:flex;align-items:center;gap:7px;flex-shrink:0;padding:8px 13px;border-radius:999px;cursor:pointer;background:'+(on?'rgba(255,255,255,.13)':'rgba(255,255,255,.04)')+';border:1px solid '+(on?'rgba(255,255,255,.22)':'rgba(255,255,255,.08)')+'">'+
          '<span style="width:9px;height:9px;border-radius:50%;background:'+tk.color+';flex-shrink:0"></span>'+
          '<span style="font-size:13px;font-weight:'+(on?'800':'600')+';color:'+(on?'#fff':'#c3c9cf')+';white-space:nowrap">'+esc(shortName(tk.name))+'</span>'+dot+
        '</div>';
    }).join('');
    var selector = '<div class="jscroll" style="display:flex;gap:8px;overflow-x:auto;margin:14px -18px 6px;padding:2px 18px">'+chips+'</div>';

    var statusColor = t.status==='Available' ? STC.ok : /shop/i.test(t.status) ? STC.warn : STC.muted;
    var nameRow =
      '<div style="display:flex;align-items:flex-start;gap:10px;margin-top:4px">'+
        '<div style="flex:1"><div style="font-size:25px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.05">'+esc(t.name)+'</div><div style="font-size:13px;color:#8b9299;margin-top:2px">'+esc(t.type)+'</div></div>'+
        '<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:6px 12px;border-radius:999px;color:'+statusColor+';background:'+STBG[statusColor]+';border:1px solid '+statusColor+'44;white-space:nowrap">'+esc(t.status)+'</span>'+
      '</div>';

    var alertStrip='';
    if(t.alerts.length){
      var ac = t.worst==='bad'?STC.bad:STC.warn;
      alertStrip = '<div style="display:flex;align-items:center;gap:9px;background:'+STBG[ac]+';border:1px solid '+ac+'44;border-radius:14px;padding:10px 13px;margin-top:11px">'+
          '<span style="font-size:16px">'+(t.worst==='bad'?'🔴':'🟡')+'</span>'+
          '<span style="font-size:13px;font-weight:700;color:'+ac+'">'+esc(t.alerts.map(function(a){return a.text;}).join(' · '))+'</span>'+
        '</div>';
    }

    var hero;
    if(t.imgs && t.imgs.length){
      // Switch between the three angles (tap the photo or a dot). Photos have their own
      // dark background, so they blend into the hero with no extra drop-shadow.
      var ang = Math.min(state.angle||0, t.imgs.length-1);
      var imgEl = '<div class="pa" data-act="nextAngle" style="height:196px;margin:8px -18px 0;cursor:pointer"><img src="'+t.imgs[ang]+'" alt="" draggable="false" style="width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none"></div>';
      var dots = t.imgs.length>1 ? ('<div style="display:flex;justify-content:center;gap:8px;margin-top:2px">'+
          t.imgs.map(function(_,i){ var on=i===ang; return '<div class="pa" data-act="setAngle" data-arg="'+i+'" style="width:'+(on?'20px':'8px')+';height:8px;border-radius:999px;cursor:pointer;background:'+(on?'#22c55e':'rgba(255,255,255,.25)')+';transition:width .2s"></div>'; }).join('')+
        '</div>') : '';
      hero = imgEl+dots;
    } else {
      hero = '<div style="height:150px;display:flex;align-items:center;justify-content:center;margin:10px 0 0"><div style="width:118px;height:118px;border-radius:28px;background:linear-gradient(160deg,'+t.color+',rgba(0,0,0,.35));display:flex;align-items:center;justify-content:center;font-size:58px;box-shadow:0 16px 30px rgba(0,0,0,.4)">🚐</div></div>';
    }

    var odoBlock = '<div style="text-align:center;margin-top:2px">'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:52px;line-height:.9;color:#fff;letter-spacing:1px">'+(t.odoKm!=null?Number(t.odoKm).toLocaleString():'—')+'</div>'+
        '<div style="font-size:11px;font-weight:700;color:#8b9299;letter-spacing:1.5px;margin-top:1px">KM ON THE CLOCK</div>'+
      '</div>';

    var locMain, locSub, locDot;
    if(t.device){
      locMain = t.device.isDriving ? ('On the move'+(t.device.speed?' · '+Math.round(t.device.speed)+' km/h':'')) : 'Parked';
      locSub = 'Geotab · seen '+fmtTime(t.device.lastUpdate);
      locDot = t.device.isDriving ? STC.ok : '#8b9299';
    } else { locMain='No live GPS'; locSub='Not reporting to Geotab'; locDot=STC.muted; }
    var mapLink = t.device ? '<a href="https://www.google.com/maps?q='+t.device.lat+','+t.device.lng+'" target="_blank" rel="noopener" style="font-size:13px;color:#7fb2ff;font-weight:700;white-space:nowrap;text-decoration:none">Map ›</a>' : '';
    var locCard = '<div style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px 18px;margin-top:14px">'+
        '<span style="width:9px;height:9px;border-radius:50%;background:'+locDot+';flex-shrink:0"></span>'+
        '<div style="flex:1"><div style="font-size:15px;color:#e6e9ec;font-weight:700">'+esc(locMain)+'</div><div style="font-size:13px;color:#8b9299;margin-top:1px">'+esc(locSub)+'</div></div>'+
        mapLink+
      '</div>';

    var driverCard = t.driver ? ('<div style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px 18px;margin-top:11px">'+
        '<span style="font-size:20px">👤</span>'+
        '<div style="flex:1"><div style="font-size:13px;color:#8b9299">Today\'s driver</div><div style="font-size:15px;color:#e6e9ec;font-weight:700;margin-top:1px">'+esc(t.driver)+'</div></div>'+
      '</div>') : '';

    var oilC = STC[t.oil.state]||STC.muted, stC = STC[t.sticker.state]||STC.muted;
    var oilStk = '<div style="display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:15px 0;margin-top:11px">'+
        '<div style="flex:1;display:flex;align-items:center;gap:11px;padding:0 15px">'+
          '<span style="font-size:19px">🛢️</span>'+
          '<div><div style="font-size:12px;color:'+oilC+';font-weight:700;text-transform:uppercase;letter-spacing:.3px">'+esc(t.oil.head)+'</div><div style="font-size:13px;color:#e6e9ec;font-weight:600;margin-top:2px">'+esc(t.oil.sub)+'</div></div>'+
        '</div>'+
        '<div style="width:1px;background:rgba(255,255,255,.1)"></div>'+
        '<div style="flex:1;display:flex;align-items:center;gap:11px;padding:0 15px">'+
          '<span style="font-size:19px">📋</span>'+
          '<div><div style="font-size:12px;color:'+stC+';font-weight:700;text-transform:uppercase;letter-spacing:.3px">'+esc(t.sticker.head)+'</div><div style="font-size:13px;color:#e6e9ec;font-weight:600;margin-top:2px">'+esc(t.sticker.sub)+'</div></div>'+
        '</div>'+
      '</div>';

    var svcCard='';
    if(t.service){
      var svcC = STC[t.service.state]||STC.muted;
      var svcTextColor = (t.service.state==='ok'||t.service.state==='muted') ? '#e6e9ec' : svcC;
      svcCard = '<div style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px 18px;margin-top:11px">'+
          '<span style="font-size:20px">🔧</span>'+
          '<div style="flex:1"><div style="font-size:13px;color:#8b9299">Next service</div><div style="font-size:15px;color:'+svcTextColor+';font-weight:700;margin-top:1px">'+esc(t.service.text)+'</div></div>'+
        '</div>';
    }

    var footer = '<div style="font-size:12px;color:#6b727a;text-align:center;margin-top:14px">Live from the office'+(state.syncedAt?' · '+esc(state.syncedAt):'')+'</div>';

    return open+head+selector+nameRow+alertStrip+hero+odoBlock+locCard+driverCard+oilStk+svcCard+footer+'</div>';
  }

  // ---------- render ----------
  // Centre of the screen, over everything, and it swallows taps — nobody should be able to
  // wander off mid-upload and wonder whether the photo landed.
  function renderBusy(){
    var el = document.getElementById('busy');
    if(!el) return;
    if(!state.busy){ el.innerHTML=''; return; }
    el.innerHTML = '<div style="position:absolute;inset:0;z-index:90;background:rgba(14,22,16,.5);display:flex;align-items:center;justify-content:center">'+
        '<div style="background:#fff;border-radius:24px;padding:30px 38px;display:flex;flex-direction:column;align-items:center;gap:15px;box-shadow:0 20px 50px rgba(0,0,0,.32);min-width:190px">'+
          '<div class="jspin"></div>'+
          '<div style="font-size:18px;font-weight:800;color:#17223a">'+esc(state.busy)+'</div>'+
          (state.busyNote ? '<div style="font-size:13px;color:#98a0aa">'+esc(state.busyNote)+'</div>' : '')+
        '</div>'+
      '</div>';
  }

  function renderToast(){
    var el = document.getElementById('toast');
    if(state.toast){
      el.innerHTML = '<div style="position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:70;background:#17223a;color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.28);white-space:nowrap;animation:toastIn .22s ease both">'+esc(state.toast)+'</div>';
    } else { el.innerHTML=''; }
  }

  function render(){
    var scroll = document.getElementById('scroll');
    var screen = document.getElementById('screen');
    // Reuse the dashboard's login: show a splash until we have a session (no session
    // redirects to index.html), then the app.
    var viewKey = (!state.authChecked || !state.authed) ? 'splash' : state.screen;
    var html;
    if(viewKey==='splash') html='<div style="flex:1 0 auto;display:flex;align-items:center;justify-content:center;color:#98a0aa;font-size:15px;background:linear-gradient(180deg,#f7f9f7,#edf1ee)">Loading…</div>';
    else if(viewKey==='home') html=homeHTML();
    else if(viewKey==='jobs') html=jobsHTML();
    else if(viewKey==='photos') html=photosHTML();
    else html=trucksHTML();

    var changed = viewKey!==lastScreen;
    // Home (and the splash) are static — no scroll. Other screens scroll.
    var isStatic = viewKey==='home' || viewKey==='splash';
    scroll.style.overflowY = isStatic ? 'hidden' : 'auto';
    var keepScroll = (changed || isStatic) ? 0 : scroll.scrollTop;
    screen.innerHTML = html;
    var inner = screen.firstElementChild;
    if(inner && changed && html.indexOf('jscreen')<0) inner.className += ' jscreen';
    scroll.scrollTop = keepScroll;
    lastScreen = viewKey;

    renderToast();
    renderBusy();
  }

  // ---------- wiring ----------
  document.querySelector('.glass').addEventListener('click', function(e){
    var t = e.target.closest('[data-act]');
    if(!t) return;
    var fn = ACTS[t.getAttribute('data-act')];
    if(fn) fn(t.getAttribute('data-arg'));
  });
  document.getElementById('jeff-photo-input').addEventListener('change', onPhoto);
  document.getElementById('jeff-date-input').addEventListener('change', onDate);

  // ---------- auth boot ----------
  // This app has no login of its own — it reuses the dashboard's. supabase-js shares the
  // session across index.html and jeff.html (same origin), so a dashboard sign-in flows
  // straight in. With no session we send the user to the dashboard's existing login.
  function toDashboardLogin(){
    // Drop a 'mobile' layout preference first so the dashboard doesn't bounce us back.
    try{ if(localStorage.getItem('jjLayout')==='mobile') localStorage.setItem('jjLayout','dashboard'); }catch(e){}
    // Mark where to come back to. Without this, anyone who isn't Jake signs in and is
    // stranded on the full dashboard with no way back to this app — which is exactly how
    // Jeff's app "disappeared". The dashboard consumes this on a successful sign-in only,
    // so a session that won't stick can't bounce the two pages off each other forever.
    try{ localStorage.setItem('jjReturn','jeff.html'); }catch(e){}
    location.replace('index.html');
  }
  async function loadMe(user){
    var name = (user.email||'').split('@')[0];
    try{ var r = await db.from('user_profiles').select('username').eq('id', user.id).single(); if(r.data && r.data.username) name=r.data.username; }catch(e){}
    state.me = { name:name };
    if(name==='Jake'){ isJake=true; try{ localStorage.setItem('jjDashUser','Jake'); }catch(e){} }
    render();
  }
  function onAuthed(session){
    state.authed=true; state.authChecked=true;
    render();
    loadMe(session.user);
    loadAll();
    if(!feedTimer) feedTimer = setInterval(loadAll, 1200000); // 20 min — keeps Supabase egress low
  }
  // Phones freeze timers while the screen is off — reload once when the app comes back
  // into view so Jeff never looks at stale data between the 20-min ticks.
  document.addEventListener('visibilitychange', function(){ if(!document.hidden && state.authed) loadAll(); });

  db.auth.getSession().then(function(r){
    var sess = r.data && r.data.session;
    if(sess){ onAuthed(sess); }
    else { toDashboardLogin(); }
  });
  db.auth.onAuthStateChange(function(ev, session){
    if(session && !state.authed){ onAuthed(session); }
    else if(!session && ev==='SIGNED_OUT'){ clearInterval(feedTimer); feedTimer=null; toDashboardLogin(); }
  });

  render();
})();
</script>
</body>
</html>
