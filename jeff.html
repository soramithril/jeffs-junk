<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Jeff's App</title>
<script>
  /* Layout switch (Jake only): if Jake last chose the full dashboard on this
     device, bounce there. Gated by jjDashUser, set only on Jake's dashboard
     login — Jeff and other staff never have it, so they stay on this page. */
  try {
    if (localStorage.getItem('jjDashUser') === 'Jake' && localStorage.getItem('jjLayout') === 'dashboard') {
      location.replace('index.html');
    }
  } catch (e) {}
</script>
<link rel="icon" type="image/png" href="assets/app-icon-192.png">
<link rel="apple-touch-icon" href="assets/app-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jeff's App">
<meta name="theme-color" content="#16a34a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:radial-gradient(1200px 760px at 50% -8%,#eef1f3,#e0e4e7);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#17223a}
a{color:#16a34a;text-decoration:none}
a:hover{color:#15803d}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes gaugeGrow{from{width:0}}
.jscreen{animation:screenIn .26s ease both}
.jscroll::-webkit-scrollbar{width:0;height:0;display:none}
.jscroll{scrollbar-width:none;-ms-overflow-style:none}
.pa{transition:transform .12s ease;-webkit-tap-highlight-color:transparent}
.pa:active{transform:scale(.96)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.phone{position:relative;width:426px;height:898px;border-radius:56px;background:linear-gradient(150deg,#15171b,#000);padding:12px;box-shadow:0 50px 100px rgba(0,0,0,.32),0 6px 20px rgba(0,0,0,.2)}
.glass{position:relative;width:100%;height:100%;border-radius:46px;overflow:hidden;background:#eef1ee}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:37px;border-radius:24px;background:#000;z-index:50}
.sb{position:absolute;top:0;left:0;right:0;height:54px;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:0 34px 0 32px;color:#17223a}
.sb.dark{color:#fff}
.sb-time{font-size:15px;font-weight:700;letter-spacing:.3px}
.sb-bar{background:currentColor;border-radius:1px}
.sb-batt{width:24px;height:12px;border:1.5px solid currentColor;border-radius:3px;position:relative;display:flex;align-items:center;padding:1.5px}
.hi{width:139px;height:5px;border-radius:100px;background:rgba(0,0,0,.24)}
.hi.dark{background:rgba(255,255,255,.45)}
@media (max-width:466px){
  .wrap{padding:0}
  .phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none}
  .glass{border-radius:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="glass">
      <div class="notch"></div>
      <div class="sb" id="sb">
        <div class="sb-time">9:41</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="display:flex;align-items:flex-end;gap:2px;height:12px">
            <div class="sb-bar" style="width:3px;height:5px"></div>
            <div class="sb-bar" style="width:3px;height:8px"></div>
            <div class="sb-bar" style="width:3px;height:11px"></div>
            <div class="sb-bar" style="width:3px;height:12px"></div>
          </div>
          <div style="font-size:11px;font-weight:800">5G</div>
          <div class="sb-batt"><div style="width:15px;height:100%;background:currentColor;border-radius:1px"></div><div style="position:absolute;right:-3px;top:3px;width:2px;height:6px;background:currentColor;border-radius:0 1px 1px 0"></div></div>
        </div>
      </div>

      <div class="jscroll" id="scroll" style="position:absolute;inset:0;overflow-y:auto">
        <div id="screen"></div>
      </div>

      <div style="position:absolute;bottom:0;left:0;right:0;height:30px;z-index:60;display:flex;justify-content:center;align-items:flex-end;padding-bottom:9px;pointer-events:none"><div class="hi" id="hi"></div></div>

      <div id="toast"></div>
    </div>
  </div>
</div>

<input id="jeff-photo-input" type="file" accept="image/*" multiple style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px">
<input id="jeff-date-input" type="date" min="2026-07-13" max="2026-07-19" style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px">

<script>
(function(){
  "use strict";

  // Jake-only layout switch. This flag is set only when Jake signs into the full
  // dashboard on this device (see app.js), so Jeff and other staff never see the
  // toggle. The '⇄ Full dashboard' pill and the head redirect both key off it.
  var isJake = false;
  try { isJake = localStorage.getItem('jjDashUser') === 'Jake'; } catch(e){}

  var state = {
    screen:'home', dayIdx:0, truckIdx:0, filter:'all',
    photos:{walsh:[],roy:[],nguyen:[]},
    toast:'', angle:0, feed:null, syncedAt:''
  };
  var lastScreen = null;
  var toastTimer = null, feedTimer = null, pendingJob = null;

  // ---------- data ----------
  function clock(){ var d=new Date(),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+(m<10?'0':'')+m+' '+ap; }

  function LIVE(){
    return [
      {name:'Hino 195', plate:'BX·812', odo:'84,120', fuelPct:63, oilPct:72, oilKm:'in ~4,800 km', sticker:'Nov 2026', stickerLeft:'132 days left', stickerOk:true, loc:'Workyard', seen:'just now', state:'Parked', health:'good', statusMsg:'No issues detected'},
      {name:'Hino L7', plate:'CF·440', odo:'142,540', fuelPct:41, oilPct:14, oilKm:'now — overdue', sticker:'Jul 24', stickerLeft:'12 days left', stickerOk:false, loc:'Barrie · on site', seen:'just now', state:'Working', health:'engine', statusMsg:'Book it into the shop'}
    ];
  }

  function DAYS(){
    return [
      {lab:'TODAY', date:'Mon · Jul 13', iso:'2026-07-13', drops:3, picks:2, jobs:[
        {c:'#eab308', svc:'Junk Removal', who:'Miller · Barrie', time:'8:30', ap:'AM', ph:false},
        {c:'#65a30d', svc:'Landscaping', who:'Roy · Barrie', time:'10:00', ap:'AM', ph:true},
        {c:'#0d6efd', svc:'Junk Quote', who:'Walsh · Midland', time:'1:30', ap:'PM', ph:true},
        {c:'#8b5cf6', svc:'Furniture Pickup', who:'Adams · Orillia', time:'3:00', ap:'PM', ph:false}
      ]},
      {lab:'TOMORROW', date:'Tue · Jul 14', iso:'2026-07-14', drops:2, picks:4, jobs:[
        {c:'#eab308', svc:'Junk Removal', who:'Bianchi · Innisfil', time:'9:00', ap:'AM', ph:false},
        {c:'#0d6efd', svc:'Junk Quote', who:'Patel · Barrie', time:'11:00', ap:'AM', ph:true},
        {c:'#65a30d', svc:'Landscaping', who:'Gagnon · Oro', time:'2:00', ap:'PM', ph:false}
      ]},
      {lab:'WED', date:'Jul 15', iso:'2026-07-15', drops:4, picks:1, jobs:[
        {c:'#0d6efd', svc:'Junk Quote', who:'Lee · Barrie', time:'8:45', ap:'AM', ph:false},
        {c:'#f97316', svc:'Furniture Delivery', who:'Smith · Midland', time:'1:00', ap:'PM', ph:false}
      ]},
      {lab:'THU', date:'Jul 16', iso:'2026-07-16', drops:1, picks:3, jobs:[
        {c:'#65a30d', svc:'Landscaping', who:'Roy · Barrie', time:'9:30', ap:'AM', ph:true},
        {c:'#eab308', svc:'Junk Removal', who:'Kovac · Barrie', time:'12:00', ap:'PM', ph:false},
        {c:'#eab308', svc:'Junk Removal', who:'Tran · Orillia', time:'2:30', ap:'PM', ph:false},
        {c:'#0d6efd', svc:'Junk Quote', who:'Doyle · Innisfil', time:'4:00', ap:'PM', ph:false}
      ]},
      {lab:'FRI', date:'Jul 17', iso:'2026-07-17', drops:5, picks:2, jobs:[
        {c:'#0d6efd', svc:'Junk Quote', who:'Meyer · Barrie', time:'10:00', ap:'AM', ph:true}
      ]},

        {c:'#65a30d', svc:'Landscaping', who:'Osei · Barrie', time:'11:00', ap:'AM', ph:false}
      ]},
      {lab:'SUN', date:'Jul 19', iso:'2026-07-19', drops:0, picks:0, jobs:[]}
    ];
  }

  function TRUCKS(){
    if(state.feed && state.feed.length) return state.feed;
    return [
      {name:'Hino 195', plate:'BX·812', odo:'84,120', fuelPct:78, oilPct:72, oilKm:'in ~4,800 km', sticker:'Nov 2026', stickerLeft:'132 days left', stickerOk:true, loc:'Workyard', seen:'12 min ago', state:'Parked', health:'good', statusMsg:'No issues detected'},
      {name:'Hino L7', plate:'CF·440', odo:'142,540', fuelPct:34, oilPct:14, oilKm:'now — overdue', sticker:'Jul 24', stickerLeft:'12 days left', stickerOk:false, loc:'Barrie · on site', seen:'8 min ago', state:'Working', health:'engine', statusMsg:'Book it into the shop'}
    ];
  }

  function JOBS(){
    return [
      {id:'walsh', name:'Walsh', addr:'14 Bay St · Midland', type:'Quote', preset:['linear-gradient(150deg,#c7d6dd,#9fb3bd)','linear-gradient(150deg,#d8cdbf,#b3a390)']},
      {id:'roy', name:'Roy', addr:'8 Cedar Ln · Barrie', type:'Landscaping', preset:['linear-gradient(150deg,#b6cdae,#8fae83)','linear-gradient(150deg,#c9d3b1,#a3b284)','linear-gradient(150deg,#a9c2c9,#84a1ab)','linear-gradient(150deg,#cdbfa8,#a99a80)']},
      {id:'nguyen', name:'Nguyen', addr:'22 Maple Dr · Orillia', type:'Quote', preset:[]}
    ];
  }

  // ---------- feed ----------
  function loadFeed(){
    fetch('geotab-feed.json?t=' + Date.now(), { cache:'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){ setState({ feed:(d && d.trucks && d.trucks.length) ? d.trucks : LIVE(), syncedAt: clock() }); })
      .catch(function(){ setState({ feed:LIVE(), syncedAt: clock() }); });
  }
  function refreshFeed(){ showToast('🔄 Syncing with Geotab…'); loadFeed(); }

  // ---------- state ----------
  function setState(patch){ for(var k in patch) state[k]=patch[k]; render(); }

  function showToast(m){ state.toast=m; renderToast(); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ state.toast=''; renderToast(); }, 2200); }

  // ---------- actions ----------
  function nav(sc){ state.toast=''; renderToast(); setState({screen:sc}); }
  function openAlert(){ var t=TRUCKS(); var i=-1; for(var k=0;k<t.length;k++){ if(t[k].health!=='good'){ i=k; break; } } state.toast=''; renderToast(); setState({screen:'trucks', truckIdx: i<0?0:i, angle:0}); }
  function prevDay(){ setState({dayIdx: Math.max(0, state.dayIdx-1)}); }
  function nextDay(){ var n=DAYS().length-1; setState({dayIdx: Math.min(n, state.dayIdx+1)}); }
  function openDate(){ var el=document.getElementById('jeff-date-input'); if(!el) return; el.value=DAYS()[state.dayIdx].iso; try{ if(el.showPicker) el.showPicker(); else el.click(); }catch(e){ el.click(); } }
  function onDate(e){ var v=e.target.value; if(!v) return; var base=new Date('2026-07-13T12:00:00'); var d=new Date(v+'T12:00:00'); var off=Math.round((d-base)/86400000); var n=DAYS().length-1; off=Math.max(0, Math.min(n, off)); setState({dayIdx:off}); }
  function setFilter(f){ setState({filter:f}); }
  function switchTruck(){ setState({truckIdx:(state.truckIdx+1)%2, angle:0}); }
  function onStatus(){ var t=TRUCKS()[state.truckIdx]; showToast(t.health==='good'?'✅ Everything checks out':'🔧 Best to book it in soon'); }

  function addPhoto(id){ pendingJob=id; var el=document.getElementById('jeff-photo-input'); if(el){ el.value=''; el.click(); } }
  function onPhoto(e){
    var files = Array.prototype.slice.call(e.target.files||[]);
    var id = pendingJob;
    if(!id || !files.length) return;
    var left = files.length;
    files.forEach(function(f){
      var r = new FileReader();
      r.onload = function(){
        var p = Object.assign({}, state.photos);
        p[id] = (p[id]||[]).concat([r.result]);
        try{ localStorage.setItem('jeffAppPhotos', JSON.stringify(p)); }catch(err){}
        state.photos = p; render();
        left--; if(left<=0) showToast('📷 Photo added');
      };
      r.readAsDataURL(f);
    });
  }

  var ACTS = {
    goHome:function(){ nav('home'); }, goJobs:function(){ nav('jobs'); }, goPhotos:function(){ nav('photos'); }, goTrucks:function(){ nav('trucks'); },
    openAlert:openAlert, onPrev:prevDay, onNext:nextDay, onPick:openDate,
    setAll:function(){ setFilter('all'); }, setQuote:function(){ setFilter('Quote'); }, setLand:function(){ setFilter('Landscaping'); },
    onSwitch:switchTruck, onStatus:onStatus, onLoc:refreshFeed,
    addPhoto:function(arg){ addPhoto(arg); },
    goDash:function(){ try{ localStorage.setItem('jjLayout','dashboard'); }catch(e){} location.href='index.html'; }
  };

  // ---------- helpers ----------
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ---------- screens ----------
  function homeHTML(){
    var days=DAYS(), today=days[0], trucks=TRUCKS();
    var alertT=null; for(var i=0;i<trucks.length;i++){ if(trucks[i].health!=='good'){ alertT=trucks[i]; break; } }
    var alert = alertT ? (
      '<div class="pa" data-act="openAlert" style="display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#fffdf3,#fff6dd);border:1px solid #f4e1a4;border-radius:20px;padding:13px 15px;cursor:pointer">'+
        '<div style="width:44px;height:44px;border-radius:13px;background:#fdecb8;display:flex;align-items:center;justify-content:center;font-size:22px">🟡</div>'+
        '<div style="flex:1"><div style="font-weight:800;font-size:15px;color:#7c5e12">'+esc(alertT.name)+' needs attention</div><div style="font-size:13px;color:#a1801f;margin-top:1px">Oil due soon · sticker in 12 days</div></div>'+
        '<div style="color:#d6b24a;font-size:22px">›</div>'+
      '</div>'
    ) : '';
    var dashPill = isJake ? ('<div class="pa" data-act="goDash" style="display:flex;align-items:center;justify-content:center;gap:8px;background:#eef2ff;border:1px solid #d9e0f7;border-radius:14px;padding:11px;font-size:13px;font-weight:800;color:#4152b3;cursor:pointer">⇄ Switch to full dashboard</div>') : '';
    return '<div class="screenpad" style="min-height:898px;background:linear-gradient(180deg,#f7f9f7,#edf1ee);padding:64px 18px 40px;display:flex;flex-direction:column;gap:14px">'+
      dashPill+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">'+
        '<div>'+
          '<div style="font-size:11px;font-weight:800;letter-spacing:1.6px;color:#16a34a;text-transform:uppercase">Monday · Jul 13</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:40px;line-height:.9;color:#17223a;letter-spacing:.5px;margin-top:3px">Hey Jeff 👋</div>'+
        '</div>'+
        '<div style="width:50px;height:50px;border-radius:16px;background:linear-gradient(160deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 8px 18px rgba(22,163,74,.38)">🚛</div>'+
      '</div>'+

      '<div class="pa" data-act="goJobs" style="background:linear-gradient(150deg,#16a34a,#12813b);border-radius:26px;padding:20px 24px;color:#fff;box-shadow:0 18px 34px rgba(22,163,74,.34);position:relative;overflow:hidden;cursor:pointer">'+
        '<div style="position:absolute;right:-16px;top:-26px;font-size:150px;opacity:.10;line-height:1">🧾</div>'+
        '<div style="font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.85">Jobs today</div>'+
        '<div style="display:flex;align-items:flex-end;gap:12px;margin-top:2px">'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:96px;line-height:.78;letter-spacing:1px">'+today.jobs.length+'</div>'+
          '<div style="padding-bottom:14px;font-size:15px;font-weight:600;opacity:.95;line-height:1.2">jobs to<br>knock out</div>'+
        '</div>'+
        '<div style="margin-top:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);padding:8px 15px;border-radius:999px;font-size:13px;font-weight:700">See today\'s list ›</div>'+
      '</div>'+

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
        '<div class="pa" data-act="goJobs" style="background:#fff;border:1px solid #e7eae8;border-radius:20px;padding:14px 15px;box-shadow:0 6px 16px rgba(20,40,25,.05);cursor:pointer">'+
          '<div style="display:flex;align-items:center;gap:7px"><span style="font-size:18px">🗑️</span><span style="font-size:12px;font-weight:800;letter-spacing:.6px;color:#0891b2;text-transform:uppercase">Drops</span></div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:54px;line-height:.85;color:#0e7490;margin-top:8px">'+today.drops+'</div>'+
          '<div style="font-size:12px;color:#98a0aa;margin-top:2px">bins going out</div>'+
        '</div>'+
        '<div class="pa" data-act="goJobs" style="background:#fff;border:1px solid #e7eae8;border-radius:20px;padding:14px 15px;box-shadow:0 6px 16px rgba(20,40,25,.05);cursor:pointer">'+
          '<div style="display:flex;align-items:center;gap:7px"><span style="font-size:18px">🔁</span><span style="font-size:12px;font-weight:800;letter-spacing:.6px;color:#be185d;text-transform:uppercase">Picks</span></div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:54px;line-height:.85;color:#be185d;margin-top:8px">'+today.picks+'</div>'+
          '<div style="font-size:12px;color:#98a0aa;margin-top:2px">bins coming back</div>'+
        '</div>'+
      '</div>'+

      alert+

      '<div style="display:flex;flex-direction:column;gap:11px;margin-top:2px">'+
        '<div class="pa" data-act="goPhotos" style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e7eae8;border-radius:20px;padding:15px 16px;box-shadow:0 6px 16px rgba(20,40,25,.05);cursor:pointer">'+
          '<div style="width:46px;height:46px;border-radius:14px;background:#ecfdf3;display:flex;align-items:center;justify-content:center;font-size:23px">📷</div>'+
          '<div style="flex:1"><div style="font-weight:800;font-size:17px;color:#17223a">Quotes &amp; Photos</div><div style="font-size:13px;color:#98a0aa">Add pics to a job</div></div>'+
          '<div style="color:#c2cbd2;font-size:22px">›</div>'+
        '</div>'+
        '<div class="pa" data-act="goTrucks" style="display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e7eae8;border-radius:20px;padding:15px 16px;box-shadow:0 6px 16px rgba(20,40,25,.05);cursor:pointer">'+
          '<div style="width:46px;height:46px;border-radius:14px;background:#eaf3ff;display:flex;align-items:center;justify-content:center;font-size:23px">🚛</div>'+
          '<div style="flex:1"><div style="font-weight:800;font-size:17px;color:#17223a">Trucks</div><div style="font-size:13px;color:#98a0aa">Oil, stickers &amp; more</div></div>'+
          '<div style="color:#c2cbd2;font-size:22px">›</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }

  function jobsHTML(){
    var days=DAYS(), day=days[state.dayIdx];
    var stops='';
    if(day.jobs.length>0){
      var items = day.jobs.map(function(job){
        return '<div style="display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #e7eae8;border-radius:18px;padding:13px 15px;box-shadow:0 4px 12px rgba(20,40,25,.04)">'+
          '<div style="width:9px;height:46px;border-radius:6px;background:'+job.c+'"></div>'+
          '<div style="flex:1"><div style="font-weight:800;font-size:16px;color:#17223a">'+esc(job.svc)+(job.ph?'<span style="font-size:12px"> 📷</span>':'')+'</div><div style="font-size:13px;color:#98a0aa">'+esc(job.who)+'</div></div>'+
          '<div style="font-weight:800;font-size:15px;color:#3a4048">'+job.time+'<span style="font-size:11px;color:#98a0aa;font-weight:600"> '+job.ap+'</span></div>'+
        '</div>';
      }).join('');
      stops = '<div style="font-size:11px;font-weight:800;letter-spacing:1px;color:#aab1b9;text-transform:uppercase;margin-top:2px;padding-left:4px">The stops</div>'+
        '<div style="display:flex;flex-direction:column;gap:10px">'+items+'</div>';
    } else {
      stops = '<div style="margin-top:8px;background:#fff;border:1px solid #e7eae8;border-radius:22px;padding:38px 20px;text-align:center;box-shadow:0 6px 16px rgba(20,40,25,.05)">'+
        '<div style="font-size:44px">🌤️</div>'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:#17223a;margin-top:8px;letter-spacing:.5px">Day off</div>'+
        '<div style="font-size:14px;color:#98a0aa;margin-top:2px">Nothing booked. Enjoy it, Jeff.</div>'+
      '</div>';

  function photosHTML(){
    var segOn = 'flex:1;text-align:center;border-radius:10px;padding:9px 0;font-size:13px;font-weight:800;color:#16a34a;background:#fff;box-shadow:0 2px 6px rgba(20,40,25,.08);cursor:pointer';

    var f=state.filter;
    var cards = JOBS().filter(function(j){ return f==='all' || j.type===f; }).map(function(j){
      var added = state.photos[j.id] || [];
      var thumbs = j.preset.map(function(g){ return {grad:g}; }).concat(added.map(function(u){ return {img:u}; }));
      var badge = j.type==='Quote' ? {fg:'#0d6efd', bg:'#eaf3ff'} : {fg:'#4d7c0f', bg:'#f2f9e7'};

          return '<div style="width:58px;height:58px;border-radius:12px;background:'+t.grad+'"></div>';

          '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
            '<div><div style="font-weight:800;font-size:18px;color:#17223a">'+esc(j.name)+'</div><div style="font-size:13px;color:#98a0aa;margin-top:1px">'+esc(j.addr)+'</div></div>'+

      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div class="pa" data-act="goHome" style="width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid #e7eae8;display:flex;align-items:center;justify-content:center;font-size:22px;color:#5b6472;box-shadow:0 4px 12px rgba(20,40,25,.05);cursor:pointer">‹</div>'+

      '</div>'+
      '<div style="display:flex;gap:7px;background:#e9ede9;border-radius:14px;padding:5px">'+
        '<div data-act="setAll" style="'+(f==='all'?segOn:segOff)+'">All</div>'+
        '<div data-act="setQuote" style="'+(f==='Quote'?segOn:segOff)+'">Quotes</div>'+
        '<div data-act="setLand" style="'+(f==='Landscaping'?segOn:segOff)+'">Landscaping</div>'+
      '</div>'+
      cards+
    '</div>';
  }

  function trucksHTML(){
    var trucks=TRUCKS(), truck=trucks[state.truckIdx];
    var truckImg = state.truckIdx===0 ? 'assets/truck-195.webp' : 'assets/truck-l7.webp';
    var fuelColor = truck.fuelPct>=50 ? '#22c55e' : truck.fuelPct>=25 ? '#f59e0b' : '#ef4444';
    var oilColor = truck.oilPct>=50 ? '#22c55e' : truck.oilPct>=20 ? '#f59e0b' : '#ef4444';
    var stateColor = truck.health==='good'?'#22c55e':truck.health==='attention'?'#f5b342':'#ef4444';
    var HS = { good:{icon:'🛡️',title:'All good',color:'#22c55e'}, attention:{icon:'⚠️',title:'Attention soon',color:'#f5b342'}, engine:{icon:'🔧',title:'Engine light on',color:'#ef4444'} };
    var hs = HS[truck.health] || HS.good;
    var stickerHead = truck.stickerOk?'#22c55e':'#f5b342';
    var synced = state.syncedAt ? ('synced '+state.syncedAt) : 'sample data';

    var hero = '<div style="position:relative;height:236px;overflow:hidden">'+
        '<div style="position:absolute;left:50%;bottom:18px;width:80%;height:30px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(closest-side, rgba(0,0,0,.5), rgba(0,0,0,0) 78%);filter:blur(11px);pointer-events:none;z-index:0"></div>'+
        '<img src="'+truckImg+'" alt="" draggable="false" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 16px 18px rgba(0,0,0,.5));pointer-events:none;user-select:none">'+
      '</div>';

    return '<div class="screenpad" style="min-height:898px;background:radial-gradient(135% 90% at 50% 24%,#14161a 0%,#0a0b0e 58%,#060708 100%);padding:58px 18px 38px;display:flex;flex-direction:column;color:#f4f6f7">'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div class="pa" data-act="goHome" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;color:#e6e9ec;cursor:pointer;flex-shrink:0">‹</div>'+
        '<div class="pa" data-act="onSwitch" style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">'+
          '<span style="font-size:24px;font-weight:800;letter-spacing:-.02em;color:#fff">'+esc(truck.name)+'</span>'+
          '<span style="font-size:15px;color:#8b9299">⌄</span>'+
        '</div>'+
      '</div>'+

      '<div style="display:flex;align-items:center;gap:11px;margin-top:14px">'+
        '<span style="font-size:18px">⛽</span>'+
        '<div style="width:120px;height:15px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden"><div style="height:100%;width:'+truck.fuelPct+'%;background:'+fuelColor+';border-radius:999px;animation:gaugeGrow 1s cubic-bezier(.34,1,.4,1) both"></div></div>'+
        '<span style="font-size:16px;font-weight:800;color:#fff">'+truck.fuelPct+'%</span>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'+
        '<span style="width:9px;height:9px;border-radius:50%;background:'+stateColor+'"></span>'+
        '<span style="font-size:16px;color:#c3c9cf;font-weight:500;white-space:nowrap">'+esc(truck.state)+'</span>'+
      '</div>'+

      '<div style="margin:2px -18px 4px">'+hero+'</div>'+
      '<div style="height:2px"></div>'+

      '<div class="pa" data-act="onStatus" style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px 18px;cursor:pointer">'+
        '<span style="font-size:26px">'+hs.icon+'</span>'+
        '<div style="flex:1"><div style="font-size:17px;font-weight:800;color:'+hs.color+'">'+esc(hs.title)+'</div><div style="font-size:14px;color:#8b9299;margin-top:1px">'+esc(truck.statusMsg)+'</div></div>'+
        '<span style="font-size:20px;color:#6b727a">›</span>'+
      '</div>'+

      '<div class="pa" data-act="onLoc" style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px 18px;margin-top:11px;cursor:pointer">'+
        '<span style="font-size:22px">📍</span>'+
        '<div style="flex:1"><div style="font-size:15px;color:#e6e9ec;font-weight:700">'+esc(truck.loc)+'</div><div style="font-size:13px;color:#8b9299;margin-top:1px">Geotab · updated '+esc(truck.seen)+' · '+esc(synced)+'</div></div>'+
        '<span style="font-size:17px;color:#6b727a">🔄</span>'+
      '</div>'+

      '<div style="display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:15px 0;margin-top:11px">'+
        '<div style="flex:1;display:flex;align-items:center;gap:11px;padding:0 15px">'+
          '<span style="font-size:19px">🛢️</span>'+
          '<div><div style="font-size:12px;color:'+oilColor+';font-weight:700;text-transform:uppercase;letter-spacing:.3px">Oil life '+truck.oilPct+'%</div><div style="font-size:14px;color:#e6e9ec;font-weight:600;margin-top:2px">Due '+esc(truck.oilKm)+'</div></div>'+
        '</div>'+
        '<div style="width:1px;background:rgba(255,255,255,.1)"></div>'+
        '<div style="flex:1;display:flex;align-items:center;gap:11px;padding:0 15px">'+
          '<span style="font-size:19px">📋</span>'+
          '<div><div style="font-size:12px;color:'+stickerHead+';font-weight:700;text-transform:uppercase;letter-spacing:.3px">Sticker</div><div style="font-size:14px;color:#e6e9ec;font-weight:600;margin-top:2px">'+esc(truck.sticker)+' · '+esc(truck.stickerLeft)+'</div></div>'+
        '</div>'+
      '</div>'+

      '<div style="font-size:12px;color:#6b727a;text-align:center;margin-top:9px">🛞 '+esc(truck.odo)+' km on the clock · synced from Geotab</div>'+
    '</div>';
  }

  // ---------- render ----------
  function renderToast(){
    var el = document.getElementById('toast');
    if(state.toast){
      el.innerHTML = '<div style="position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:70;background:#17223a;color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.28);white-space:nowrap;animation:toastIn .22s ease both">'+esc(state.toast)+'</div>';
    } else { el.innerHTML=''; }
  }

  function render(){
    var scroll = document.getElementById('scroll');
    var screen = document.getElementById('screen');
    var html;
    if(state.screen==='home') html=homeHTML();
    else if(state.screen==='jobs') html=jobsHTML();
    else if(state.screen==='photos') html=photosHTML();
    else html=trucksHTML();

    var changed = state.screen!==lastScreen;
    var keepScroll = changed ? 0 : scroll.scrollTop;
    screen.innerHTML = html;
    var inner = screen.firstElementChild;
    if(inner && changed) inner.className += ' jscreen';
    scroll.scrollTop = keepScroll;

    var dark = state.screen==='trucks';
    document.getElementById('sb').classList.toggle('dark', dark);
    document.getElementById('hi').classList.toggle('dark', dark);
    lastScreen = state.screen;

    renderToast();
  }

  // ---------- wiring ----------
  document.querySelector('.glass').addEventListener('click', function(e){
    var t = e.target.closest('[data-act]');
    if(!t) return;
    var fn = ACTS[t.getAttribute('data-act')];
    if(fn) fn(t.getAttribute('data-arg'));
  });
  document.getElementById('jeff-photo-input').addEventListener('change', onPhoto);
  document.getElementById('jeff-date-input').addEventListener('change', onDate);

  // ---------- boot ----------
  try{
    var raw = localStorage.getItem('jeffAppPhotos');
    if(raw){ var s = JSON.parse(raw); if(s && typeof s==='object') state.photos = Object.assign({walsh:[],roy:[],nguyen:[]}, s); }
  }catch(e){}

  render();
  loadFeed();
  feedTimer = setInterval(loadFeed, 60000);
})();
</script>
