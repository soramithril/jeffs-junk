<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeff's Junk — Splash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    gap: 16px;
  }

  .page-note {
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── Shared splash container ── */
  .splash {
    width: 100%;
    max-width: 600px;
    aspect-ratio: 16/9;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 14px;
    cursor: pointer;
  }

  .splash-label {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
    margin-bottom: 40px;
  }
  .splash-label span {
    font-size: 11px;
    color: #333;
    letter-spacing: 0.3px;
  }
  .replay-btn {
    background: none;
    border: 1px solid #202020;
    color: #303030;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .replay-btn:hover { border-color: #404040; color: #666; }

  /* ════════════════════════════════════════
     SPLASH 1 — WHITE ROOM
     Pure white background. Logo and a
     single line of text. Exactly like
     Apple's product reveal pages.
     Starts black, cross-fades to white,
     logo and tagline materialise.
  ════════════════════════════════════════ */
  #s1 { background: #000; }

  #s1-bg {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    z-index: 1;
  }

  #s1-logo {
    width: 52%;
    max-width: 260px;
    position: relative; z-index: 3;
    opacity: 0;
    transform: scale(1.015);
    /* remove white bg from PNG */
    mix-blend-mode: multiply;
  }

  #s1-tag {
    position: absolute;
    bottom: 13%;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #555;
    z-index: 3;
    opacity: 0;
    transform: translateY(5px);
  }

  /* ════════════════════════════════════════
     SPLASH 2 — DARK KEYNOTE
     Black background. Logo fades in
     perfectly centered. Underneath, a
     thin progress bar fills left-to-right
     like macOS boot screen — then a
     one-line tagline appears.
  ════════════════════════════════════════ */
  #s2 { background: #000; }

  #s2-logo {
    width: 48%;
    max-width: 240px;
    position: relative; z-index: 3;
    opacity: 0;
    transform: scale(1.02);
    filter: brightness(0) invert(1);
  }

  #s2-bar-wrap {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    z-index: 3;
    overflow: hidden;
    opacity: 0;
  }
  #s2-bar-fill {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.55);
    border-radius: 2px;
    transition: none;
  }
  #s2-tag {
    position: absolute;
    bottom: 11%;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    z-index: 3;
    opacity: 0;
  }

  /* ════════════════════════════════════════
     SPLASH 3 — FROSTED GLASS
     Deep green-tinted dark background.
     Blurred glass card materialises in
     the center, logo appears inside it.
     Apple's visionOS / iOS aesthetic.
  ════════════════════════════════════════ */
  #s3 {
    background: radial-gradient(ellipse at 40% 40%, #0d2a12 0%, #060f08 55%, #000 100%);
  }

  /* particle field behind glass */
  #s3-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* the glass card */
  #s3-glass {
    position: relative; z-index: 3;
    width: 55%;
    max-width: 280px;
    aspect-ratio: 1.5;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.06) inset,
      0 24px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(34,140,58,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transform: scale(0.92) translateY(10px);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #s3-logo {
    width: 78%;
    filter: brightness(0) invert(1);
    opacity: 0;
    transform: translateY(6px);
  }

  #s3-dot-row {
    display: flex; gap: 5px; align-items: center;
    opacity: 0;
  }
  .s3-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
  }
  .s3-dot.active { background: rgba(34,180,74,0.8); }

</style>
</head>
<body>

<p class="page-note">Click replay to watch again</p>

<!-- ── SPLASH 1: WHITE ROOM ── -->
<div class="splash" id="s1">
  <div id="s1-bg"></div>
  <img id="s1-logo" src="https://jeffsjunk.ca/wp-content/uploads/jeffs-junk-logo.png" alt="">
  <div id="s1-tag">Junk Removal &amp; Bin Rental</div>
</div>
<div class="splash-label">
  <span>White Room — clean product reveal</span>
  <button class="replay-btn" onclick="playWhite()">Replay</button>
</div>

<!-- ── SPLASH 2: DARK KEYNOTE ── -->
<div class="splash" id="s2">
  <img id="s2-logo" src="https://jeffsjunk.ca/wp-content/uploads/jeffs-junk-logo.png" alt="">
  <div id="s2-bar-wrap"><div id="s2-bar-fill"></div></div>
  <div id="s2-tag">Barrie &amp; Surrounding Area</div>
</div>
<div class="splash-label">
  <span>Dark Keynote — macOS boot precision</span>
  <button class="replay-btn" onclick="playDark()">Replay</button>
</div>

<!-- ── SPLASH 3: FROSTED GLASS ── -->
<div class="splash" id="s3">
  <canvas id="s3-canvas"></canvas>
  <div id="s3-glass">
    <img id="s3-logo" src="https://jeffsjunk.ca/wp-content/uploads/jeffs-junk-logo.png" alt="">
    <div id="s3-dot-row">
      <div class="s3-dot active"></div>
      <div class="s3-dot"></div>
      <div class="s3-dot"></div>
    </div>
  </div>
</div>
<div class="splash-label">
  <span>Frosted Glass — visionOS depth</span>
  <button class="replay-btn" onclick="playGlass()">Replay</button>
</div>

<script>
function raf2(fn) { requestAnimationFrame(() => requestAnimationFrame(fn)); }

/* ─────────────────────────────
   1. WHITE ROOM
───────────────────────────── */
function playWhite() {
  const bg   = document.getElementById('s1-bg');
  const logo = document.getElementById('s1-logo');
  const tag  = document.getElementById('s1-tag');

  [bg, logo, tag].forEach(el => el.style.transition = 'none');
  bg.style.opacity   = '0';
  logo.style.opacity = '0';
  logo.style.transform = 'scale(1.015)';
  tag.style.opacity  = '0';
  tag.style.transform = 'translateY(5px)';

  raf2(() => {
    // Stage goes white — slow, luxurious
    bg.style.transition = 'opacity 1.1s ease';
    bg.style.opacity    = '1';

    // Logo materialises as white fills
    setTimeout(() => {
      logo.style.transition = 'opacity 1.0s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1)';
      logo.style.opacity    = '1';
      logo.style.transform  = 'scale(1)';
    }, 600);

    // Tagline last
    setTimeout(() => {
      tag.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      tag.style.opacity    = '1';
      tag.style.transform  = 'translateY(0)';
    }, 1500);
  });
}

/* ─────────────────────────────
   2. DARK KEYNOTE
───────────────────────────── */
function playDark() {
  const logo    = document.getElementById('s2-logo');
  const barWrap = document.getElementById('s2-bar-wrap');
  const barFill = document.getElementById('s2-bar-fill');
  const tag     = document.getElementById('s2-tag');

  [logo, barWrap, tag].forEach(el => el.style.transition = 'none');
  barFill.style.transition = 'none';
  logo.style.opacity    = '0';
  logo.style.transform  = 'scale(1.02)';
  barWrap.style.opacity = '0';
  barFill.style.width   = '0%';
  tag.style.opacity     = '0';

  raf2(() => {
    // Logo fades in — slow and central
    logo.style.transition = 'opacity 1.2s ease, transform 1.4s cubic-bezier(0.16,1,0.3,1)';
    logo.style.opacity    = '1';
    logo.style.transform  = 'scale(1)';

    // Progress bar appears under logo
    setTimeout(() => {
      barWrap.style.transition = 'opacity 0.4s ease';
      barWrap.style.opacity    = '1';

      // Bar fills — eased, like macOS
      setTimeout(() => {
        barFill.style.transition = 'width 1.6s cubic-bezier(0.4, 0, 0.2, 1)';
        barFill.style.width      = '100%';
      }, 100);

      // Bar fades, tagline takes its place
      setTimeout(() => {
        barWrap.style.transition = 'opacity 0.5s ease';
        barWrap.style.opacity    = '0';
        tag.style.transition     = 'opacity 0.6s ease';
        tag.style.opacity        = '1';
      }, 1900);

    }, 1100);
  });
}

/* ─────────────────────────────
   3. FROSTED GLASS
───────────────────────────── */
let glassRAF = null;

function playGlass() {
  if (glassRAF) cancelAnimationFrame(glassRAF);

  const canvas  = document.getElementById('s3-canvas');
  const glass   = document.getElementById('s3-glass');
  const logo    = document.getElementById('s3-logo');
  const dotRow  = document.getElementById('s3-dot-row');
  const stage   = document.getElementById('s3');
  const ctx     = canvas.getContext('2d');

  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
  const W = canvas.width, H = canvas.height;

  // reset
  [glass, logo, dotRow].forEach(el => el.style.transition = 'none');
  glass.style.opacity   = '0';
  glass.style.transform = 'scale(0.92) translateY(10px)';
  logo.style.opacity    = '0';
  logo.style.transform  = 'translateY(6px)';
  dotRow.style.opacity  = '0';

  // Floating particles
  const particles = Array.from({length: 38}, () => ({
    x:     Math.random() * W,
    y:     Math.random() * H,
    r:     0.8 + Math.random() * 1.8,
    vx:    (Math.random() - 0.5) * 0.3,
    vy:    -0.15 - Math.random() * 0.25,
    alpha: 0.06 + Math.random() * 0.14,
    pulse: Math.random() * Math.PI * 2,
  }));

  let t = 0;

  function drawParticles() {
    t++;
    ctx.clearRect(0, 0, W, H);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += 0.02;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }

      const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(80,220,120,${a})`;
      ctx.fill();
    });

    glassRAF = requestAnimationFrame(drawParticles);
  }

  drawParticles();

  // Glass card materialises
  setTimeout(() => {
    glass.style.transition = 'opacity 0.9s ease, transform 0.9s cubic-bezier(0.16,1,0.3,1)';
    glass.style.opacity    = '1';
    glass.style.transform  = 'scale(1) translateY(0)';
  }, 300);

  // Logo inside glass
  setTimeout(() => {
    logo.style.transition = 'opacity 0.8s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1)';
    logo.style.opacity    = '1';
    logo.style.transform  = 'translateY(0)';
  }, 900);

  // Dots
  setTimeout(() => {
    dotRow.style.transition = 'opacity 0.5s ease';
    dotRow.style.opacity    = '1';
  }, 1400);
}

// Autoplay all on load
window.addEventListener('load', () => {
  setTimeout(playWhite,  200);
  setTimeout(playDark,   400);
  setTimeout(playGlass,  600);
});
</script>
</body>
</html>
