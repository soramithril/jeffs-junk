<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Back Shop Inventory — Jeff White Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-jwg-scheduler.css?v=350">
<link rel="stylesheet" href="app-jwg-theme.css?v=350">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,Arial,sans-serif;background:#eef2f4;color:#16223a;-webkit-text-size-adjust:100%}
  /* Kiosk: no dashboard <main>, and the futuristic view draws its own surfaces —
     cancel the scheduler theme's break-out margin and its white card box. */
  #view-jwgscheduler{margin:0!important;max-width:none!important;padding:0!important;position:relative;z-index:1}
  #view-jwgscheduler #app{padding:0!important}
  #kiosk-app .card{background:transparent!important;border:none!important;box-shadow:none!important;border-radius:0!important;margin:0!important;overflow:visible!important}
  #kiosk-app .card:hover{box-shadow:none!important;transform:none!important;border-color:transparent!important}
  /* ── login ── */
  #kiosk-login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#22c55e 0%,#12713a 100%);z-index:50;padding:20px}
  .kl-card{background:#fff;border-radius:20px;box-shadow:0 24px 60px rgba(6,60,28,.32);padding:38px 32px;width:100%;max-width:360px;text-align:center}
  .kl-logo{font-size:23px;font-weight:900;color:#15803d;letter-spacing:.5px;margin-bottom:6px}
  .kl-card h1{font-size:17px;font-weight:700;margin:0 0 4px;color:#16223a}
  .kl-card .sub{font-size:13px;color:#6b7280;margin-bottom:24px}
  .kl-card input{width:100%;padding:13px 14px;border:1px solid #dfe3e8;border-radius:11px;font-size:15px;margin-bottom:11px;outline:none;background:#f6f8fa;color:#16223a}
  .kl-card input::placeholder{color:#9aa3af}
  .kl-card input:focus{border-color:#22c55e;background:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.16)}
  .kl-card input:-webkit-autofill,.kl-card input:-webkit-autofill:hover,.kl-card input:-webkit-autofill:focus{-webkit-text-fill-color:#16223a;-webkit-box-shadow:0 0 0 1000px #f6f8fa inset;caret-color:#16223a;transition:background-color 9999s ease-in-out 0s}
  .kl-card button{width:100%;padding:13px;border:none;border-radius:11px;background:#15803d;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;letter-spacing:.2px}
  .kl-card button:hover{background:#166534}
  .kl-card button:disabled{opacity:.6;cursor:default}
  .kl-err{color:#dc2626;font-size:12.5px;min-height:17px;margin-top:10px;font-weight:600}
  /* ── kiosk chrome ── */
  #kiosk-app{display:none;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
  #kiosk-top{flex:none;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 26px;background:rgba(255,255,255,.86);backdrop-filter:blur(14px);border-bottom:1px solid #e2e8ec;box-shadow:0 1px 0 rgba(255,255,255,.7),0 6px 20px -12px rgba(16,40,28,.3);z-index:6}
  .kt-brand{display:flex;align-items:center;gap:12px}
  .kt-logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(155deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -5px rgba(34,197,94,.65),inset 0 1px 0 rgba(255,255,255,.5)}
  .kt-name{font-size:14.5px;font-weight:900;letter-spacing:.3px;color:#16223a;line-height:1.2;white-space:nowrap}
  .kt-sub{font-size:11px;font-weight:600;color:#8a97a0;letter-spacing:.14em;line-height:1.2;white-space:nowrap}
  .kt-right{display:flex;align-items:center;gap:16px}
  .kt-live{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:#eafaf0;border:1px solid #c8ecd6;white-space:nowrap}
  .kt-live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.8);animation:kgBlink 1.8s ease-in-out infinite}
  .kt-live-label{font-size:11.5px;font-weight:800;letter-spacing:.08em;color:#15803d}
  .kt-user{display:flex;align-items:center;gap:9px;padding-left:16px;border-left:1px solid #e2e8ec}
  .kt-avatar{width:34px;height:34px;border-radius:50%;background:#e8f6ee;border:1px solid #c8ecd6;display:flex;align-items:center;justify-content:center;color:#15803d;font-weight:800;font-size:13px}
  .kt-uname{font-size:13px;font-weight:700;color:#16223a;line-height:1.2;white-space:nowrap}
  .kt-usub{font-size:10.5px;color:#8a97a0;line-height:1.2}
  #kiosk-signout{background:#fff;border:1px solid #d7dbe0;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;color:#5b6472;cursor:pointer;white-space:nowrap;transition:.15s}
  #kiosk-signout:hover{border-color:#dc2626;color:#dc2626}
  #kiosk-scroll{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;position:relative}
  .kg-aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .kg-aurora span:first-child{position:absolute;width:620px;height:620px;top:-220px;left:-120px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(34,197,94,.16),transparent 66%);filter:blur(30px);animation:kgAuroraA 20s ease-in-out infinite}
  .kg-aurora span:last-child{position:absolute;width:560px;height:560px;bottom:-220px;right:-100px;border-radius:50%;background:radial-gradient(circle at 55% 45%,rgba(45,212,191,.14),transparent 66%);filter:blur(30px);animation:kgAuroraB 24s ease-in-out infinite}
  /* ── futuristic content (rendered by renderInventoryKioskPage) ──
     Every rule is prefixed with #kiosk-app: app-jwg-scheduler.css has a scoped
     reset `#view-jwgscheduler *{margin:0;padding:0}` whose ID specificity beats
     bare classes — unprefixed kg- rules lose their margins/paddings. */
  #kiosk-app #kg-shell{position:relative;padding:22px 40px 64px;max-width:none;margin:0}
  /* ── ticker banner: scrolling stock alerts + the truck driving across ── */
  #kiosk-app .kg-tickerbar{position:relative;height:54px;border-radius:14px;background:linear-gradient(90deg,#15803d,#0b4f27);box-shadow:0 10px 24px -10px rgba(6,60,28,.5),inset 0 1px 0 rgba(255,255,255,.18);overflow:hidden;margin-bottom:22px;z-index:1}
  #kiosk-app .kg-ticker{position:absolute;inset:0;display:flex;align-items:center;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
  #kiosk-app .kg-ticker-track{display:inline-block;white-space:nowrap;will-change:transform;animation:kgTicker 40s linear infinite}
  #kiosk-app .kg-tk{display:inline-block;color:#eafaf0;font-size:14px;font-weight:700;letter-spacing:.05em;margin-right:30px;text-transform:uppercase}
  #kiosk-app .kg-tk b{font-weight:900;letter-spacing:.12em;margin-right:8px}
  #kiosk-app .kg-tk.out b{color:#fca5a5}
  #kiosk-app .kg-tk.low b{color:#fde047}
  #kiosk-app .kg-tk.ok{color:#bbf7d0}
  #kiosk-app .kg-tk i{font-style:normal;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.03em}
  #kiosk-app .kg-tk-dot{display:inline-block;color:rgba(255,255,255,.4);margin-right:30px}
  #kiosk-app .kg-drive-truck{position:absolute;bottom:2px;width:74px;pointer-events:none;z-index:2;filter:drop-shadow(0 5px 7px rgba(0,0,0,.3));animation:kgDriveBy 26s linear infinite}
  #kiosk-app .kg-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:26px;position:relative;z-index:1}
  #kiosk-app .kg-kpi{position:relative;display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #e7edf0;border-radius:16px;padding:18px 20px;box-shadow:0 4px 16px -8px rgba(16,40,28,.16);overflow:hidden}
  #kiosk-app .kg-kpi-top{position:absolute;top:0;left:0;right:0;height:3px}
  #kiosk-app .kg-sheen{position:absolute;top:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);animation:kgSheen 6s ease-in-out infinite}
  #kiosk-app .kg-kpi-label{font-size:10.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#8a97a0;white-space:nowrap}
  #kiosk-app .kg-kpi-num{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:.9;color:#16223a;margin-top:3px}
  #kiosk-app .kg-kpi-num.low{color:#dc2626}
  #kiosk-app .kg-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;position:relative;z-index:1}
  #kiosk-app #kg-search{flex:1;min-width:220px;max-width:380px;padding:13px 16px;border:1px solid #dbe2e7;border-radius:12px;font-size:14px;background:#fff;color:#16223a;outline:none;box-shadow:0 2px 8px -4px rgba(16,40,28,.12);transition:border-color .2s,box-shadow .2s;font-family:inherit}
  #kiosk-app #kg-search:focus{border-color:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.15)}
  #kiosk-app #kg-search::placeholder{color:#9aa3af}
  #kiosk-app .kg-chip{border-radius:999px;padding:12px 20px;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex:none;transition:filter .15s;background:#fff;color:#5b6472;border:1px solid #dbe2e7;box-shadow:0 2px 8px -4px rgba(16,40,28,.1);font-family:inherit}
  #kiosk-app .kg-chip.on{background:linear-gradient(160deg,#22c55e,#15803d);color:#fff;border:1px solid #22c55e;box-shadow:0 6px 16px -4px rgba(34,197,94,.5)}
  #kiosk-app .kg-chip:hover{filter:brightness(.98)}
  #kiosk-app .kg-chip span{opacity:.85;font-weight:800}
  #kiosk-app .kg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;position:relative;z-index:1}
  #kiosk-app .kg-card.enter{animation:kgPopIn .5s cubic-bezier(.22,1,.36,1) both}
  #kiosk-app .kg-inner{position:relative;display:flex;flex-direction:column;height:100%;background:#fff;border:1px solid #e7edf0;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px -8px rgba(16,40,28,.16);transition:transform .22s cubic-bezier(.22,1,.36,1),box-shadow .22s}
  #kiosk-app .kg-inner:hover{transform:translateY(-5px);box-shadow:0 22px 44px -16px rgba(16,40,28,.3)}
  #kiosk-app .kg-img{position:relative;width:100%;aspect-ratio:1/1;background:#eef2f5}
  /* absolute so a tall photo can't stretch the square frame — the frame crops it */
  #kiosk-app .kg-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  #kiosk-app .kg-imgph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-size:15px;font-weight:700;color:#b6c0c8;letter-spacing:.02em}
  #kiosk-app .kg-lowbadge{position:absolute;top:11px;left:11px;font-size:10px;font-weight:800;letter-spacing:.06em;color:#fff;background:#dc2626;padding:4px 11px;border-radius:999px;box-shadow:0 4px 10px rgba(220,38,38,.45);pointer-events:none;animation:kgLowPulse 1.6s ease-in-out infinite}
  #kiosk-app .kg-cel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #kiosk-app .kg-cel-ring{position:absolute;width:74px;height:74px;border-radius:50%;border:4px solid #22c55e;animation:kgBurst .9s ease-out forwards}
  #kiosk-app .kg-cel-pill{display:flex;align-items:center;gap:7px;background:#15803d;color:#fff;font-size:12px;font-weight:800;padding:8px 15px;border-radius:999px;box-shadow:0 10px 24px -6px rgba(21,128,61,.6);animation:kgTada .6s cubic-bezier(.34,1.56,.64,1) both}
  #kiosk-app .kg-body{padding:14px 15px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
  #kiosk-app .kg-nrow{display:flex;align-items:flex-start;gap:8px}
  #kiosk-app .kg-name{font-size:15px;font-weight:800;color:#16223a;flex:1;line-height:1.25}
  #kiosk-app .kg-prod{font-family:'Bebas Neue',monospace;font-size:11px;color:#6b7280;background:#eef1f4;padding:3px 8px;border-radius:6px;letter-spacing:.6px;white-space:nowrap}
  #kiosk-app .kg-meta{font-size:12px;color:#9aa3af}
  #kiosk-app .kg-bar{height:8px;border-radius:999px;background:#eef1f4;overflow:hidden;margin-top:1px}
  #kiosk-app .kg-bar-fill{display:block;height:100%;border-radius:999px;transition:width .45s cubic-bezier(.22,1,.36,1),background .3s}
  #kiosk-app .kg-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:9px;margin-top:auto}
  #kiosk-app .kg-count{display:flex;align-items:baseline;gap:4px}
  #kiosk-app .kg-num{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:#16223a;cursor:pointer;display:inline-block}
  #kiosk-app .kg-num.islow{color:#dc2626}
  #kiosk-app .kg-num.kg-bump{animation:kgBump .24s cubic-bezier(.34,1.56,.64,1)}
  #kiosk-app .kg-unit{font-size:12px;color:#9aa3af}
  #kiosk-app .kg-btns{display:flex;gap:8px}
  #kiosk-app .kg-dec,#kiosk-app .kg-inc{width:38px;height:38px;border-radius:11px;font-size:20px;font-weight:700;cursor:pointer;line-height:1;transition:.12s;font-family:inherit}
  #kiosk-app .kg-dec{border:1px solid #dbe2e7;background:#fff;color:#5b6472}
  #kiosk-app .kg-dec:hover{border-color:#22c55e;color:#16a34a;background:#f2fbf5}
  #kiosk-app .kg-inc{border:none;background:linear-gradient(160deg,#22c55e,#15803d);color:#fff;box-shadow:0 6px 14px -4px rgba(21,128,61,.55)}
  #kiosk-app .kg-inc:hover{filter:brightness(1.08)}
  #kiosk-app .kg-dec:active,#kiosk-app .kg-inc:active{transform:scale(.9)}
  #kiosk-app .kg-back{display:flex;align-items:center;gap:8px;border-top:1px dashed #e2e8ec;padding-top:9px}
  #kiosk-app .kg-back-label{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:#8a97a0}
  #kiosk-app .kg-back-num{font-family:'Bebas Neue',sans-serif;font-size:21px;line-height:1;color:#16223a;margin-left:auto}
  #kiosk-app .kg-back-btns{display:flex;gap:6px}
  #kiosk-app .kg-back-btns button{width:28px;height:28px;border-radius:8px;border:1px solid #dbe2e7;background:#fff;color:#5b6472;font-size:15px;font-weight:700;cursor:pointer;line-height:1;transition:.12s;font-family:inherit}
  #kiosk-app .kg-back-btns button:hover{border-color:#22c55e;color:#16a34a;background:#f2fbf5}
  #kiosk-app .kg-back-btns button:active{transform:scale(.9)}
  #kiosk-app .kg-empty{text-align:center;padding:60px 20px;position:relative;z-index:1}
  #kiosk-app .kg-empty-big{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#16223a;letter-spacing:.5px}
  #kiosk-app .kg-empty-sub{font-size:13.5px;margin-top:7px;color:#8a97a0}
  #kiosk-app .kg-toast-wrap{position:fixed;left:0;right:0;bottom:28px;display:flex;justify-content:center;z-index:30;pointer-events:none}
  #kiosk-app .kg-toast{display:flex;align-items:center;gap:10px;background:#15803d;color:#fff;padding:13px 22px;border-radius:14px;box-shadow:0 18px 44px -10px rgba(6,60,28,.55);font-size:14px;font-weight:700;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1)}
  #kiosk-app .kg-toast.show{opacity:1;transform:translateY(0)}
  @keyframes kgPopIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes kgAuroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(46px,32px) scale(1.15)}}
  @keyframes kgAuroraB{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-44px,-30px) scale(1)}}
  @keyframes kgTicker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes kgDriveBy{0%{transform:translateX(108vw)}46%{transform:translateX(-90px)}100%{transform:translateX(-90px)}}
  @keyframes kgLowPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  @keyframes kgBurst{0%{transform:scale(.35);opacity:.85}100%{transform:scale(2.8);opacity:0}}
  @keyframes kgTada{0%{transform:scale(.4) rotate(-10deg);opacity:0}55%{transform:scale(1.12) rotate(4deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes kgBlink{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes kgSheen{0%{transform:translateX(-140%)}60%,100%{transform:translateX(360%)}}
  @keyframes kgBump{0%{transform:scale(1)}50%{transform:scale(1.24)}100%{transform:scale(1)}}
</style>
</head>
<body>
  <div id="kiosk-login">
    <form class="kl-card" id="kl-form" autocomplete="off">
      <div class="kl-logo">JEFF WHITE GROUP</div>
      <h1>Back Shop Inventory</h1>
      <div class="sub">Sign in to continue</div>
      <input type="text" id="kl-user" placeholder="Username" autocomplete="off" autocapitalize="none" autocorrect="off" autofocus>
      <input type="password" id="kl-pass" placeholder="Password" autocomplete="off">
      <button type="submit" id="kl-btn">Sign in</button>
      <div class="kl-err" id="kl-err"></div>
    </form>
  </div>

  <div id="kiosk-app">
    <header id="kiosk-top">
      <div class="kt-brand">
        <div class="kt-logo" id="kt-logo"></div>
        <div><div class="kt-name">JEFF WHITE GROUP</div><div class="kt-sub">BACK SHOP · INVENTORY</div></div>
      </div>
      <div class="kt-right">
        <div class="kt-live"><span class="kt-live-dot"></span><span class="kt-live-label">LIVE</span></div>
        <div class="kt-user"><div class="kt-avatar" id="kt-avatar">–</div><div><div class="kt-uname" id="kt-uname">&nbsp;</div><div class="kt-usub">Signed in</div></div></div>
        <button id="kiosk-signout" type="button">Sign out</button>
      </div>
    </header>
    <div id="kiosk-scroll">
      <div class="kg-aurora"><span></span><span></span></div>
      <div id="view-jwgscheduler" class="view active" data-tabgroup="ops">
        <div id="app"><div class="card"></div></div>
        <div id="jwg-toast"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Same project + anon key as the dashboard. The scheduler bundle reads these globals.
    window.SUPABASE_URL = 'https://okoqzbdyfjfgcdgmcamq.supabase.co';
    window.SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3F6YmR5ZmpmZ2NkZ21jYW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDYyNzEsImV4cCI6MjA4ODIyMjI3MX0.SQQD5HN2h179Lsqb-gxqnuTZcIXUyxrtmBP6VLOO57w';
    // persistSession:false — Jake's rule: never remember the kiosk sign-in.
    // Every page load starts at the login screen; the session lives in memory only.
    window.db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY, { auth: { persistSession: false } });
  </script>
  <script src="jwg-icons.js?v=397"></script>
  <script src="app-jwg-scheduler.js?v=438"></script>
  <script>
    (function(){
      var loginEl = document.getElementById('kiosk-login');
      var appEl   = document.getElementById('kiosk-app');
      var form    = document.getElementById('kl-form');
      var userInp = document.getElementById('kl-user');
      var passInp = document.getElementById('kl-pass');
      var errEl   = document.getElementById('kl-err');
      var btn     = document.getElementById('kl-btn');

      document.getElementById('kt-logo').innerHTML = JWGIcons.svg('shop', { size: 20, stroke: '#fff' });

      function showApp(){
        loginEl.style.display = 'none';
        appEl.style.display = 'flex';
        window.renderJwgInventoryKiosk();
      }
      function showLogin(){
        appEl.style.display = 'none';
        loginEl.style.display = 'flex';
        passInp.value = '';
        setTimeout(function(){ userInp.focus(); }, 50);
      }

      showLogin();

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        errEl.textContent = '';
        var u = userInp.value.trim();
        var p = passInp.value;
        if (!u || !p) { errEl.textContent = 'Enter your username and password.'; return; }
        btn.disabled = true; btn.textContent = 'Signing in…';
        try {
          var email = u;
          if (u.indexOf('@') === -1) {
            var em = await window.db.rpc('get_email_by_username', { lookup_username: u });
            if (!em || !em.data) { errEl.textContent = 'Username not found.'; btn.disabled=false; btn.textContent='Sign in'; return; }
            email = em.data;
          }
          var r = await window.db.auth.signInWithPassword({ email: email, password: p });
          if (r.error) { errEl.textContent = 'Wrong password — try again.'; btn.disabled=false; btn.textContent='Sign in'; return; }
          btn.disabled = false; btn.textContent = 'Sign in';
          // Personalize the header + hero greeting from the typed username.
          var display = u.indexOf('@') > -1 ? u.split('@')[0] : u;
          display = display.charAt(0).toUpperCase() + display.slice(1);
          window.kioskUserName = display;
          document.getElementById('kt-uname').textContent = display;
          document.getElementById('kt-avatar').textContent = display.slice(0, 2).toUpperCase();
          showApp();
        } catch(ex) {
          errEl.textContent = 'Network error — check the connection.';
          btn.disabled = false; btn.textContent = 'Sign in';
        }
      });

      document.getElementById('kiosk-signout').addEventListener('click', async function(){
        try { await window.db.auth.signOut(); } catch(e) {}
        var card = document.querySelector('#app .card');
        if (card) card.innerHTML = '';
        showLogin();
      });
    })();
  </script>
</body>
</html>
