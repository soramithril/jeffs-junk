name: daily-briefing

# Speaks the day's work for the office TV, at 9 AM.
#
# Runs here rather than in Supabase because Kokoro is a PyTorch model and edge
# functions are Deno sandboxes — no GPU, no Python. A GitHub runner is free and
# we need it once a day.
#
# The MP3 is published as a Release asset, NOT committed: a daily commit would
# trigger a Pages rebuild (currently ~an hour) and grow the repo forever.

on:
  schedule:
    # 12:45 UTC = 8:45 AM EDT — deliberately BEFORE the board's 9 AM slot. The
    # render takes a few minutes (more on a cold model cache, and GitHub can
    # queue cron jobs), and the board plays the file on its first minute-tick
    # after 9 that finds a today-dated briefing. Publishing early means Daniel
    # speaks at 9:00 sharp; publishing at 9:00 meant he was still clearing his
    # throat when the board first looked. Ontario is UTC-4 in summer, UTC-5 in
    # winter, so this drifts to 7:45 AM in November — earlier is harmless, the
    # board still waits for 9.
    - cron: '45 12 * * 1-6'
  workflow_dispatch:        # so it can be tested without waiting for 9 AM
    inputs:
      sample_text:
        description: >-
          Speak this instead of today's numbers. Lets the voice be auditioned
          before the Supabase secrets exist. Leave blank for the real briefing.
        required: false
        default: >-
          Good morning. It's Monday the twentieth of July. There are 20 bin
          movements on the board today: 9 going out, and 11 coming back. They're
          spread across Alliston, Barrie, Hillsdale and 6 other towns. 53 bins
          are already out in the field. There are 2 junk removals on the book.
          Have a good one.
      voice:
        description: 'Kokoro voice — bm_daniel, bm_george, bm_fable, bm_lewis'
        required: false
        default: bm_daniel

concurrency:
  group: daily-briefing
  cancel-in-progress: true

jobs:
  speak:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to publish the Release asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # espeak-ng is Kokoro's phonemiser (via misaki); ffmpeg makes the mp3.
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq espeak-ng ffmpeg

      # The model is ~330 MB from HuggingFace. Cached so we download it once,
      # not every morning.
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-82m-v1

      - name: Install Kokoro
        run: pip install --quiet kokoro>=0.9 soundfile numpy

      - name: Build the briefing
        env:
          OFFICETV_EMAIL: ${{ secrets.OFFICETV_EMAIL }}
          OFFICETV_PASSWORD: ${{ secrets.OFFICETV_PASSWORD }}
          # Only set on a manual run — the 9 AM schedule always speaks real numbers.
          BRIEFING_TEXT: ${{ github.event.inputs.sample_text }}
          BRIEFING_VOICE: ${{ github.event.inputs.voice }}
        run: python scripts/build_briefing.py

      - name: Encode to mp3
        run: ffmpeg -hide_banner -loglevel error -y -i briefing.wav -codec:a libmp3lame -qscale:a 4 briefing.mp3

      # A sample run must NEVER reach the Release: the TV reads that URL, so
      # auditioning a voice would broadcast it to the office. Samples come back
      # as a downloadable artifact on the run instead.
      - name: Upload sample (not published to the board)
        if: github.event.inputs.sample_text != ''
        uses: actions/upload-artifact@v4
        with:
          name: briefing-sample
          path: |
            briefing.mp3
            briefing.json

      # A fixed tag we overwrite daily, so the TV can hardcode one URL.
      - name: Publish to the board
        if: github.event.inputs.sample_text == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view briefing >/dev/null 2>&1 \
            || gh release create briefing --title "Daily briefing" \
                 --notes "Audio briefing for the office TV. Overwritten each morning."
          gh release upload briefing briefing.mp3 briefing.json --clobber

      - name: Show what was said
        run: cat briefing.json
